<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>题库问答助手</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 10px;
}
.container { max-width: 600px; margin: 0 auto; }
.header {
  text-align: center; color: white; padding: 16px 0 12px;
}
.header h1 { font-size: 22px; margin-bottom: 4px; }
.header p { font-size: 12px; opacity: 0.85; }

.search-box {
  background: white; border-radius: 16px; padding: 14px;
  margin-bottom: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.input-row {
  display: flex; gap: 8px; margin-bottom: 10px;
}
#searchInput {
  flex: 1; padding: 12px 14px; border: 2px solid #e8e8e8;
  border-radius: 12px; font-size: 16px; outline: none;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: #667eea; }
#voiceBtn {
  width: 46px; height: 46px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s; flex-shrink: 0;
}
#voiceBtn:active { transform: scale(0.92); }
#voiceBtn.recording {
  background: linear-gradient(135deg, #ff416c, #ff4b2b);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.filter-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px; border: 2px solid #e8e8e8;
  border-radius: 18px; background: white; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.filter-btn.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white; border-color: transparent;
}

.tips {
  background: rgba(255,255,255,0.15); border-radius: 12px;
  padding: 10px 14px; margin-bottom: 10px; color: white;
  font-size: 12px; line-height: 1.7;
}
.tips code {
  background: rgba(255,255,255,0.25); padding: 1px 5px;
  border-radius: 4px; font-family: monospace; font-size: 11px;
}

.results { display: flex; flex-direction: column; gap: 10px; }

.result-card {
  background: white; border-radius: 14px; padding: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.result-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.type-tag {
  padding: 2px 8px; border-radius: 8px; font-size: 11px;
  font-weight: 600; color: white;
}
.type-tag.single { background: #4CAF50; }
.type-tag.multi { background: #FF9800; }
.type-tag.judge { background: #2196F3; }
.q-id { color: #999; font-size: 12px; }
.question {
  font-size: 15px; line-height: 1.7; color: #333;
  margin-bottom: 10px; word-break: break-word;
}
.options {
  display: flex; flex-direction: column; gap: 5px;
  margin-bottom: 10px;
}
.option {
  padding: 9px 12px; border-radius: 10px;
  background: #f7f7f7; font-size: 14px; line-height: 1.5;
  border-left: 3px solid #ddd; color: #555;
}
.option.correct {
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  border-left-color: #4CAF50; color: #1b5e20; font-weight: 600;
}
.answer-box {
  background: linear-gradient(135deg, #e3f2fd, #bbdefb);
  border-radius: 10px; padding: 10px 12px;
}
.answer-label {
  font-size: 12px; color: #1565C0; font-weight: 600;
  margin-bottom: 2px;
}
.answer-text {
  font-size: 16px; color: #0D47A1; font-weight: 700;
}

.empty-state {
  text-align: center; padding: 40px 20px; color: white;
}
.empty-state .icon { font-size: 44px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; opacity: 0.8; }

.voice-hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: white; padding: 10px 20px;
  border-radius: 20px; font-size: 14px; display: none; z-index: 100;
  white-space: nowrap;
}

#loading {
  text-align: center; padding: 30px; color: white;
  font-size: 14px;
}

.stat-bar {
  display: flex; justify-content: space-around;
  background: rgba(255,255,255,0.15); border-radius: 10px;
  padding: 10px; margin-bottom: 10px; color: white;
  font-size: 12px;
}
.stat-bar span { text-align: center; }
.stat-bar b { display: block; font-size: 18px; }

.search-highlight {
  background: #fff3a3;
  color: #d94801;
  font-weight: 700;
  padding: 0 2px;
  border-radius: 3px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎓 题库问答助手</h1>
    <p>精确匹配 · 语音搜索 · 离线可用</p>
  </div>

  <div class="stat-bar">
    <span><b id="statSingle">0</b>单选题</span>
    <span><b id="statMulti">0</b>多选题</span>
    <span><b id="statJudge">0</b>判断题</span>
    <span><b id="statTotal">0</b>总计</span>
  </div>

  <div class="search-box">
    <div class="input-row">
      <input type="text" id="searchInput" placeholder="输入题号或关键词搜索..." autocomplete="off">
      <button id="voiceBtn" title="语音输入">🎤</button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-type="all">全部</button>
      <button class="filter-btn" data-type="single">单选</button>
      <button class="filter-btn" data-type="multi">多选</button>
      <button class="filter-btn" data-type="judge">判断</button>
    </div>
  </div>

  <div class="tips">
    💡 <strong>搜索：</strong><code>单选5</code> <code>多10</code> <code>判20</code> <code>反洗钱</code> <code>冻结 账户</code>
  </div>

  <div id="loading">📚 正在加载题库...</div>
  <div id="results" class="results"></div>
</div>

<div class="voice-hint" id="voiceHint">🎙️ 正在聆听，请说话...</div>

},"a":"B"},{"id":48,"q":"首次为不在本行开立账户的客户提供现金汇款等一次性金融服务，且交易金额单笔人民币  元（含）以上，应开展准入尽职调查。","o":{"A":"5千","B":"1万","C":"5万","D":"10万"},"a":"B"},{"id":49,"q":"在为办理一次性现金汇款的客户进行准入尽职调查时，要求客户提供有效身份证件或者其他身份证明文件。其中，   必须通过联网核查系统进行核查。","o":{"A":"居民身份证","B":"户口本","C":"有效证件","D":"所有证明文件"},"a":"A"},{"id":50,"q":"拒绝CCS等级为     的个人客户自助办理开卡业务","o":{"A":"中风险","B":"高风险","C":"高风险及以上","D":"极高风险"},"a":"C"},{"id":51,"q":"在柜面和超级柜台渠道产生的   ，按照《中国农业银行运营档案管理办法》进行管理和保存","o":{"A":"个人客户身份资料","B":"尽职调查资料","C":"交易记录相关的其他资料","D":"以上全部"},"a":"D"},{"id":52,"q":"个人客户现金购买实物产品，客户风险等级为高且（现金）交易额在   （含）以上或转账交易额在    以上的，按规定采取加强型尽职调查。","o":{"A":"1万元，5万元","B":"2万元，5万元","C":"5万元，10万元","D":"1万元，10万元"},"a":"A"},{"id":53,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，以下哪种情况属于个人账户声明文件填写信息与其他信息存在明显矛盾的情形？","o":{"A":"声明仅为中国税收居民，但提供的现居地址为境外","B":"声明为非居民，但国籍与税收居民国一致","C":"声明为非居民，但居住地址所属国家与税收居民国一致","D":"声明的税收居民国与证件签发国一致"},"a":"A"},{"id":54,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，机构账户声明文件填写信息与其他信息存在明显矛盾的情形不包括以下哪项？","o":{"A":"声明仅为中国税收居民，但注册地址为境外","B":"声明为非居民，但注册地址所属国家与税收居民国一致","C":"投资机构声明不属于消极非金融机构，但其税收居民国未参与金融账户涉税信息自动交换标准","D":"声明信息与现有账户开立程序收集的身份信息不符"},"a":"B"},{"id":55,"q":"根据《中国农业银行协助司法机关查询冻结扣划工作管理办法》，司法查控系统与反洗钱系统之间的线索移送方式是？","o":{"A":"手动移送","B":"系统直连自动移送","C":"仅当司法机关要求时移送","D":"由营业机构定期人工报送"},"a":"B"},{"id":56,"q":"根据《中国农业银行大额交易和可疑交易报告操作规程》，在可疑交易报告的“疑点分析”中，以下哪项是明确禁止的做法？","o":{"A":"分析客户尽职调查情况","B":"简单填写“可疑”或仅描述系统预警特征","C":"结合客户交易记录进行逻辑分析","D":"与客户身份背景相互印证"},"a":"B"},{"id":57,"q":"根据《中国农业银行大额交易和可疑交易报告操作规程》，各级机构在经营活动中自主发现或有合理理由怀疑客户、客户的资金或者其他资产、客户的交易或者试图进行的交易与洗钱、恐怖融资等犯罪活动相关的，应当及时   。","o":{"A":"手工建立可疑交易预警","B":"报送大额交易报告","C":"自动生成可疑交易预警","D":"批量生成可疑交易预警"},"a":"A"},{"id":58,"q":"网点通过智能全速通对公账户平台变更对公账户单位名称、法定代表人等核心要素时，尽职调查结果审核需满足什么条件？","o":{"A":"仅需审核纸质尽职调查表","B":"需审核KYC尽职调查结果或纸质尽职调查表，且结论需明确","C":"无需尽职调查，直接提交中心审核","D":"仅需法定代表人签章确认"},"a":"B"},{"id":59,"q":"开立对公账户时，对于洗钱风险等级为“高风险”的客户，尽职调查需提供什么材料？","o":{"A":"普通尽职调查表","B":"加强型尽职调查结果或纸质加强尽职调查表","C":"仅需授权委托书","D":"无需额外材料"},"a":"B"},{"id":60,"q":"网点通过智能全速通对公账户平台办理对公账户开立及签约时，尽职调查核实报告结论为“存在可疑情形”时，柜面应如何处理？","o":{"A":"直接拒绝开户","B":"允许开户但需进行渠道或额度限制，并加强账户监测","C":"无需处理，直接通过审核","D":"要求客户提供额外担保"},"a":"B"},{"id":61,"q":"网点通过智能全速通对公账户平台办理业务时，在尽职调查结果审核中，哪些情况下需审核KYC尽职调查结果或加强型尽职调查表？","o":{"A":"变更单位名称、法定代表人姓名、注册资本等核心要素","B":"客户洗钱风险等级为“中风险”","C":"开立农民工工资专用账户","D":"变更账户非核心信息（如联系方式）"},"a":"A"},{"id":62,"q":"柜面办理单位结算账户开户业务前，需首先由哪个部门完成尽职调查？","o":{"A":"运营部门","B":"客户部门","C":"内勤部门","D":"法律部门"},"a":"B"},{"id":63,"q":"非居民机构开立账户时，金融机构必须获取的文件是？","o":{"A":"企业纳税证明","B":"非居民金融账户涉税信息声明文件","C":"外汇管理局批文","D":"企业章程复印件"},"a":"B"},{"id":64,"q":"冒名开立的单位结算账户销户时，销户原因应选择？","o":{"A":"正常销户","B":"转户","C":"冒名账户销户","D":"注销"},"a":"C"},{"id":65,"q":"柜面办理单位结算账户开户业务时，以下哪项是必须首先完成的步骤？","o":{"A":"直接为客户开立账户","B":"由客户部门完成尽职调查并填写《对公客户尽职调查表》或《对公客户加强型尽职调查表》","C":"审核客户提供的营业执照复印件","D":"签订对账协议"},"a":"B"},{"id":66,"q":"对于异地开户场景，若通过面对面方式核实企业法定代表人开户意愿且法人无法到达开户行，柜面需审核哪些材料？","o":{"A":"仅需客户经理的核实报告","B":"现场核实照片和一级支行主管行长签字或加盖一级支行行政公章的核实报告","C":"仅需法定代表人的身份证复印件","D":"无需额外材料，远程视频即可"},"a":"B"},{"id":67,"q":"根据《非居民金融账户涉税信息尽职调查管理办法》，机构开立账户时需签署的声明文件应如何处理？","o":{"A":"纸质单独存档，不作为开户资料","B":"作为开户资料的一部分，并可并入开户申请书","C":"电子单独存档，不作为开户资料","D":"无需签署，由银行自动生成"},"a":"B"},{"id":68,"q":"对于特定自然人客户，银行需进一步了解哪些信息以评估洗钱风险？","o":{"A":"客户的婚姻状况","B":"任职国家（地区）、职业背景及任职情况","C":"客户的社交媒体账号","D":"客户的子女信息"},"a":"B"},{"id":69,"q":"个人客户业务关系存续期间，以下哪种情形需开展加强型尽职调查？","o":{"A":"客户账户余额不足","B":"客户为国家司法机关调查的涉嫌洗钱人员","C":"客户更换手机号码","D":"客户频繁查询账户余额"},"a":"B"},{"id":70,"q":"以下哪些不属于应开展加强型尽职调查的场景：","o":{"A":"客户有关行为或者交易出现反洗钱方面异常的","B":"客户为国家司法、执法和监察机关调查、发布的涉嫌洗钱或者恐怖融资及相关犯罪人员的","C":"先前获得的客户身份资料的真实性、有效性、完整性存在疑点的","D":"客户更换手机号码"},"a":"D"},{"id":71,"q":"加强型尽职调查的操作流程中，以下哪项不属于必要步骤？","o":{"A":"审核客户身份基本信息的完整性、真实性、有效性","B":"审查客户历史交易是否符合其身份背景","C":"要求客户重新签订所有业务合同","D":"评估是否需要调整客户或业务管控措施"},"a":"C"},{"id":72,"q":"柜面身份识别方法应遵循的原则是：","o":{"A":"仅依赖人脸识别技术","B":"以人工识别为主，技术手段为辅","C":"仅通过联网核查系统验证","D":"完全依赖客户自述信息"},"a":"B"},{"id":73,"q":"对于二代身份证，客户姓名中包含系统无法识别的生僻字时，如果无法正常机读，以下哪项做法是正确的：：","o":{"A":"直接拒绝办理业务","B":"通过手工输入方式完成核查","C":"要求客户提供辅助证明材料","D":"仅通过人脸识别代替核查"},"a":"B"},{"id":74,"q":"同一营业机构的同一客服经理为同一客户连续办理多笔需联 ":"设备前置编号为设备入网非唯一标识，不允许修改","B":"设备前置编号为设备入网唯一标识，不允许修改"},"a":"B"},{"id":195,"q":"在行式自助设备的日常多久巡检一次？","o":{"A":"营业期间至少在每日营业前巡检一次","B":"营业期间至少在每周营业前巡检一次","C":"营业期间至少在每月营业前巡检一次"},"a":"A"},{"id":196,"q":"超级柜台自助类业务是指由（）自行办理的业务。","o":{"A":"客服经理","B":"内勤行长","C":"客户","D":"前端服务员"},"a":"C"},{"id":197,"q":"某支行在日常运营中，发现某客服经理同时负责客户账户开立与账户资料审核工作。根据《中国农业银行运营业务系统用户号管理规定》，以下说法正确的是：","o":{"A":"该客服经理可以同时担任这两个岗位，因为其业务能力较强","B":"该客服经理可以同时担任这两个岗位，只要其通过了相关业务培训","C":"该客服经理不得同时担任这两个岗位，因为违反了不相容岗位制约要求","D":"该客服经理可以同时担任这两个岗位，只要其无重大不良行为记录"},"a":"C"},{"id":198,"q":"某营业网点在日常业务检查中发现，客服经理张某在未履行审批手续的情况下，参与了客户投资理财产品的销售工作。该行为违反了以下哪项规定？","o":{"A":"客服经理可以协助客户经理开展外拓服务","B":"客服经理可以依法合规开展收益确定的产品营销","C":"客服经理不得承担投资类产品销售职责","D":"客服经理可以向客户经理转介绍有投资类产品购买意向的客户"},"a":"C"},{"id":199,"q":"某支行在日常业务操作中，发现某客服经理同时担任了临柜业务实物印章管理系统中的业务管理员和系统管理员。该行为违反了以下哪项制度规定？","o":{"A":"手工管理模式的临柜业务实物印章，须与配套使用的重要空白凭证实行“印证分管”","B":"机控管理模式下，用印审批岗及印控仪操作岗须平行交接","C":"临柜业务实物印章管理系统中业务管理员和系统管理员不得混岗","D":"临柜业务实物印章应实行“谁使用、谁保管、谁负责”的原则"},"a":"C"},{"id":200,"q":"某支行在自助设备加配钞业务中，钞箱管理A、B岗人员连续在岗时间超过1个季度，且未进行轮换。该行为违反了以下哪项制度规定？","o":{"A":"钞箱管理A、B岗每月至少轮换1人，每次轮换至少一个清机周期","B":"钞箱管理A、B岗每季至少整体换岗一次，每次换岗至少一个清机周期","C":"钞箱管理A、B岗连续在岗时间不得超过1个月","D":"钞箱管理A、B岗每年至少轮换1人，每次换岗时间至少一个月"},"a":"A"},{"id":201,"q":"某客服经理在为客户办理账户开立业务时，发现客户提供的身份证明文件不完整，但该客服经理仍为客户办理了账户开立业务。该行为违反了以下哪项规定？","o":{"A":"严禁控制客户账户，与客户发生非正常资金往来","B":"严禁为资料不完整、不合规的客户办理账户开立、变更和销户业务","C":"严禁伪造、变造、盗窃、套取、藏匿或擅自销毁重要空白凭证","D":"严禁为客户提供虚假回执、余额查询单等虚假资信证明"},"a":"B"},{"id":202,"q":"某客服经理在日常业务中，擅自使用他人名章和操作卡办理业务，导致客户资金被错误划转，形成重大风险事件。该行为违反了以下哪项规定？","o":{"A":"严禁员工违规代客户办理业务","B":"严禁使用他人名章、操作卡、密码、业务印章进行业务操作","C":"严禁员工以银行名义私自代客理财","D":"严禁员工违规授权"},"a":"B"},{"id":203,"q":"某员工因存在《中国农业银行员工行为排查管理办法》所列的异常行为，已被暂停用户号使用。现拟恢复其用户号使用权限，以下哪个做法是符合制度规定的？","o":{"A":"直接恢复用户号，无需任何审核","B":"重新审核其任职条件和任职资格","C":"由其所在部门出具书面说明后即可恢复","D":"根据整改情况决定是否恢复或重新建立用户号"},"a":"D"},{"id":204,"q":"根据《中国农业银行金库运营业务管理办法》的相关规定，对于确认存在异常行为的金库运营业务人员，应采取的处理措施是？","o":{"A":"继续安排其处理账、证、印、库等业务","B":"仅对其经手业务进行排查","C":"立即停用系统用户、对其经手业务进行排查，并调离岗位","D":"由运营管理部门重新评估其岗位适配性"},"a":"C"},{"id":205,"q":"根据《中国农业银行临柜业务实物印章管理实施细则》规定，业务专用章应如何管理？","o":{"A":"必须纳入印控仪管理","B":"可以选择纳入印控仪管理或手工管理","C":"仅限于手工管理模式","D":"由营业机构自行决定管理方式"},"a":"A"},{"id":206,"q":"客服经理在使用印控仪进行用印操作时，发现上一工作日的某笔用印申请因未及时撤销，系统已自动强制作废。此时，内勤行长或授权人应如何处理？","o":{"A":"无需处理，系统已自动完成核销","B":"通过“66407 用印申请强制作废核销”交易进行批量核销","C":"直接删除系统中强制作废记录","D":"由客户经理协助完成核销操作"},"a":"B"},{"id":207,"q":"在印控仪开启期间，以下哪种行为是制度明确禁止的？","o":{"A":"双人监督开启、清洗、安装、关闭等操作","B":"在监控录像清晰可见范围内操作","C":"为提高效率，取出印章手工加盖","D":"关闭印控仪前执行“66402 关闭电子锁”交易"},"a":"C"},{"id":208,"q":"客服经理在日终签退前，应如何整理本人业务凭证？","o":{"A":"按照超级柜台凭证、内勤行长凭证、客服经理凭证的顺序整理","B":"按照BoEing、一体化平台、其他系统顺序，编号由小到大整理","C":"按照业务发生时间先后顺序整理","D":"按照客户编号从小到大整理"},"a":"B"},{"id":209,"q":"柜面经理在正式签退前，系统进行传票号连续性校验和末笔交易校验。若由于系统原因导致未通过校验，应如何处理？","o":{"A":"柜面经理可直接签退","B":"柜面经理应等待系统自动修复后签退","C":"运营主管确认传票及附件完整后，可“3+0”授权柜面经理签退","D":"柜面经理应向科技部门报修后签退"},"a":"C"},{"id":210,"q":"客户办理行内汇兑业务时，客服经理在审核凭证时发现凭证使用错误，交易类别与凭证不匹配。根据制度要求，客服经理应如何处理？","o":{"A":"直接为客户办理业务，后续再补交正确凭证","B":"拒绝办理业务，并提示客户提交符合规定的凭证","C":"为客户更换其他业务类型，继续办理","D":"由客户签字确认后继续办理业务"},"a":"B"},{"id":211,"q":"客户提交的转账支票存在手工涂改、大小写金额不符、支票与进账单金额不一致的情况，客服经理在受理时应如何处理？","o":{"A":"直接为客户办理业务，后续由客户自行补正","B":"拒绝受理，并要求客户重新填写完整、正确的凭证","C":"在系统中备注说明后继续办理业务","D":"核对预留印鉴和支付密码后继续办理业务"},"a":"B"},{"id":212,"q":"客户提交的支票与进账单金额不一致，客服经理应如何处理？","o":{"A":"直接办理业务，后续由客户自行更正","B":"要求客户重新填写正确金额的凭证","C":"在系统中手工修改金额后继续办理","D":"仅核对金额大写，忽略小写金额差异"},"a":"B"},{"id":213,"q":"在办理个人客户信息业务时，交易成功后，客服经理应如何处理客户签名？","o":{"A":"请客户在纸质传票上签字","B":"请客户在柜外清上签字或电子指纹签名","C":"无需客户签字，系统自动完成","D":"由他人代客户签字"},"a":"B"},{"id":214,"q":"客户在超级柜台办理业务时，因申请书漏签名，客服经理需进行补打处理。根据制度规定，补打后的申请书应如何处理？","o":{"A":"直接交客户签字后归档","B":"由客户补签后交内勤行长签字确认，再按类别保管","C":"由客户补签后直接销毁","D":"由客服经理代客户签字后归档"},"a":"B"},{"id":215,"q":"根据《中国农业银行运营档案管理办法》规定，客服经理在整理纸质运营档案时，应按照什么顺序整理本人凭证？","o":{"A":"一体化平台、BoEing、其他系统","B":"BoEing、一体化平台、其他系统","C":"其他系统、BoEing、一体化平台","D":"一体化平台、其他系统、BoEing"},"a":"B"},{"id":216,"q":"某网点在日常运营中，客服经理临时保管的纸质运营档案未妥善保管，但未发生遗失、被窃、损毁或擅自篡改、销毁的情况。根据《中国农业银行运营档案管理办法》的相关规定，以下哪项是正确的处理方式？","o":{"A":"只要档案未遗失，无需特别处理","B":"未移交入库的运营档案应放入视频监控范围内的保险柜或档案柜并上锁保管","C":"可将档案临时存放在办公桌抽屉中，方便日常查阅","D":"可由客服经理自行决定保管方式"},"a":"B"},{"id":217,"q":"某网点在日常检查中发现，柜员现金箱中的贵金属实物与BoEing系统登记信息存在不一致的情况。根据制度要求，以下哪项操作是正确的？","o":{"A":"由柜员自行核对并调整系统数据","B":"由内勤行长（或其授权人）进行账实核对，并确保贵金属按企业、产品、破损标识等与实物逐一核对","C":"由客户经理协助核对贵金属库存明细","D":"由网点负责人直接修改系统数据以保持一致"},"a":"B"},{"id":218,"q":"某营业机构在印章管理过程中，发现其业务专用章登记簿存在登记不规范、印章使用记录不完整的问题。根据《中国农业银行临柜业务实物印章管理实施细则》的相关规定，以下哪项操作是正确的？","o":{"A":"业务专用章登记簿只需记录印章启用日期，无需记录停用日期","B":"业务专用章登记簿应由印章保管人定期检查，确保登记内容完整、准确","C":"业务专用章登记簿可以由任意柜员代为登记，无需专人负责","D":"业务专用章登记簿只需在印章停用时登记，日常使用无需记录"},"a":"B"},{"id":219,"q":"根据《中国农业银行重要空白凭证管理办法》规定，对于未实现系统自动销号的重要空白凭证，应如何进行登记管理？","o":{"A":"应在业务系统中进行手工销号","B":"应在相应系统登记簿中登记收、发、存、使用情况","C":"可通过纸质登记簿替代系统登记簿","D":"可由他人代为登记，无需本人操作"},"a":"B"},{"id":220,"q":"某网点库保管区门控密钥管理不规范，存在登记簿未按要求登记密钥交接情况。根据《中国农业银行金库运营业务管理办法》相关规定，以下哪项操作是正确的？","o":{"A":"密钥交接时无需登记，由交接双方口头确认即可","B":"密钥交接应登记《柜面业务交接登记簿》或《业务印章、钥匙等物品及密码保管使用登记簿》","C":"密钥交接仅需登记交接人姓名，无需登记交接时间","D":"密钥交接登记簿可由他人代为填写，无需交接人签字"},"a":"B"},{"id":221,"q":"某支行在代保管业务操作中，未对代保管物品进行封装并使用一次性封签签章，导致登记簿管理不规范。根据《中国农业银行金库运营业务管理办法》相关规定，以下哪项操作是正确的？","o":{"A":"代保管物品可直接放入金库，无需封装","B":"代保管物品应入封箱包（袋），并使用一次性封签进行签章、封装","C":"代保管物品只需由委托部门确认，无需金库确认封箱包数量及完好性","D":"代保管物品可由客服经理自行保管，无需入金库"},"a":"B"},{"id":222,"q":"某营业机构在假币管理过程中，因登记簿管理不规范，导致假币交接记录不完整。根据制度要求，假币管理人员变动、假币实物解缴、交接等情况应如何处理？","o":{"A":"可在系统中登记，也可在《柜面业务交接登记簿》中登记","B":"只能在系统中登记，不得在纸质登记簿中登记","C":"只需口头交接，无需书面登记","D":"可在《业务印章、钥匙等物品及密码保管使用登记簿》中登记"},"a":"A"},{"id":223,"q":"根据《关于运营管理平台网点查库和物品管理应用功能上线运行的通知》(运营管理部便函〔2024〕24号)相关规定，以下关于重要物品管理的说法，哪一项是正确的？","o":{"A":"重要物品的编号可以由各网点自行决定，无需统一","B":"重要物品的领入、启用、交接、停用、上缴等环节应实现全生命周期闭环管理","C":"重要物品的交接方式无需参数化配置，可由柜员自由选择","D":"重要物品的分类和命名可由客户经理根据业务需要临时设定"},"a":"B"},{"id":224,"q":"根据《中国农业银行票据业务柜面作业规则》（农银规章〔2024〕151号）规定，客服经理在受理司法机关提出的电子商业汇票冻结/解除冻结登记申请时，以下哪项操作是必须的？","o":{"A":"由单人完成录入和复核操作","B":"无需上传司法文书，直接发起冻结登记申请","C":"先上传司法文书等资料至票交所，获取附件批次号后，再发起冻结/解除冻结登记申请","D":"可在冻结登记后补录司法文书信息"},"a":"C"},{"id":225,"q":"某支行在处理个人交易资金托管司法冻结业务时，未按规定登记“协助查询、冻结、扣划登记簿”。该行为违反了以下哪项制度要求？","o":{"A":"有权机关查冻扣业务必须在原合约签订网点办理","B":"托管资金司法查冻扣业务操作必须使用指定交易代码","C":"经办柜面经理和内勤行长须登记“协助查询、冻结、扣划登记簿”","D":"托管资金冻结金额必须小于等于账户余额"},"a":"C"},{"id":226,"q":"某网点在处理单位批量开立借记卡业务时，未按规定登记柜面重要事项登记簿。根据制度要求，网点在登记借记卡业务时应选择哪种业务种类进行汇总登记？","o":{"A":"其他","B":"成品卡-借记卡","C":"电子账户","D":"定期存单"},"a":"B"},{"id":227,"q":"客户在智能服务区办理业务时，客服经理发现客户暂时离开现场，但客户的重要支付工具（如银行卡、密码等）仍留在柜台。此时客服经理应如何处理？","o":{"A":"代客户保管支付工具，等待客户返回","B":"主动提醒客户取回支付工具，不得代为保管","C":"将支付工具交由其他同事保管","D":"将支付工具放入营业室保险柜中保管"},"a":"B"},{"id":228,"q":"客户在办理业务过程中因操作不熟练，客服经理协助其完成业务操作，但未代客户签名、输入密码或确认业务处理结果。该行为是否符合运营条线员工行为规范？","o":{"A":"符合，只要未代客户签名、输入密码即可","B":"不符合，严禁代客户办理业务","C":"符合，协助客户操作不属于违规行为","D":"不符合，但可以口头提醒客户后继续操作"},"a":"B"},{"id":229,"q":"客服经理在为客户办理业务过程中，发现客户因身体原因无法亲自签名，此时正确的处理方式是？","o":{"A":"代客户签名，确保业务顺利办理","B":"请客户家属代为签名","C":"建议客户委托他人持授权书办理业务","D":"拒绝为客户办理业务"},"a":"C"},{"id":230,"q":"营业网点对外营业期间，若内勤行长不在岗，以下哪种做法是符合《中国农业银行营业网点内勤行长管理办法》规定的？","o":{"A":"由柜员临时顶岗，负责网点业务管理","B":"由具备代班主管资格的人员代为履职","C":"暂停对外营业，等待内勤行长到岗后再开展业务","D":"由网点负责人直接参与业务操作，确保业务正常开展"},"a":"B"},{"id":231,"q":"客服经理临时离开工位时，应如何处理业务系统？","o":{"A":"可以将用户号交由他人代为操作","B":"应及时退出系统或锁屏","C":"可以不退出系统，但需口头告知他人不得操作","D":"可以将用户号和密码写在桌面上以便他人使用"},"a":"B"},{"id":232,"q":"根据《中国农业银行营业证照管理办法》规定，营业场所需公示的金融许可证、营业执照应如何保管？","o":{"A":"放入保险柜双人双锁保管","B":"放入储存柜置于监控范围内，由保管责任人每日检查","C":"放入办公桌抽屉中，由柜员自行保管","D":"放在营业场所显眼位置，无需特别保管"},"a":"B"},{"id":233,"q":"某营业机构在日常检查中发现，超级柜台的PDA设备钥匙未按规定妥善保管，而是随意放置在办公桌上。以下哪项是正确的处理方式？","o":{"A":"PDA钥匙可由任意员工保管，无需登记","B":"PDA钥匙应由两名设备管理员分管分用、平行交接","C":"PDA钥匙日间可随意放置，日终需入保险柜保管","D":"PDA钥匙无需登记，可直接交由新员工使用"},"a":"B"},{"id":234,"q":"未移交入库的运营档案应如何保管？","o":{"A":"放入办公桌抽屉并上锁","B":"存放于视频监控范围内的保险柜或档案柜并上锁","C":"交由非运营人员代为保管","D":"暂时放置在未上锁的文件柜中"},"a":"B"},{"id":235,"q":"某网点在日常检查中发现，其信息发布设备的USB端口未加装保护盖，且存在来源不明的U盘接入痕迹。根据《中国农业银行营业网点信息发布管理办法》的相关规定，以下哪项是正确的处理方式？","o":{"A":"由于设备为非联网设备，无需采取物理封堵措施","B":"可临时关闭设备电源，待后续统一处理","C":"应立即加装物理封堵设施，严禁未经授权的接入","D":"可由厂商人员代为处理，无需网点人员干预"},"a":"C"},{"id":236,"q":"在协助有权机关查询客户存款信息时，若发现查询手续不完整、不齐全，客服经理应如何处理？","o":{"A":"直接拒绝办理，无需留存任何材料","B":"在内勤行长审批后继续办理","C":"仅对要件进行形式审查，若不符合要求则不得继续办理","D":"与客户沟通后，可先办理再补充材料"},"a":"C"},{"id":237,"q":"在客户本人查询打印业务中，以下哪些是必须提供的要件？","o":{"A":"客户本人有效身份证件","B":"客户借记卡或存折","C":"查询申请书","D":"两名查询人员有效身份证件"},"a":"A"},{"id":238,"q":"客服经理在日常业务操作中，因工作需要查询客户信息时，以下哪种行为是符合制度规定的？","o":{"A":"为完成客户身份识别，查询客户基本信息","B":"为了解客户消费习惯，查询客户交易明细","C":"为与其他部门沟通客户情况，复制客户信息发送给无关人员","D":"为提高业务办理效率，提前批量查询客户信息"},"a":"A"},{"id":239,"q":"客户服务经理在营业期间违规下载客户信息的行为，违反了以下哪项制度规定？","o":{"A":"严禁网点现场人员代客户操作智能设备","B":"严禁网点现场人员违规查询、下载、复印、截屏打印、拍摄、抄写客户信息","C":"严禁网点现场人员擅自将客户信息对外传输","D":"严禁网点现场人员在客户输入密码时未主动回避"},"a":"B"},{"id":240,"q":"在超级柜台办理业务过程中，前端服务员应履行哪些职责以确保业务合规？","o":{"A":"审核客户是否携带有效身份证件","B":"审核业务申请书客户姓名、身份证姓名与客户签名是否一致，客户本人、身份证影像照、联网核查照片与现场照片是否一致","C":"审核客户是否为本行客户","D":"审核客户是否在业务办理时间内"},"a":"B"},{"id":241,"q":"根据制度规定，前端服务员在办理业务时，应亲见客户本人电子签名或电子指纹签名。以下哪种情况是合规的操作？","o":{"A":"客户无法签名，前端服务员代为完成电子签名","B":"客户无法签名，前端服务员协助客户完成电子指纹签名","C":"客户无法签名，前端服务员未审核申请书直接提交","D":"客户无法签名，前端服务员未亲见客户指纹，仅凭客户口头确认完成业务"},"a":"B"},{"id":242,"q":"根据制度规定，网点保安在营业期间应对工作区域内的自助设备进行巡查。以下哪项是网点保安巡查自助设备时应执行的正确操作？","o":{"A":"每两小时巡查一次自助设备的安全状况","B":"仅检查自助设备表面是否有粘贴物，无需触摸检查","C":"每小时巡查一次自助设备的安全状况，并检查是否有异常物品","D":"仅在客户使用自助设备时进行巡查，其他时间无需关注"},"a":"C"},{"id":243,"q":"某网点自助设备出现故障，设备管理员未进行自检，也未通过系统或电话报修，直接联系了第三方维修人员进行处理。该行为违反了以下哪项规定？","o":{"A":"设备管理员应先自检排除设备故障","B":"设备管理员应直接联系第三方维修人员处理","C":"设备管理员应先进行设备维护再报修","D":"设备管理员应先检查吞卡槽和出钞通道"},"a":"A"},{"id":244,"q":"系统下线或机具终端退出后，业务部门应在多少个工作日内同步删除非人工用户？","o":{"A":"3个工作日","B":"5个工作日","C":"7个工作日","D":"10个工作日"},"a":"B"},{"id":245,"q":"在办理单位账户变更业务时，客户提交的变更申请资料中缺少部分必要要素，客服经理应如何处理？","o":{"A":"直接为客户办理变更业务，后续补交缺失资料","B":"拒绝受理业务，并向客户说明需补充完整资料","C":"在系统中备注缺失要素，继续完成业务流程","D":"仅核对客户身份信息，忽略资料要素完整性"},"a":"B"},{"id":246,"q":"在办理单位账户开立业务时，若客户未提供授权委托书及身份证明材料原件，客服经理应如何处理？","o":{"A":"直接为客户办理业务，后续补交材料","B":"在系统中备注说明后继续办理","C":"拒绝受理该业务，并要求客户补齐相关材料","D":"由客户出具情况说明后继续办理"},"a":"C"},{"id":247,"q":"客户申请办理企业金融服务平台签约业务，由授权代理人办理，柜面人员在审核资料时发现缺少授权委托书。根据制度要求，以下说法正确的是：","o":{"A":"授权委托书可由客户事后补交，不影响业务办理","B":"授权委托书为可选材料，无需提供","C":"授权委托书为必须材料，缺少则不能办理","D":"授权委托书可由客户经理代为出具"},"a":"C"},{"id":248,"q":"某客户为临时机构，拟在我行开立银行结算账户。根据相关制度规定，以下说法正确的是：","o":{"A":"可在任意地点开立多个临时存款账户","B":"可在驻在地开立一个临时存款账户，并同时开立基本存款账户","C":"只能在其驻在地开立一个临时存款账户，不得开立其他银行结算账户","D":"可在多个异地同时开立多个临时存款账户"},"a":"C"},{"id":249,"q":"客户办理银行账户销户手续时，未交回客户留存的预留印鉴卡，也未出具书面情况说明。该行为违反了以下哪项规定？","o":{"A":"营业机构应将账户已加载的支付密码器进行删除","B":"客户无法交回预留印鉴卡的，应出具书面情况说明","C":"客户销户时应交回开户许可证","D":"客户销户时应交回各种重要空白凭证"},"a":"B"},{"id":250,"q":"客户办理银行结算账户销户业务时，存在未将账户已加载的支付密码器进行删除的情况。根据相关制度规定，以下说法正确的是：","o":{"A":"客户销户时无需处理支付密码器","B":"客户销户时必须申请将该账户在所有已加载的支付密码器中删除","C":"只需删除一个支付密码器即可，其他不影响账户销户","D":"支付密码器的删除操作由银行系统自动完成，客户无需申请"},"a":"B"},{"id":251,"q":"根据《中国农业银行银行同业存放账户管理办法》（农银规章〔2017〕160号）规定，营业机构前台业务部门在开立同业存放账户时，应填写开户通知书并明确哪些基本要素？","o":{"A":"客户名称、账户名称、币种、账户功能、账户种类","B":"客户名称、账户名称、账户功能、账户种类、账户余额","C":"客户名称、账户名称、账户功能、账户种类、账户利率","D":"客户名称、账户名称、账户功能、账户种类、账户用途"},"a":"A"},{"id":252,"q":"某支行在为客户开立对公外汇账户后，未在当日完成外汇账户开户登记，导致后续监管信息报送出现迟报。根据《中国农业银行对公外汇账户管理办法（试行）》，该行为违反了以下哪项规定？","o":{"A":"开户行应在开户后3个工作日内完成外汇账户开户登记","B":"开户行应在开户后当日在核心业务系统中完成外汇账户开户登记","C":"开户行应在开户后次日完成外汇账户开户登记","D":"开户行应在开户后5个工作日内完成外汇账户开户登记"},"a":"B"},{"id":253,"q":"在办理本外币合一账户的开立、变更或关闭业务时，若账户同时具备人民币和外币结算功能，应如何执行相关业务数据采集和信息报送？","o":{"A":"仅按照人民银行规定执行","B":"仅按照外汇管理局规定执行","C":"按照人民银行及外汇管理局规定执行","D":"无需执行信息报送要求"},"a":"C"},{"id":254,"q":"某银行在为客户办理单位银行结算账户撤销业务时，未在规定时间内向中国人民银行备案，导致BOEING系统与人行账户管理系统信息不一致。根据相关制度规定，该银行应在撤销账户之日起多少个工作日内向中国人民银行报告？","o":{"A":"1个工作日","B":"2个工作日","C":"3个工作日","D":"5个工作日"},"a":"B"},{"id":255,"q":"某企业在我行开立基本存款账户后，客服经理未及时将开户信息向人民银行备案，导致账户管理系统与BOEING系统信息不一致。根据制度要求，该账户应在开户后多长时间内完成备案？","o":{"A":"1个工作日内","B":"2个工作日内","C":"3个工作日内","D":"当日最迟不超过当日"},"a":"D"},{"id":256,"q":"某网点在处理长期不动户恢复业务时，未按规定要求客户提供《对公客户尽职调查表》，直接进行了账户恢复操作。该行为违反了以下哪项规定？","o":{"A":"客户主动申请恢复不动户的，无需提供尽职调查资料","B":"客户主动申请恢复不动户的，客户需提供《对公客户尽职调查表》","C":"非客户原因网点误转入不动户的，仍需提供尽职调查资料","D":"账户恢复操作无需审核尽职调查资料"},"a":"B"},{"id":257,"q":"某客户原单位账户因工商注销已被转为长期不动户，后该账户被违规恢复并继续使用。根据《中国农业银行人民币单位银行结算账户业务审查操作规程》（农银规章〔2024〕3号），以下哪项操作是合规的？","o":{"A":"客户经理口头确认客户身份后，直接恢复账户使用","B":"客户经理通过电话核实客户意愿后，恢复账户使用","C":"客户经理参照新开户流程，完成身份核实、意愿确认、经营地址核实后恢复账户使用","D":"客户经理仅核对客户营业执照复印件后恢复账户使用"},"a":"C"},{"id":258,"q":"某客服经理在办理客户付款业务时，未按要求进行印鉴核验，但未涉及逆程序验印或不验印问题。根据制度规定，以下哪种操作是合规的？","o":{"A":"直接跳过验印步骤，由客户签字确认","B":"采用人工折角验印，但未换人复核","C":"采用人工辅助验印，并由另一人复验","D":"仅使用自动验印，未进行任何人工复验"},"a":"C"},{"id":259,"q":"在预留印鉴建库完成前，若客户需办理付款业务，客服经理应如何处理？","o":{"A":"直接使用电子验印系统进行验印","B":"无需验印，直接办理付款业务","C":"根据留存的预留印鉴卡进行手工折角验印，并换人复核","D":"由客户出具书面说明后直接付款"},"a":"C"},{"id":260,"q":"客户申请将单位账户的支付方式由支付密码变更为预留印鉴，客服经理在办理过程中应如何操作？","o":{"A":"直接在系统中进行变更操作，无需客户提交任何材料","B":"要求客户提交书面申请，并核对客户身份后办理","C":"仅通过电话核实客户意愿后即可办理","D":"由客户经理口头确认后即可办理"},"a":"B"},{"id":261,"q":"客户办理企业金融服务平台证书补办业务时，无法提供待补办操作员身份证件原件。根据制度规定，以下哪种处理方式是正确的？","o":{"A":"直接拒绝为客户办理业务","B":"由客户经理核实后在复印件上标注“与原件核对一致”并双人签章即可办理","C":"需提供经分行差异化业务办理流程审批通过的相关证明材料后方可办理","D":"由客户出具书面说明后即可办理"},"a":"C"},{"id":262,"q":"在办理企业金融服务平台证书申请或补办业务时，客户领取K宝和密码信封后，客服经理应如何处理？","o":{"A":"将K宝和密码信封交还客户，不得截留","B":"为防止客户遗失，可暂时代为保管","C":"由客户签字确认后统一保管","D":"由三级主管审核后统一保管"},"a":"A"},{"id":263,"q":"客服经理在办理票据业务时，未按规定对票据的真伪及要素完整性进行审核，导致违规受理了无效票据。根据《中国农业银行票据反假管理办法》，以下哪项是该行为违反的制度要求？","o":{"A":"票据真伪审验必须坚持“双人审验”制度","B":"票据业务操作必须由主管授权后方可办理","C":"票据业务必须在监控下完成","D":"票据业务必须在客户视线范围内办理"},"a":"A"},{"id":264,"q":"某客服经理在办理银行汇票兑付业务时，未对汇票的实际结算金额与出票金额进行核对，导致错误兑付。该行为违反了以下哪项制度规定？","o":{"A":"必须核对汇票的出票金额与实际结算金额是否一致","B":"必须核对汇票的出票日期与提示付款期限是否一致","C":"必须核对持票人签章与预留印鉴是否一致","D":"必须核对汇票是否为现金汇票"},"a":"A"},{"id":265,"q":"办理纸质银行承兑汇票贴现业务时，以下哪种情形必须进行实地查询？","o":{"A":"客户为老客户，且贴现金额为800万元","B":"客户为新客户，且贴现金额为1200万元","C":"客户为老客户，且贴现金额为1000万元","D":"客户为新客户，且贴现金额为800万元"},"a":"B"},{"id":266,"q":"某客服经理在日常业务处理中，发现系统中存在已兑付的银行本票记录，但未及时抽撤相关底卡，导致银行本票系统记录与底卡不符。根据《中国农业银行银行本票业务管理办法》相关规定，该行为违反了以下哪项制度要求？","o":{"A":"银行本票专用章和银行本票凭证应由不同人员保管","B":"客服经理应每日通过系统查阅是否存在已兑付待抽撤卡片的记录，并根据记录抽取、处理已兑付本票卡片","C":"未使用的空白银行本票应账实相符","D":"挂失/法院止付受理依据的材料应齐全、及时并经内勤行长审批"},"a":"B"},{"id":267,"q":"根据《中国农业银行票据业务柜面作业规则》（农银规章〔2024〕151号）的相关规定，客服经理在处理电子商业汇票业务时，发现“票交所待清算款项专户（尾号4499D）”余额不为零，应如何处理？","o":{"A":"无需处理，次日继续办理业务","B":"立即查明原因，并登记《内勤行长工作日志》","C":"直接将余额转入其他账户","D":"由客户自行处理相关账务"},"a":"B"},{"id":268,"q":"客户通过转账支票方式存入保证金，客服经理在办理保证金账户开立业务时，未对转账支票进行验印。该操作违反了以下哪项规定？","o":{"A":"客服经理应审核转账支票金额与开户申请书金额是否一致","B":"客服经理应审核转账支票的出票人签章是否符合规定","C":"客服经理应审核转账支票的签章是否与预留银行印鉴相符","D":"客服经理应审核进账单填写要素是否规范"},"a":"C"},{"id":269,"q":"在办理企业金融服务平台签约注册业务时，客服经理发现客户提供的《企业金融服务平台申请表》中注册账户的印鉴与开户时预留银行信息不符，应如何处理？","o":{"A":"直接为客户办理业务，后续由客户经理补交正确印鉴","B":"要求客户重新提供与开户预留信息一致的印鉴","C":"由客户经理在申请表上签字确认后继续办理","D":"由客户经理出具说明文件后继续办理"},"a":"B"},{"id":270,"q":"在办理单位客户行内汇兑业务时，若单笔汇款金额为人民币100万元（含）以上，客服经理应如何处理？","o":{"A":"直接办理，无需额外审核","B":"由本人复验印鉴，无需电话查证","C":"换人复验印鉴，并按当地规范履行电话查证","D":"仅需电话查证，无需复验印鉴"},"a":"C"},{"id":271,"q":"某单位在办理对公非活期存款业务时，存在以下操作行为，其中违反《中国农业银行对公非活期、新型存款、法人客户透支业务柜面作业规则》规定的是：","o":{"A":"单位定期存款资金来源于其单位结算账户","B":"存款到期后，资金通过转账方式转入其基本存款账户","C":"存款到期后，资金通过转账方式转入其一般存款账户","D":"存款资金来源于他行同名结算账户"},"a":"C"},{"id":272,"q":"某营业机构在办理一笔单位账户大额资金划转业务时，未按照当地监管要求开展电话查证。该行为违反了以下哪项规定？","o":{"A":"大额资金划转必须由客户经理现场确认","B":"大额资金划转必须换人验印","C":"大额资金划转必须由主管行长审批","D":"大额资金划转必须进行双人复核"},"a":"B"},{"id":273,"q":"某支行在处理一笔托管资金转出业务时，未按照《托管资金转出指令》中的要求进行审核，导致资金支付不符合协议约定。根据《中国农业银行交易与专项资金托管业务柜面作业规则》（农银规章〔2023〕179号），以下哪项是该笔业务操作中必须审核的内容？","o":{"A":"客户经理是否已提供《加强型尽职调查表》","B":"《托管资金转出指令》上加盖的印鉴是否与《托管指令授权书》中约定的付款委托人预留印鉴一致","C":"转入账户是否为基本存款账户","D":"客户是否为本行VIP客户"},"a":"B"},{"id":274,"q":"某客户在办理对账签约业务时，非法定代表人本人前来办理，但未提供法定代表人授权委托书。客服经理在未核实授权情况的前提下，直接为客户办理了对账签约业务。该行为违反了以下哪项制度规定？","o":{"A":"客户资料必须齐全，包括营业执照原件及复印件","B":"非法定代表人办理时，应提供授权委托书并核实授权代理人身份","C":"对账方式选择电子方式的，应首先开通相关产品","D":"对账周期选择“按季”的，需由二级分行运营管理部负责人审批"},"a":"B"},{"id":275,"q":"某营业机构违规处理对账不符情况，将对账单的收发和对账不符处理工作交由营业机构负责。根据《中国农业银行对账管理办法》的相关规定，以下说法正确的是：","o":{"A":"营业机构可以负责对账单的收发和对账不符处理工作","B":"对账单的收发和对账不符处理工作应由运营管理部门负责","C":"对账单的收发和对账不符处理工作可以由客户部门负责","D":"对账单的收发和对账不符处理工作可以由网络金融部门负责"},"a":"B"},{"id":276,"q":"某客服经理在为一位未在本行开立账户的客户办理现金汇款业务时，未按规定开展尽职调查，且未留存相关尽调资料。该行为违反了以下哪项制度规定？","o":{"A":"与客户建立业务关系时，必须进行持续尽职调查","B":"为未开立账户的客户提供一次性金融服务且金额达到1万元（含）以上时，应开展准入尽职调查并留存资料","C":"客户身份资料应由客户自行提供，银行无需留存","D":"仅需在客户首次开立账户时进行尽职调查，后续无需更新"},"a":"B"},{"id":277,"q":"在办理批量开户业务时，若发现被代理人身份证明材料缺失，客服经理应如何处理？","o":{"A":"直接为客户开立账户，后续补交材料","B":"拒绝办理，要求客户补充完整身份证明材料","C":"仅核查单位负责人身份，忽略被代理人材料缺失问题","D":"为客户开立匿名账户，避免业务延误"},"a":"B"},{"id":278,"q":"客服经理在办理客户信息修改业务时，发现客户未提供书面或电子授权，此时应如何处理？","o":{"A":"为提高效率，可先办理业务，后续补签授权书","B":"可在客户口头同意后办理业务","C":"应拒绝办理，须在取得客户书面或电子授权后方可办理","D":"可由客户家属代为签署授权书后办理"},"a":"C"},{"id":279,"q":"柜面在办理需联网核查的业务时，客户出示二代身份证，但客服经理未通过二代身份证阅读器进行机读，而是直接手工输入身份证信息。该行为违反了以下哪项规定？","o":{"A":"对于二代身份证，应通过二代身份证阅读器机读","B":"对于无法机读的二代身份证，可直接手工输入信息","C":"对于二代身份证，可优先选择行内核查","D":"对于二代身份证，可不进行联网核查"},"a":"A"},{"id":280,"q":"客服经理在无真实业务背景的情况下，违规为客户进行联网核查，该行为违反了以下哪项规定？","o":{"A":"严禁代客户办理业务","B":"严禁未按客户意愿或无真实业务背景办理业务","C":"严禁代客户保管支付工具","D":"严禁代其他员工操作系统"},"a":"B"},{"id":281,"q":"在办理企业信息联网核查业务过程中，若发现客户提供的证明文件为虚假证件，客服经理应当如何处理？","o":{"A":"继续为客户办理业务，后续再核实","B":"立即终止与客户的业务关系","C":"及时向上级部门和当地公安机关报案","D":"仅在系统中记录异常情况，不作其他处理"},"a":"C"},{"id":282,"q":"客户在办理业务时，提供了辅助身份证明材料。根据制度规定，客服经理在业务处理中应如何操作？","o":{"A":"无需留存辅助身份证明材料","B":"应留存辅助身份证明材料的原件或复印件","C":"可选择性留存辅助身份证明材料","D":"只需留存身份证复印件，无需留存辅助材料"},"a":"B"},{"id":283,"q":"客户持非机读二代身份证办理业务，客服经理在业务处理过程中未留存客户身份证复印件或电子影像信息。该行为违反了以下哪项规定？","o":{"A":"必须使用二代身份证阅读器进行机读","B":"对于无法机读的二代身份证，应手工输入信息并留存客户身份证复印件或电子影像","C":"所有身份证件必须进行人行核查","D":"必须要求客户出示辅助身份证明材料"},"a":"B"},{"id":284,"q":"柜面人员在办理需进行客户身份识别的业务时，若已取得客户授权，应通过以下哪种方式协助进行人证合一比对？","o":{"A":"仅进行手工核对","B":"通过人脸识别或指纹识别技术","C":"通过客户口头确认","D":"通过客户签字确认"},"a":"B"},{"id":285,"q":"客户由他人代理办理需提供有效身份证件的业务时，以下哪项操作是正确的？","o":{"A":"只需核查被代理人身份，无需核查代理人身份","B":"只需留存代理人身份证复印件，无需进行联网核查","C":"应同时核查代理人和被代理人身份，并留存影像件","D":"可通过电话核实代理人身份，无需提供身份证原件"},"a":"C"},{"id":286,"q":"客户到网点申请开通个人网上银行和掌上银行服务，客服经理在未征得客户同意的情况下，擅自为客户开通了电子渠道业务，并未将K宝交付客户。该行为违反了以下哪项规定？","o":{"A":"客户必须本人到网点办理电子渠道签约业务","B":"客服经理必须根据客户申请为客户选择开通渠道","C":"客户必须提供有效身份证件和注册账户凭证","D":"客服经理必须将K宝或K令交付客户并告知使用方法"},"a":"B"},{"id":287,"q":"某客服经理在为客户办理账户通兑方式修改业务时，未按制度要求在系统中输入新支控方式，导致新支控方式与修改前一致。该操作违反了以下哪项规定？","o":{"A":"修改后的新支控方式可以与修改前一致","B":"新支控方式维护后即时生效","C":"新支控方式不能与修改前一致","D":"修改支控方式时无需客户输入新密码"},"a":"C"},{"id":288,"q":"客户在办理活期一本通存折开户业务时，客服经理未按要求打印存折扉页及第一条存款记录，也未完成写磁操作。该行为违反了以下哪项制度规定？","o":{"A":"交易成功后应打印客户回单并交客户","B":"开立活期一本通存折账户时，需打印存折和完成存折写磁，并核对打印的扉页和第一条存款记录内容是否正确","C":"存折销户时需在扉页加盖“内页已取，客户签收”字样","D":"换折时需将旧存折内页撕下并扫描扉页"},"a":"B"},{"id":289,"q":"某客服经理在为客户办理大额转账业务时，发现客户单笔转账金额超过本行审核权限。为避免触发审核流程，该客服经理在未征得客户明确同意的情况下，将该笔业务拆分为多笔小额交易分别办理。该行为违反了以下哪项规定？","o":{"A":"严禁在应审核未审核或明知违规情况下，进行审批、授权","B":"严禁未按客户意愿或无真实业务背景办理业务","C":"严禁代客户操作或擅自修改客户交易指令","D":"严禁利用职务之便，为本人或他人谋取不正当利益"},"a":"B"},{"id":290,"q":"客服经理在办理个人存取款业务过程中，发现存在资金实物与账务不匹配的情况，如空存实取。根据制度要求，以下哪项操作是正确的？","o":{"A":"为提高效率，先付款后记账","B":"为避免客户投诉，先记账后付款","C":"严格按照“先收款、后记账”和“先记账、后付款”的原则办理业务","D":"在客户不知情的情况下进行空存空取操作"},"a":"C"},{"id":291,"q":"客服经理在操作通用账户时，将“动账控制标志”由“10-动账关注”修改为“00-允许手工动账”后，未及时调回原状态。根据相关制度要求，以下哪项操作是正确的？","o":{"A":"修改后无需调回，只要在操作时做好登记即可","B":"修改后应根据业务实际需要及时调回原状态，避免账户权限失控","C":"只要不发生客户资金损失，修改后不调回不影响合规性","D":"修改后调回与否由上级领导决定，客服经理无权处理"},"a":"B"},{"id":292,"q":"某客服经理在办理业务过程中，发现客户未提供真实业务背景材料，但为完成业务指标，仍为客户办理了相关账务处理。该行为违反了以下哪项规定？","o":{"A":"严禁未按客户意愿或无真实业务背景办理业务","B":"严禁私自代客户办理业务","C":"严禁违规查询客户信息","D":"严禁擅自修改客户账户信息"},"a":"A"},{"id":293,"q":"客服经理在日常业务操作中，发现某员工存在将银行通用账户资金用于非业务用途的行为。根据《关于严格遵守运营条线员工行为“十个严禁”规定（试行）的通知》（农银运营〔2022〕4号）的相关规定，该行为违反了哪一项禁止性规定？","o":{"A":"严禁空存、空调现金","B":"严禁控制客户账户，与客户发生非正常资金往来，截留、挪用客户资金、银行资金或权利凭证","C":"严禁违规代客户办理业务","D":"严禁擅自修改客户信息"},"a":"B"},{"id":294,"q":"某营业机构在日常业务中，发现某通用账户在日终存在余额，未按规定归零。根据《中国农业银行BoEing系统通用账户管理办法》的相关规定，以下哪项操作是正确的？","o":{"A":"柜员可自行进行冲账处理，无需审批","B":"应由运营主管审批后，柜员依据真实、合规的原始凭证进行冲、抹账处理","C":"只要账户余额不大，可暂时不处理，待下次日终再调整","D":"由客户经理直接联系客户进行账务调整"},"a":"B"},{"id":295,"q":"根据《关于全面梳理通用账户的通知》要求，以下哪些行为属于违规使用通用账户的情形？","o":{"A":"通用账户用于正常内部业务结算","B":"通用账户用于临时挂账且日终余额未清零","C":"通用账户用于核算员工工资发放","D":"通用账户用于核算客户贷款利息收入"},"a":"B"},{"id":296,"q":"某支行在日常业务中发现一笔长期挂账未及时处理的账务，涉及“000144 其它应付款暂收结算款项”账户。根据制度要求，此类账户暂无归属部门，处理此类挂账业务时应如何操作？","o":{"A":"由柜员直接处理，无需审批","B":"经二级分行或以上业务和运营部门负责人审批后方可处理","C":"由支行行长口头同意后即可处理","D":"由客户经理确认后即可入账"},"a":"B"},{"id":297,"q":"客户因业务办理错误申请退费，原收费已开具增值税专用发票。客服经理在处理退费时，未追回原发票。根据《中国农业银行增值税发票开具管理规定》，以下哪项操作是正确的？","o":{"A":"无需追回原发票，直接开具红字发票即可","B":"应追回原发票，无法追回的应取得客户提供的有效证明材料","C":"只需在系统中进行冲抹账操作，无需处理发票","D":"由客户自行处理发票，银行无需介入"},"a":"B"},{"id":298,"q":"某客服经理在处理一笔对公账户退费业务时，发现原收费交易已开具增值税发票。根据制度要求，该客服经理应首先执行哪项操作？","o":{"A":"直接执行退费交易","B":"通过【65401 涉税冲正退费交易关联处理】交易进行关联处理","C":"收回原发票并使用【65201 已开发票作废】或【65105 红字发票开具】交易处理","D":"无需处理，次日系统自动完成销项登记"},"a":"C"},{"id":299,"q":"某客服经理在处理一笔小额支付普通贷记业务时，发现往账信息存在疑问，但未按规定及时发出查询。该行为违反了以下哪项制度要求？","o":{"A":"发现差错时，应立即联系客户进行更正","B":"对有疑问、有差错的往账或来账，应于当日通过原系统发出查询、退回申请或止付申请","C":"查询查复业务应由客户经理负责处理","D":"差错业务可由客户自行联系接收行处理"},"a":"B"},{"id":300,"q":"某客服经理在处理一笔来账业务时，发现报文信息不完整，无法自动清分。该客服经理未及时通过查询查复完成待清分业务处理，导致业务处理延误。该行为违反了以下哪项制度规定？","o":{"A":"查询查复应遵循“有疑必查、查必彻底、有查必复、复必详尽”的原则","B":"对于报文信息不完整无法自动清分的，业务处理中心应及时通过查询查复完成待清分业务处理","C":"日终前，各业务受理渠道的经办机构通过查询业务信息，及时处理当日待处理业务","D":"对发现差错或有疑问的支付业务应向对方行查询，处理差错时，应根据查询查复结果，进行后续处理"},"a":"B"},{"id":301,"q":"某客服经理在处理一笔跨境支付业务时，收到境外银行的查询报文。该客服经理在未核实本行支付清算处理是否无误的情况下，直接对外进行了查复。该行为违反了以下哪些制度要求？","o":{"A":"查询查复应先内查，后外查","B":"查询查复渠道应与原支付清算业务或查询查复来报渠道保持一致","C":"查询查复报文应要素齐全、表达简明、真实有据","D":"在收到查询报文后，须在T+1工作日内予以处理"},"a":"A"},{"id":302,"q":"在处理网内往来业务时，若接收行发现来账存在币种、金额或业务种类的差错，正确的处理方式是？","o":{"A":"通过查询查复方式与对方行协商更正","B":"直接修改来账信息后入账","C":"做退回处理，不得通过查询查复代为更正","D":"由客户提交书面说明后继续处理"},"a":"C"},{"id":303,"q":"某营业机构收到一笔贷记来账，经人工核销后，因未能在规定期限内完成入账处理，遂将该笔款项转入“应解汇款及临时存款”科目。但后续未及时进行后续处理，导致该科目长期挂账。该操作违反了以下哪项制度规定？","o":{"A":"贷记来账直接入账的，收款人开户行只需在集中式回单系统打印网内自动入账通知书","B":"贷记来账人工核销超过规定限额的，须经主管授权","C":"转入应解汇款及临时存款科目的贷记来账应及时进行后续处理","D":"营业机构运营主管应每日检查是否存在未及时处理的往来借记、贷记及查询查复业务"},"a":"C"},{"id":304,"q":"客服经理在处理代发工资业务时，发现客户提交的电子数据格式不规范。以下哪种做法是合规的？","o":{"A":"为客户修改电子数据格式并代为提交","B":"代客户核对数据内容并确认无误后提交","C":"告知客户需自行修改数据格式后重新提交","D":"代客户联系技术部门处理数据格式问题"},"a":"C"},{"id":305,"q":"某网点在办理代发工资业务时，发现代发工资款项来源于委托单位在其他银行开立的账户，且未转入本行内部核算账户。该操作是否符合代发工资业务管理规定？","o":{"A":"符合，只要款项来源真实即可","B":"不符合，应将款项转入本行内部核算账户并注明用途","C":"符合，只要委托单位出具说明即可","D":"不符合，应直接使用原账户进行代发"},"a":"B"},{"id":306,"q":"某支行客服经理在协助司法机关办理对公账户冻结业务时，未在《协助冻结存款通知书》回执上注明实际冻结余额，导致回执信息不完整。该行为违反了以下哪项制度规定？","o":{"A":"客服经理应先与有权机关执法人员确认回执内容含义，再按要求填写回执","B":"客服经理应将执法人员工作证件原件交有权机关执法人员","C":"客服经理应将业务凭证专夹保管","D":"客服经理应将冻结通知书复印件交有权机关执法人员"},"a":"A"},{"id":307,"q":"在办理个人定期存单质押止付业务时，运营人员未按规定对存单的真伪进行鉴别，也未对相关资料进行核对。该行为违反了以下哪项制度规定？","o":{"A":"质押物须真实有效，质押时为正常可质押状态","B":"贷款行和质押物开出行必须属同一城市（地级市范围内）","C":"借款人须亲自到场办理，并将质押凭证交给调查人员","D":"以个人理财产品质押的，借款人须亲自到场办理"},"a":"A"},{"id":308,"q":"某支行在办理个人质押贷款业务过程中，因未按规定对质押的定期存单进行止付处理，导致质押资金被提前支取，造成资金损失。根据《中国农业银行个人贷款业务柜面作业规则》的相关规定，以下哪项是该支行在质押物审核环节应履行的正确操作？","o":{"A":"只需核对《质押冻结止付通知书》上的质押物清单，无需核对质押物原件","B":"质押物为系统内定期存单的，应核对防伪标识，并确认支取方式为凭密码支取","C":"质押物为凭证式国债的，可不进行真伪核验","D":"质押物支取方式为凭预留印鉴的，可直接接受质押"},"a":"B"},{"id":309,"q":"在办理个人存单质押贷款业务时，若质押物为个人定期存单（含大额存单）或储蓄国债（凭证式），以下哪项操作是合规的？","o":{"A":"由客户经理代客户办理质押手续","B":"由客户本人到场办理，并将质押凭证交由调查人员","C":"由运营人员直接接收客户邮寄的质押凭证并办理止付","D":"由客户亲属代为办理，但提供客户授权书"},"a":"B"},{"id":310,"q":"某网点存在已质押存单未做到“一票一封”，未入金库集中保管的情况。根据《中国农业银行金库运营业务管理办法》的相关规定，以下哪种处理方式是正确的？","o":{"A":"由客服经理自行保管质押存单，确保安全","B":"将质押存单放入客服经理现金箱中保管","C":"对于20个工作日以上到期的质押票据，应入透明票据袋封装后，入金库保管，实行“一票一封”","D":"由客户经理代为保管质押存单，避免银行内部人员接触"},"a":"C"},{"id":311,"q":"某客服经理在处理一笔对公账户错账时，发现是因记账金额错误导致的，遂进行了反向操作以冲销原错误账务。该操作是否符合制度规定？","o":{"A":"符合，反向操作是常见的错账处理方式","B":"不符合，错账处理应通过抹账或冲正交易进行，不得以错纠错","C":"符合，只要金额正确即可，操作方式不影响合规性","D":"不符合，反向操作必须经客户部门审批后方可进行"},"a":"B"},{"id":312,"q":"在进行对公账户手工补息操作时，客服经理未按规定审批即进行手工补息，该行为违反了以下哪项制度要求？","o":{"A":"客服经理可直接根据客户要求进行手工补息操作","B":"补息时，利息调整情况说明等依据须经有权人审批","C":"客服经理可自行决定是否需要审批","D":"补息操作无需提供任何书面说明"},"a":"B"},{"id":313,"q":"柜面办理对公人民币结算套餐费用收取业务时，若业务部门未联动收费，也未在交易完成后通过联机收费交易进行收费，此时应如何操作？","o":{"A":"直接根据客户经理口头通知办理收费","B":"由客户自行提供收费协议后办理","C":"需要业务部门提供《柜面收费通知单》及《对公人民币结算套餐服务协议》后方可办理","D":"无需任何材料，直接办理收费"},"a":"C"},{"id":314,"q":"客户在柜面办理取现业务时，系统弹屏提示该客户为“粉码”潜在被害人，风险等级为“中”。客服经理应如何处理？","o":{"A":"直接为客户办理取现业务，无需额外操作","B":"引导客户签署《客户资金安全风险告知书》，如客户不同意签署，应强制要求其签署","C":"引导客户签署《客户资金安全风险告知书》，如客户不同意签署，应注明“客户不愿签署，已开展风险劝阻”并完成风险提示","D":"不需签署任何文件，直接向客户口头提示风险即可"},"a":"C"},{"id":315,"q":"某银行国库经收处在受理纸质缴款书后，未及时办理转账手续，且在各联次上加盖收（转）讫业务印章的日期不一致。该行为违反了以下哪项规定？","o":{"A":"必须在收纳当日办理报解入库手续","B":"必须及时办理转账，不得无故压票，各联次加盖收（转）讫业务印章的日期必须相同","C":"不得违规为征收机关开立预算收入过渡账户","D":"必须使用“待结算财政款项”科目下的“待报解预算收入”专户进行核算"},"a":"B"},{"id":316,"q":"某银行客服经理在办理代理财政国库集中支付业务时，未能及时将财政机关签发的拨款凭证进行审核并办理支付，导致资金拨付延迟，造成不良后果。根据《国库会计管理规定》（银发〔2005〕304号），以下哪项是该客服经理应遵循的正确操作要求？","o":{"A":"可在收到拨款凭证后两个工作日内办理支付","B":"应在财政机关或代理银行送达的当日将款项划出，最迟不超过下一个工作日","C":"可根据业务量灵活安排拨款时间，无需严格时限","D":"可在收到拨款凭证后三个工作日内办理支付"},"a":"B"},{"id":317,"q":"某银行客服经理在代理财政非税收入收缴业务中，收到财政缴库指令后，未能及时将非税缴款资金报解入库，导致资金未能按时缴入国库。该行为违反了以下哪项规定？","o":{"A":"国库经收处收纳的预算收入，应在收纳当日办理报解入库手续，不得延解、占压和挪用","B":"国库经收处在受理缴款书后，必须及时办理转账，可以根据实际情况，延迟转账","C":"代理国库业务的商业银行应设立“待结算财政款项”一级科目","D":"预算收入必须使用“待报解预算收入”专户核算，不得转入其他科目"},"a":"A"},{"id":318,"q":"在日常业务办理中，某客服经理发现客户存在可疑行为，但该客户未发生任何资金交易。根据制度要求，客服经理应如何处理？","o":{"A":"不需处理，因客户未发生资金交易","B":"应通过系统自动报送可疑交易报告","C":"应通过手工建立可疑交易预警并提交可疑交易报告","D":"应等待客户发生交易后再进行报送"},"a":"C"},{"id":319,"q":"客服经理因事请假，预计连续休假4天，根据制度规定，其现金箱应如何处理？","o":{"A":"视同日终交接处理","B":"可以不“清零”","C":"必须“缴空”","D":"无需处理，由他人代管"},"a":"C"},{"id":320,"q":"柜面经理在营业期间临时离开工作台时，若工作台上的现金及其他物品不在其可视范围内，应如何处理？","o":{"A":"将现金及其他物品留在工作台上，但关闭监控","B":"将现金及其他物品放入客户视线范围内的展示柜中","C":"将现金及其他物品放入柜员现金箱或工作台抽屉中保管","D":"将现金及其他物品交由客户代为保管"},"a":"C"},{"id":321,"q":"柜员在日常工作中发现现金箱账实不相符，应如何处理？","o":{"A":"自行调整账务，确保账实一致","B":"立即报告上级主管，并进行账实核对","C":"暂时不处理，待月底统一核对","D":"仅记录差异，不进行账务调整"},"a":"B"},{"id":322,"q":"某营业机构当日仅设置1个营业窗口办理现金业务，柜面经理需处理库房类现金交易时，应如何操作？","o":{"A":"可直接处理，无需授权","B":"需经内勤行长授权同意","C":"需由其他柜面经理代为操作","D":"需由金库人员上门办理"},"a":"B"},{"id":323,"q":"根据《中国农业银行网点营业场所现场管理办法》相关规定，营业期间内勤行长应履行监督职责，确保柜面经理严格执行“一日两碰箱”制度。以下哪项行为符合制度要求？","o":{"A":"内勤行长在日终碰箱时未现场监督，由客服经理自行完成碰箱操作","B":"内勤行长仅在日初监督碰箱，日终未进行监督","C":"内勤行长在日终碰箱时现场监督，并对现金、重要空白凭证等进行卡大把核对","D":"内勤行长未对“一日两碰箱”执行情况进行检查，仅在系统中记录完成"},"a":"C"},{"id":324,"q":"根据《中国农业银行金库运营业务管理办法》规定，网点库保管区门控在无法全部应用生物密钥的情况下，应配备两个门控，密钥由两个管库员分别掌管，执行何种管理原则？","o":{"A":"单人保管、集中使用","B":"双人分管分用、平行交接","C":"一人保管、一人监督","D":"交叉保管、交叉使用"},"a":"B"},{"id":325,"q":"某网点在日常检查中发现，柜面经理在午休期间未按规定将重要空白凭证放入柜员现金箱保管，而是放置在工作台抽屉中，且该抽屉未上锁。此行为违反了以下哪项规定？","o":{"A":"柜面经理午休时应将现金、贵金属、重要空白凭证等物品全部入柜员现金箱保管","B":"柜面经理午休时可将重要空白凭证放置在工作台抽屉中，因在旁边午休，无需上锁","C":"柜面经理午休时可将重要空白凭证交由他人代保管","D":"柜面经理午休时可将重要空白凭证放置在客户视线范围内的工作台面上"},"a":"A"},{"id":326,"q":"某客服经理在进行重要空白凭证交接时，将本人经管的重要空白凭证交由他人使用，未按规定进行交接操作。根据《中国农业银行重要空白凭证柜面作业规则》的相关规定，以下哪项操作是正确的？","o":{"A":"可以将重要空白凭证交由他人代为保管，不需在系统中登记","B":"重要空白凭证交接必须由监交人监督，交接双方当面清点或审核凭证","C":"重要空白凭证可以由他人代为清点，但需事后补交监交人签字","D":"重要空白凭证交接可由调入柜员自行清点，无需调出柜员参与"},"a":"B"},{"id":327,"q":"某支行在日常业务操作中，对未实现系统自动销号的重要空白凭证，未在相应系统登记簿中登记其收、发、存、使用情况。该行为违反了以下哪项规定？","o":{"A":"重要空白凭证应由专人保管，不得随意放置","B":"未实现系统自动销号的重要空白凭证，应在相应系统登记簿中登记收、发、存、使用情况","C":"重要空白凭证应定期进行盘点核对","D":"重要空白凭证应实行“谁使用、谁负责”的管理原则"},"a":"B"},{"id":328,"q":"以下哪种行为违反了《中国农业银行重要空白凭证管理办法》关于重要空白凭证签发的规定？","o":{"A":"客户自行填写支票内容并加盖预留印鉴","B":"客户购买重要空白凭证后，由银行代为填写付款人信息","C":"银行工作人员根据客户申请，签发银行本票","D":"客户申请开立银行承兑汇票，银行审核后予以签发"},"a":"B"},{"id":329,"q":"某营业机构在处理停用作废的重要空白凭证时，未按照规定逐级上缴至指定库房进行销毁或退回处理。根据《中国农业银行重要空白凭证管理办法》的相关规定，以下哪项操作是正确的？","o":{"A":"可由柜员在凭证箱内直接作废并销毁","B":"应由营业机构自行销毁，无需上缴","C":"应按照销毁通知要求，逐级上缴至二级分行（含）以上金库集中销毁","D":"可由合作方在营业机构内直接销毁"},"a":"C"},{"id":330,"q":"客服经理在日常业务操作中，发现某重要空白凭证已作废或停用，此时应如何处理？","o":{"A":"可继续使用，但需在系统中备注说明","B":"不得使用，应立即上缴并按规定销毁","C":"可临时使用，待后续统一销毁","D":"可交由其他同事代为处理"},"a":"B"},{"id":331,"q":"柜员间进行现金调拨时，应由谁发起调拨交易？","o":{"A":"调出柜员","B":"调入柜员","C":"内勤行长","D":"系统自动发起"},"a":"B"},{"id":332,"q":"客服经理在办理现金调拨业务时，若发现调拨单据与实际调拨金额不符，应如何处理？","o":{"A":"直接按调拨单据金额办理调拨","B":"自行修改调拨单据金额后办理调拨","C":"立即停止办理，并向上级报告异常情况","D":"与调拨人员协商后按实际金额办理"},"a":"C"},{"id":333,"q":"年末决算日，营业机构发现有在途的重要空白凭证，以下哪种处理方式符合制度规定？","o":{"A":"可延至次年1月2日核销","B":"可延至次年1月1日核销","C":"必须在当日完成核销","D":"可延至下一工作日核销"},"a":"C"},{"id":334,"q":"根据《中国农业银行自助（智能）设备加配钞业务管理规定》，以下关于空钞箱保管要求的表述，正确的是：","o":{"A":"空钞箱可以与已装钞箱、回钞钞箱混放，但需做好标识区分","B":"空钞箱应设置专门区域保管，不得随意堆放，并指定专人负责收发","C":"空钞箱可由任意员工临时保管，无需专人负责","D":"空钞箱只需在金库内保管，无需设置专门区域"},"a":"B"},{"id":335,"q":"在自助（智能）设备加配钞业务中，以下哪种操作行为是符合制度规定的？","o":{"A":"单人操作完成钞箱现金清点并上下钞箱","B":"在无监控环境下双人操作完成加配钞","C":"自动清机时由单人完成钞箱更换","D":"在监控下由双人共同完成钞箱现金清点和上下钞箱"},"a":"D"},{"id":336,"q":"在自助（智能）设备钞箱、凭证箱账实不符的情况下，以下哪项操作是内勤行长必须亲自监督完成的？","o":{"A":"回钞金额的系统录入","B":"计划制定、加配钞清机、回钞封装及三方账实核对","C":"现金清分岗的日常操作","D":"自助设备的日常巡检"},"a":"B"},{"id":337,"q":"某客服经理在办理现金取款业务时，先将现金支付给客户，随后才进行系统记账操作。该行为违反了以下哪项制度规定？","o":{"A":"办理现金业务必须在有效监控和客户视线以内","B":"取款时，应遵循“先记账、后付款”原则","C":"现金清点必须使用A类金标点钞机双面点验","D":"现金交易应做到一笔一清、一户一清"},"a":"B"},{"id":338,"q":"某营业机构在日常现金收付业务中，发现一名现金从业人员在未取得反假货币资质证书的情况下，参与了假币收缴工作。该行为违反了以下哪项规定？","o":{"A":"现金从业人员应定期参加反假货币培训，培训合格后方可上岗","B":"假币收缴应由2名以上现金从业人员共同完成","C":"假币收缴后应立即通过BoEing系统录入相关信息","D":"假币收缴凭证应加盖收缴机构业务专用章"},"a":"A"},{"id":339,"q":"某营业机构在日常查库过程中，发现查库责任人未按照规定频次、范围、要求对重要空白凭证进行查箱，但不存在未查箱或虚假查箱问题。根据《中国农业银行重要空白凭证管理办法》的相关规定，以下哪项描述是正确的？","o":{"A":"内勤行长（或其授权人）对营业机构保管的重要空白凭证每旬至少进行一次账实检查","B":"内勤行长（或其授权人）对营业机构保管的重要空白凭证每月至少进行一次账实检查","C":"营业机构负责人对营业机构保管的重要空白凭证每旬至少进行一次账实检查","D":"二级分行或支行运营管理职能部门至少每半年对营业机构的重要空白凭证进行一次全面检查"},"a":"A"},{"id":340,"q":"某网点在日常查库过程中，发现查库责任人未对柜员现金箱进行实际清点，仅在《查库登记簿》上签字确认完成检查。该行为违反了以下哪项制度要求？","o":{"A":"内勤行长（或其授权人）应至少每旬对柜员现金箱账实相符情况进行一次全面检查","B":"网点负责人应至少每月对柜员现金箱账实相符情况进行一次全面检查","C":"查库责任人应实际清点现金箱实物，确保账实相符","D":"查库责任人应调阅BoEing系统调拨登记簿明细，核查交易是否真实、合规"},"a":"C"},{"id":341,"q":"《中国人民银行办公室关于银行业金融机构对外误付假币专项整理工作的通知意见》中要求银行业金融机构采集到的冠字号码数据信息的保存时间是（）","o":{"A":"至少保存三个月","B":"至少保存六个月","C":"至少保存一个月","D":"至少保存十二个月"},"a":"A"},{"id":342,"q":"银行业金融机构在办理业务时发现假人民币硬币处理方法为（）","o":{"A":"应当当面统一格式的专用信封并在封口处加盖假币字样的戳记","B":"当面加盖假币字样的戳记","C":"应当面加盖假币字样的戳记、并以统一格式的专用袋加封","D":"应当当面统一格式的专用信封但不加盖假币字样的戳记"},"a":"A"},{"id":343,"q":"“假币”印章采用（）油墨","o":{"A":"蓝色","B":"红色","C":"黑色","D":"白色"},"a":"A"},{"id":344,"q":"“假币”印章应盖在假币背面的（）位置","o":{"A":"中间","B":"安全线","C":"左侧","D":"右侧"},"a":"A"},{"id":345,"q":"“假币”印章应盖在假币的（）位置","o":{"A":"正面水印窗和背面中间","B":"正面中间和背面右侧","C":"正面水印窗和背面左侧","D":"正面中间和背面中间"},"a":"A"},{"id":346,"q":"“假币”印章应盖在假币正面的（）位置","o":{"A":"水印窗","B":"中间","C":"右侧","D":"安全线处"},"a":"A"},{"id":347,"q":"办理人民币存取款业务的银行业金融机构发现伪造、变造的人民币，数量较少的，由该银行业金融机构（）当面予以收缴","o":{"A":"一名工作人员","B":"两名以上工作人员","C":"一名业务主管","D":"一名业务人员及一名业务主管"},"a":"B"},{"id":348,"q":"持有人同意金融机构认定的兑换结果的，对半额兑换的残缺、污损人民币（特殊残缺、污损人民币除外）纸币，金融机构应当当面在票面上加盖符合中国人民银行规定的（）戳记","o":{"A":"兑换","B":"全额","C":"半额","D":"不加盖"},"a":"C"},{"id":349,"q":"凡办理人民币存取款业务的金融机构应（）为公众兑换残缺、污损人民币，不得拒绝兑换","o":{"A":"无偿","B":"按面值的5%收取兑换费用","C":"按面值的10%收取兑换费用","D":"有偿"},"a":"A"},{"id":350,"q":"根据中国人民银行相关规定，加盖“假币”印章时应使用（）印油","o":{"A":"红色","B":"蓝色","C":"黑色","D":"紫色"},"a":"B"},{"id":351,"q":"公众持有的残缺污损的人民币应到（）兑换","o":{"A":"中国人民银行","B":"中国人民银行指定的银行业机构","C":"所有办理人民币存取款业务的银行业机构"},"a":"C"},{"id":352,"q":"冠字号码查询结果为“本行流出”时，受理网点应（）","o":{"A":"不予赔付","B":"全额赔付","C":"部分赔付","D":"由客户自行处理"},"a":"B"},{"id":353,"q":"柜面发现假币应（）收缴","o":{"A":"当场","B":"下班后","C":"告知客户后","D":"主管同意后"},"a":"A"},{"id":354,"q":"纪念币是具有特定主题的（）的人民币","o":{"A":"限时发行","B":"限量发行","C":"限区域发行"},"a":"B"},{"id":355,"q":"假币封装袋封口必须盖","o":{"A":"业务公章","B":"假币章","C":"收缴单位章","D":"鉴定专用章"},"a":"B"},{"id":356,"q":"假币收缴单位应当自收到鉴定单位通知之日起（）个工作日内，将需要鉴定的货币送达鉴定单位","o":{"A":"3","B":"2","C":"1","D":"5"},"a":"B"},{"id":357,"q":"假币收缴的主体是金融机构假币收缴是（），带有一定的行政强制性","o":{"A":"一般行为","B":"行政行为","C":"民事行为","D":"特殊行为"},"a":"B"},{"id":358,"q":"假币收缴过程中，若一次性发现5张以上假币，应如何处理","o":{"A":"直接没收","B":"报告公安机关","C":"通知客户","D":"无需处理"},"a":"B"},{"id":359,"q":"假币收缴时，对假外币纸币应如何处理","o":{"A":"当面加盖“假币”戳记","B":"封装在专用袋中","C":"交由客户保管","D":"直接销毁"},"a":"B"},{"id":360,"q":"假币收缴业务需全程在监控下实施，不得脱离客户视线，监控记录保存期限不少于（）个月","o":{"A":"1","B":"3","C":"6","D":"12"},"a":"B"},{"id":361,"q":"假币印章应加盖在（）","o":{"A":"假币实物","B":"假币收缴凭证","C":"假币实物或假币收缴专用袋","D":"假币没收收据"},"a":"C"},{"id":362,"q":"假币专用封装袋封口处必须加盖（）印章","o":{"A":"收缴单位公章","B":"“假币”印章","C":"封袋人名章","D":"“假币”印章和封袋人名章"},"a":"B"},{"id":363,"q":"金融机构柜面发现假币后，应当由（）名以上业务人员当面予以收缴，被收缴人（）接触假币","o":{"A":"1，不能","B":"2，不能","C":"1，允许","D":"2，允许"},"a":"B"},{"id":364,"q":"金融机构收缴假币时，必须在（）范围内进行，被收缴人不得接触假币","o":{"A":"营业场所","B":"被收缴人视线","C":"负责人视线"},"a":"B"},{"id":365,"q":"金融机构在收缴假币过程中有下列情形的，应当立即报告当地中国人民银行分支机构和公安机关：一次性发现假币（）张（枚）以上和当地中国人民银行分支机构和公安机关发文另有规定的两者较小者","o":{"A":"20","B":"10","C":"5","D":"2"},"a":"C"},{"id":366,"q":"经核实，某银行业金融机构业务人员办理业务时发现100元人民币是假币，该业务人员将100元人民币退还给持有人中国人民银行应当对银行业金融机构处以（）的罚款","o":{"A":"1000元以下的","B":"100元以上1万元以下","C":"1000元以上5万元以下","D":"1万元以下的"},"a":"C"},{"id":367,"q":"能辨别面额，票面剩余（），其图案、文字能按原样连接的残缺污损人民币，银行业机构应按原面额全额兑换给持有人","o":{"A":"二分之一（含二分之一）以上","B":"四分之三（含四分之三）以上","C":"五分之三（含五分之三）以上"},"a":"B"},{"id":368,"q":"能辨别面额，票面剩余（）其图案、文字能按原样连接的残缺、污损人民币，金融机构应向持有人按原面额的一半兑换","o":{"A":"二分之一（含）以上","B":"四分之三（含）以上","C":"二分之一（含）以上五分之三（含）以上","D":"二分之一（含）以上至四分之三以下"},"a":"D"},{"id":369,"q":"人民币冠字号码包含英文字母和阿拉伯数字，共（）位","o":{"A":"8","B":"9","C":"10","D":"12"},"a":"C"},{"id":370,"q":"现金清分应做到的“五好标准”包括","o":{"A":"挑净","B":"点准","C":"墩齐","D":"以上都是"},"a":"D"},{"id":371,"q":"以下属于纸币公众防伪特征的是（）","o":{"A":"水印","B":"荧光特征","C":"红外特征","D":"磁性特征"},"a":"A"},{"id":372,"q":"银行业金融机构冠字号码查询信息系统的数据应至少保存（）","o":{"A":"1个月","B":"2个月","C":"3个月"},"a":"C"}],"multi":[{"id":1,"q":"单位结算账户撤销时，核准类账户需提供（ ）","o":{"A":"法定代表人（负责人）身份证件原件及复印件","B":"开户许可证正本","C":"开户许可证副本","D":"人民《对公客户加强型尽职调查表》（如有）"},"a":"ABD"},{"id":2,"q":"对公账户冻结方式包括：（ ）","o":{"A":"金额冻结","B":"半封","C":"全封","D":"临时冻结"},"a":"ABC"},{"id":3,"q":"有扣划权限的有权机关有：（ ）","o":{"A":"人民法院","B":"检察院","C":"税务机关","D":"海关"},"a":"ACD"},{"id":4,"q":"贷款账单上利息种类包括：（ ）","o":{"A":"正常息","B":"罚息","C":"复利","D":"本息"},"a":"ABC"},{"id":5,"q":"单位存款人开立的（ ）和贷款账户，都在集中对账管理系统的对账范围内。","o":{"A":"结算账户","B":"定期存款账户","C":"通知存款账户","D":"保证金账户"},"a":"ABCD"},{"id":6,"q":"单位银行账户对账周期包括：（ ）","o":{"A":"月度","B":"季度","C":"半年度","D":"年度"},"a":"AB"},{"id":7,"q":"《中国农业银行对账管理办法》所称对账，是指（ ）等，就某一具体日期的余额和某一时段内的明细发生额进行核对的工作。","o":{"A":"单位结算账户","B":"保证金账户","C":"同业账户","D":"定期账户"},"a":"ABCD"},{"id":8,"q":"BoEing中贷款本金、利息的冲正方式包括：（ ）","o":{"A":"冲账","B":"补账","C":"抹账","D":"销账"},"a":"AB"},{"id":9,"q":"下列（ ）类账户必须按月进行对账。","o":{"A":"同业账户","B":"上门服务账户","C":"与客户约定按月对账账户","D":"其他账户"},"a":"ABC"},{"id":10,"q":"以下哪几项是《反电信网络诈骗法》中对银行使用客户信息的要求","o":{"A":"要对身份号、手机号等客户敏感信息进行保护，禁止银行在模型中使用相关数据。","B":"开展异常账户和可疑交易监测时，可以收集必要的交易信息、设备位置信息。","C":"使用的信息未经客户授权，不得用于反电信网络诈骗以外的其他用途。","D":"在反电诈系统中使用的数据信息可以用于客户营销，实现数据互联互通。"},"a":"BC"},{"id":11,"q":"某商店店主的账户收到一笔涉诈资金转入，以下哪个选项是正确的","o":{"A":"虽然商店店主给犯罪分子交付了商品，但商店店主可能不是主动涉案。","B":"虽然商店店主向犯罪分子出借的银行卡，但商店店主可能不是主动涉案。","C":"商店店主一定是主动涉案。","D":"商店店主不一定是主动涉案。"},"a":"AD"},{"id":12,"q":"办理商业汇票银行承兑业务，密切关注客户洗钱和恐怖融资风险等级变动情况，对涉及洗钱风险或制裁风险的客户，采取________等管控措施。","o":{"A":"加强尽职调查","B":"提高交易监测频率","C":"直接拒绝办理","D":"只收不付"},"a":"AB"},{"id":13,"q":"办理商业汇票银行承兑业务，相关交易环节（含存续期管理）不得涉及洗钱、__________等行为。","o":{"A":"恐怖融资","B":"扩散融资","C":"逃税","D":"制裁"},"a":"ABCD"},{"id":14,"q":"商业汇票贴现业务，密切关注客户洗钱和恐怖融资风险等级变动情况，对涉及洗钱风险或制裁风险的客户，采取________等管控措施。","o":{"A":"加强尽职调查","B":"提高交易监测频率","C":"直接拒绝办理","D":"只收不付"},"a":"AB"},{"id":15,"q":"为客户首次办理跨行现金汇款业务，且单笔交易金额在1万元（含）以上时，应开展准入尽职调查，具体操作包括：","o":{"A":"要求客户提供的有效身份证件或者其他身份证明文件","B":"可以要求其出具辅助身份证明材料","C":"留存客户有效身份证件或其他身份证明文件的复印件或影印件","D":"了解并记录客户交易的目的和性质"},"a":"ABCD"},{"id":16,"q":"柜面发起的__________，系统自动进行境内黑名单筛查。","o":{"A":"普通贷记现金业务的付款人户名、代理人户名","B":"普通贷记业务往报业务的收款人户名","C":"普通贷记来报业务的付款人户名","D":"付款人联系电话"},"a":"ABC"},{"id":17,"q":"单位客户到柜面通过41110交易办理转账汇款业务，显示客户的CCS等级为“高风险类”，应采取____措施。","o":{"A":"通知客户经理进行加强型尽职调查","B":"审核客户经理提供的《对公客户加强型尽职调查表》","C":"主管授权","D":"拒绝办理业务"},"a":"AB"},{"id":18,"q":"根据《中国农业银行对公外汇账户管理办法》、《中国农业银行对公外汇账户业务柜面作业规则》要求，为客户办理外汇账户变更业务时，需审核_____等。","o":{"A":"客户身份证明文件","B":"变更信息有关证明文件","C":"申请书","D":"授权委托书"},"a":"ABCD"},{"id":19,"q":"清算端筛查预警初审工作中，可判定客户不属于被制裁对象或相关交易不涉及受制裁范围，可认定为误预警的情况有_________。","o":{"A":"命中的交易要素信息与名单的匹配信息性质不同","B":"命中的交易要素信息与名单的匹配信息类型不同","C":"命中的个人或实体的多项信息与名单库记录信息明显不符","D":"命中对象虽在制裁名单中，但具体交易类型不在受制裁范围内"},"a":"ABCD"},{"id":20,"q":"清算端筛查预警初审工作中，应将业务拦截同时上报总行内控合规监督部进行复审的情况有_________。","o":{"A":"通过监控名单系统反馈的命中信息，确认客户或交易相关方与名单对象匹配，且相关交易涉及被制裁范围","B":"通过监控名单系统反馈的命中信息，无法获取充分信息作出判断的交易","C":"其他无法判断为误报的情形","D":"命中对象虽在制裁名单中，但具体交易类型不在受制裁范围内"},"a":"ABC"},{"id":21,"q":"相比其他查询种类，合规信息查询对查复内容的质量要求更高，在处理合规信息查询业务时，应做到_________。","o":{"A":"据实查复","B":"全面查复","C":"谨慎查复","D":"逐项查复"},"a":"ABD"},{"id":22,"q":"外币代兑业务客户身份识别需要哪些信息：","o":{"A":"证件号","B":"姓名","C":"国别/地区","D":"工作类型"},"a":"ABC"},{"id":23,"q":"我行关于账户行对账的原则包括______？","o":{"A":"及时性原则","B":"准确性原则","C":"连续性原则","D":"保密性原则"},"a":"ABC"},{"id":24,"q":"当某家银行在我行开立账户并由我行提供代理清算服务时，该银行可被称为______？","o":{"A":"账户行","B":"开户行","C":"我行的清算代理行","D":"我行的代理清算行"},"a":"BC"},{"id":25,"q":"超级柜台前端服务员要做好客户引导，确保业务受理质量，建立联网核查及身份审核防线，应做到以下几点：______。","o":{"A":"做好客户身份初审，确保“人证一致”。","B":"确保现场拍照质量，避免出现灯光过强或过暗。","C":"避免照片太小、仰视、俯视、侧脸，拍照区域出现多人像或无人像。","D":"非二代证案要求拍摄折页，正反面拍摄清楚，避免倒置。"},"a":"ABCD"},{"id":26,"q":"超级柜台前端服务员要提高风险防控意识，重点关注以下几类客户：______。","o":{"A":"不愿意配合身份识别。","B":"神态异常，交易时刻意掩饰。","C":"持异地身份证开卡、多人共同办卡、由他人陪同办卡、远程操控办卡。","D":"开卡时要求开通电子银行，并提高交易限额，询问用途时模棱两可、含糊不清，特别是年轻客户。"},"a":"ABC"},{"id":27,"q":"后台中心超级柜台身份审核要做到以下几点：______。","o":{"A":"尽可能快地完成审核业务。","B":"检查“系统提示三信息”。","C":"非二代证审核客户现场照片与证件照片是否一致。","D":"把握人脸识别要点。"},"a":"BCD"},{"id":28,"q":"以下哪些情况可继续在超级柜台办理业务：______。","o":{"A":"命中涉恐名单。","B":"客户风险等级为低风险及中低风险。","C":"涉税声明与其他信息存在明显矛盾且不能提供合理解释。","D":"持非二代证客户已在KYC完成加强型尽职调查。"},"a":"BD"},{"id":29,"q":"以下哪些是超级柜台自动进行的筛查：______。","o":{"A":"涉恐客户筛查","B":"客户风险等级筛查","C":"客户资料九要素不全筛查","D":"防范电信网络诈骗客户标识筛查"},"a":"ABCD"},{"id":30,"q":"无卡无折存款业务通过人脸识别技术进行客户身份认证，禁止______、______、______办理和接收无卡无折存款业务。","o":{"A":"非本行客户","B":"CCS等级被评为高风险客户","C":"CCS等级被评为极高风险的客户","D":"本行客户"},"a":"ABC"},{"id":31,"q":"无卡无折存款限额按客户控制。办理无卡无折存款业务的个人客户，单个客户每日无卡无折存款交易不超过10笔，金额不超过______万元；接收无卡无折存款的个人客户，每日接收无卡存款交易不超过10笔，金额不超过5万元；接收无卡无折存款的单位结算卡客户，签约客户每天限额______万元，未签约客户每天限额5万元。","o":{"A":"5","B":"10","C":"20","D":"100"},"a":"AD"},{"id":32,"q":"客户持本行卡（或存折）通过自助设备办理业务时，须核查客户的______、性别、国籍、______、住所地或者工作单位地址、联系方式、身份证件种类、______和______等基本信息，并拒绝为身份证件过期的客户办理业务。","o":{"A":"姓名","B":"职业","C":"身份证件号码","D":"证件有效期限"},"a":"ABCD"},{"id":33,"q":"自助（智能）设备所开办的业务应满足反洗钱系统大额交易和可疑交易数据提取要求。交易过程中准确记录卡号（账号）、交易地点、交易金额、交易对手、业务代码等信息，支持反洗钱系统全面、完整、准确地采集客户交易信息。","o":{"A":"卡号（账号）","B":"交易地点","C":"交易金额","D":"交易对手"},"a":"ABCD"},{"id":34,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，个人客户在我行新开账户时，营业机构应当开展涉税信息尽职调查工作，获取由账户持有人签署的《个人税收居民身份声明文件》，在特殊情况下，以下哪条关于声明文件的要求是正确的：","o":{"A":"个人代理他人开立账户以及单位代理个人开立账户时，营业机构应当获取由账户持有人本人或经其书面授权的代理人签署的《个人税收居民身份声明文件》，并核实账户持有人及其代理人的有效身份证件。","B":"单位代理个人开立只收不付的账户时，营业机构应当在开户时获取账户持有人的声明文件。","C":"对于开立联名账户的，营业机构应当获取每一个账户持有人分别签署的声明文件。","D":"对于开立信用卡账户等激活前状态为不收不付账户的，应当在激活后获取账户持有人的声明文件。"},"a":"ABC"},{"id":35,"q":"根据《中国农业银行反洗钱业务个人客户尽职调查操作规程》，在与个人客户建立业务关系时，应当识别客户身份，开展准入尽职调查。开展准入尽职调查的情形包括：","o":{"A":"为在本行无个人账户的客户开立单折、借记卡、信用卡和电子账户等","B":"首次为不在本行开立账户的客户提供现金汇款等一次性金融服务，且交易金额单笔人民币1万元（含）以上","C":"首次为不在本行开立账户的客户办理个人外币现钞兑换、提供实物贵金属买卖服务","D":"监管机构或本行规定的其他须进行准入尽职调查的情形。"},"a":"ABCD"},{"id":36,"q":"以下哪些禁止性规定是正确的：","o":{"A":"禁止为身份不明的个人客户提供服务或者与其交易","B":"禁止为个人客户开立匿名账户或者假名账户","C":"禁止为冒用他人身份的个人客户开立账户","D":"禁止为客户虚拟货币相关活动提供账户开立、资金结算等服务"},"a":"ABCD"},{"id":37,"q":"对CCS等级为高风险及以上的个人客户：","o":{"A":"不得办理保管箱业务","B":"不得作为保管箱业务授权代理人","C":"不得作为保管箱联合租用人","D":"对于已在本行开立保管箱的该类客户，本行应拒绝继续为客户提供保管箱服务，同时要求客户做退箱处理。"},"a":"ABCD"},{"id":38,"q":"个人客户现金购买实物产品，客户风险等级为高风险类且（现金）交易额在______（含）以上或转账交易额在______以上的，按规定采取加强型尽职调查。","o":{"A":"1万元","B":"2万元","C":"5万元","D":"10万元"},"a":"AC"},{"id":39,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，以下哪种情况属于个人账户声明文件填写信息与其他信息存在明显矛盾的情形？","o":{"A":"声明仅为中国税收居民，但提供的现居地址为境外","B":"声明为非居民，但国籍与税收居民国不一致","C":"声明为非居民，但居住地址所属国家与税收居民国不一致","D":"声明的税收居民国与证件签发国不一致"},"a":"ABCD"},{"id":40,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，机构账户声明文件填写信息与其他信息存在明显矛盾的情形包括以下哪项？","o":{"A":"声明仅为中国税收居民，但注册地址为境外","B":"声明为非居民，但注册地址所属国家与税收居民国一致","C":"投资机构声明不属于消极非金融机构，但其税收居民国未参与金融账户涉税信息自动交换标准","D":"声明信息与现有账户开立程序收集的身份信息不符"},"a":"ACD"},{"id":41,"q":"根据《中国农业银行协助司法机关查询冻结扣划工作管理办法》，______或______按照反洗钱工作要求，定期将司法查控工作中获取的相关线索移送本行反洗钱主管部门。司法机关明确要求保密的除外。","o":{"A":"营业机构","B":"专门受理部门","C":"反洗钱中心","D":"公检法机构"},"a":"AB"},{"id":42,"q":"根据《中国农业银行大额交易和可疑交易报告操作规程》，在可疑交易报告的“疑点分析”中，以下哪些做法是允许的？","o":{"A":"分析客户尽职调查情况","B":"简单填写“可疑”或仅描述系统预警特征","C":"结合客户交易记录进行逻辑分析","D":"与客户身份背景相互印证"},"a":"ACD"},{"id":43,"q":"根据《中国农业银行大额交易和可疑交易报告操作规程》，可疑交易报告的关键信息包括以下哪些部分？","o":{"A":"资金交易及客户行为情况","B":"疑点分析","C":"疑似涉罪类型","D":"客户家庭成员信息"},"a":"ABC"},{"id":44,"q":"网点通过智能全速通对公账户平台办理对公账户开户及签约业务时，客服经理需审核客户经理尽职调查结果，需确认的条件包括？","o":{"A":"核实报告结论为“允许客户准入，核实未见异常”","B":"若结论为“存在可疑情形”，需检查核实过程合理性","C":"必须要求客户提供纸质尽职调查报告","D":"无需关注开户风险预评估结果"},"a":"AB"},{"id":45,"q":"网点通过智能全速通对公账户平台办理对公账户开户及签约业务时，客服经理需审核客户经理尽职调查结果，以下哪些不属于需要确认的条件？","o":{"A":"核实报告结论为“允许客户准入，核实未见异常”","B":"若结论为“存在可疑情形”，需检查核实过程合理性","C":"必须要求客户提供纸质尽职调查报告","D":"无需关注开户风险预评估结果"},"a":"CD"},{"id":46,"q":"网点通过智能全速通对公账户平台办理对公账户开户及签约业务时，客服经理需要对客户经理尽职调查结果进行哪些审核？","o":{"A":"核实报告结论审核","B":"开户意愿核实","C":"结果审核企业经营地址核实结果审核","D":"支付限额审核"},"a":"ABCD"},{"id":47,"q":"网点通过智能全速通对公账户平台办理对公账户开户及签约业务时，客服经理应针对不同业务场景审核客户经理尽调结果，若不满足要求，以下哪些做法是正确的：","o":{"A":"需客户经理补充相应资料","B":"先进行开户再要求客户经理重新尽调","C":"退回至客户经理端","D":"联系客户核实"},"a":"AC"},{"id":48,"q":"网点通过智能全速通对公账户平台办理对公账户开户及签约业务时，客服经理应针对不同业务场景审核客户经理尽调结果，若不满足要求，以下哪些做法是不正确的：","o":{"A":"需客户经理补充相应资料","B":"先进行开户再要求客户经理重新尽调","C":"退回至客户经理端","D":"联系客户核实"},"a":"BD"},{"id":49,"q":"网点通过智能全速通对公账户平台变更对公账户单位名称、法定代表人等核心要素时，以下哪些说法是不正确的？","o":{"A":"仅需审核纸质尽职调查表","B":"需审核KYC尽职调查结果或纸质尽职调查表，且结论需明确","C":"无需尽职调查，直接提交中心审核","D":"仅需法定代表人签章确认"},"a":"ACD"},{"id":50,"q":"客户申请变更______、______、法定代表人姓名、证件号码、注册资本、经营范围、______、______等核心要素时，需客户经理进行KYC尽调或提供纸质《对公客户尽职调查表》。","o":{"A":"单位名称","B":"单位证件类型及号码","C":"注册地址","D":"经营地址"},"a":"ABCD"},{"id":51,"q":"客户申请变更单位名称、单位证件类型及号码、法定代表人姓名、证件号码、注册资本、经营范围、注册地址、经营地址等核心要素时，以下哪些说法是正确的：","o":{"A":"可直接办理","B":"需一级分行审核","C":"需客户经理进行KYC尽调","D":"需客户经理提供纸质《对公客户尽职调查表》"},"a":"CD"},{"id":52,"q":"《对公活期存款及单位结算账户业务柜面作业规则》规定柜面办理单位结算账户开户、变更、销户业务，需首先由客户部门完成尽职调查，并填制______或______。","o":{"A":"《对公客户尽职调查表》","B":"《对公客户加强型尽职调查表》","C":"《机构客户理财业务签约申请表》","D":"《非居民金融账户涉税信息声明文件》"},"a":"AB"},{"id":53,"q":"对于客户核实后确为冒名开立的单位结算账户，客户出具同意销户的声明后,以下哪些说法是正确的：","o":{"A":"“销户原因”选择“转户”","B":"“销户原因”选择“冒名账户销户”","C":"销户资金手工转入专用账户管理","D":"销户资金自动转入专用账户管理"},"a":"BD"},{"id":54,"q":"单位结算账户销户时，涉及大额取现销户或大额转账销户的，应按要求完整填报____、____等信息，相关大额反洗钱数据由反洗钱系统按照报送要求识别报送。","o":{"A":"账户户名","B":"账号","C":"交易方式","D":"交易对手"},"a":"CD"},{"id":55,"q":"柜面开立单位结算账户时，在异地开户场景中，若通过面对面方式核实企业法定代表人开户意愿且法人无法到达开户行，柜面需审核哪些材料？","o":{"A":"现场核实照片","B":"一级支行主管行长签字或加盖一级支行行政公章的核实报告","C":"法定代表人身份证原件","D":"远程视频核实记录"},"a":"AB"},{"id":56,"q":"柜面开立单位结算账户时，在异地开户场景中，若通过面对面方式核实企业法定代表人开户意愿且法人无法到达开户行，柜面审核资料不包括：","o":{"A":"现场核实照片","B":"一级支行主管行长签字或加盖一级支行行政公章的核实报告","C":"法定代表人身份证原件","D":"远程视频核实记录"},"a":"CD"},{"id":57,"q":"当尽职调查核实结论为“存在可疑情形”时，柜员需重点审核哪些内容？","o":{"A":"开户风险评估中命中的电诈灰名单","B":"四个同一筛查结果","C":"纳税信息核查结果","D":"法定代表人联系电话核实情况"},"a":"ABCD"},{"id":58,"q":"对于特定自然人客户，银行需进一步了解哪些信息以评估洗钱风险？","o":{"A":"任职国家（地区）","B":"职业背景","C":"任职情况","D":"客户的子女信息"},"a":"ABC"},{"id":59,"q":"个人客户业务关系存续期间，以下哪些非开展加强型尽职调查的触发因素？","o":{"A":"
