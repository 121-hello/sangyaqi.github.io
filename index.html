保证消费投诉处理工作顺利开展。","o":{"A":"人力","B":"物力","C":"财力","D":"能力"},"a":"ABC"},{"id":143,"q":"各行要按照监管要求，向所在地监管机构报告以下投诉管理工作事项：（   ）","o":{"A":"投诉处理工作相关管理制度、投诉管理工作责任人名单，以及上述事项的变动情况","B":"投诉统计有关情况","C":"投诉工作年度报告","D":"重大投诉情况"},"a":"ABCD"},{"id":144,"q":"当个人信息控制者停止运营其产品或服务时，应当_____。","o":{"A":"即时停止继续收集个人信息的活动","B":"将停止运营的通知以逐一送达或公告的形式告知个人信息主体","C":"存储的个人敏感信息采用加密方式处理","D":"对其所持有的个人信息进行删除或匿名化处理"},"a":"ABD"},{"id":145,"q":"根据《银行业保险业消费投诉处理管理办法》，银行机构应当依照国家有关规定制定重大消费投诉处理应急预案。重大消费投诉包括：（    ）","o":{"A":"因重大自然灾害、安全事故、公共卫生事件等引发的消费投诉","B":"20名以上投诉人采取面谈方式提出共同消费投诉的群体性投诉","C":"10名以上投诉人采取面谈方式提出共同消费投诉的群体性投诉","D":"中国银保监会及其派出机构认定的其他重大消费投诉"},"a":"ABD"},{"id":146,"q":"以下属于银行营业网点服务突发事件的是______。","o":{"A":"业务系统故障","B":"网点客流激增","C":"干扰他人或不合理占用银行资源的行为","D":"存款挤兑"},"a":"ABCD"},{"id":147,"q":"根据《中国农业银行金融知识教育宣传工作管理办法》，各级机构可根据需要组织金融知识教育宣传活动项目评选，交流先进经验，对表现突出的____、____和____进行表彰。","o":{"A":"单位","B":"个人","C":"最佳实践活动项目","D":"先进项目"},"a":"ABC"},{"id":148,"q":"委托处理个人信息的，应当______。","o":{"A":"取得个人单独同意","B":"与受托方做好合同约定","C":"加强对受托方的履约监督","D":"以上三项都对"},"a":"BC"},{"id":149,"q":"以下哪些金融广告宣传语违反了《关于进一步规范金融营销宣传行为的通知》（银发〔2019〕316号）的规定？（）","o":{"A":"XX银行：放心购买，保本保收益，最专业、最安全的投资","B":"XX咨询公司：信用卡免费申请，不查征信，不回访，无需面审","C":"人民银行直营店：征信报告解读，征信记录洗白，一条龙服务","D":"X宝零售网站：多功能POS机，开启高效营业时代"},"a":"ABCD"},{"id":150,"q":"金融消费者投诉业务办理渠道中，前台业务渠道包括：____。","o":{"A":"营业现场","B":"自助机具","C":"电子渠道","D":"第三方渠道"},"a":"ABCD"},{"id":151,"q":"特殊客户服务理念____。","o":{"A":"专业精一度","B":"真心暖一度","C":"主动多一度","D":"服务深一度"},"a":"ABCD"},{"id":152,"q":"针对特殊客户群体的应急服务场景，以下哪些措施是正确的？","o":{"A":"大堂经理应主动询问代理人委托人的身体状态","B":"若客户突发重病，需立即设置隔离区并劝阻围观","C":"对拍摄行为应强制删除视频并报警处理","D":"协助120转运时需如实向警方说明情况"},"a":"ABD"},{"id":153,"q":"下面哪些选项是运营管理部设备（外部引入设备除外）管理职责？","o":{"A":"投放","B":"安装及验收","C":"运行维护及集中监控","D":"升级换代","E":"处置报废"},"a":"ABCDE"},{"id":154,"q":"下列哪些选项是自助设备的巡检内容？","o":{"A":"对自助设备机身、灯箱广告等进行清洁","B":"清除非法张贴物和非法装置","C":"补充打印纸、色带等耗材","D":"处理卡钞、卡纸、吞没卡等","E":"查设备监控摄像头，防止堵塞或损坏。"},"a":"ABCDE"},{"id":155,"q":"超级柜台是农业银行自主研发的智能化对客服务渠道，通过软件应用程序和专用硬件设备相结合，集成银行业务流程，以（）为主要运营模式，实现客户业务的办理。","o":{"A":"生物认证","B":"自主办理","C":"前后台分离","D":"单一渠道"},"a":"ABC"},{"id":156,"q":"超级柜台已加载业务主要包括（）、基金、外汇、信用卡、查询、账户管理、分行特色等。","o":{"A":"开卡","B":"签约","C":"转账","D":"理财"},"a":"ABCD"},{"id":157,"q":"以下哪些超级柜台业务支持关怀版？","o":{"A":"账户明细","B":"个人消息服务","C":"我要开卡","D":"资料修改"},"a":"ABCD"},{"id":158,"q":"CCS等级为（）的客户不允许在超级柜台办理业务。","o":{"A":"极高风险","B":"高风险","C":"中风险","D":"中低风险","E":"低风险"},"a":"AB"},{"id":159,"q":"三方扫码收费目前支持的渠道有（）","o":{"A":"柜面太白平台","B":"新面客","C":"超级柜台","D":"ATM"},"a":"ABC"},{"id":160,"q":"第三方扫码收费支持的支付方式有（）","o":{"A":"微信支付","B":"支付宝支付","C":"云闪付支付","D":"本行或他行掌银"},"a":"ABCD"},{"id":161,"q":"以下哪些印章纳入网点的印控仪管理（）","o":{"A":"业务专用章","B":"发票专用章","C":"假币鉴定专用章","D":"结算专用章"},"a":"ABD"},{"id":162,"q":"某支行在自助设备加配钞业务中，存在岗位设置不当的问题。以下哪些岗位设置违反了《中国农业银行自助（智能）设备加配钞业务管理规定》中关于“不相容岗位相分离”的原则？","o":{"A":"业务综合岗与监控计划岗由同一人担任","B":"钞箱管理岗与现金清分岗由同一人担任，且属于同一条线路","C":"主出纳岗与钞箱管理B岗由同一人担任，已报经一级分行审批","D":"账务处理岗与库房管理岗由同一人担任"},"a":"ABD"},{"id":163,"q":"某支行在金库运营管理中，存在在岗人员设置不符合不相容岗位制约要求的问题。根据《中国农业银行金库运营业务管理办法》相关规定，以下哪些岗位设置是不符合制度要求的？","o":{"A":"管库岗与记账岗由同一人担任","B":"钞箱管理岗与现金清分岗由同一人担任，且属于同一线路","C":"管库岗与监控计划岗由不同人员担任","D":"单点支行分支库管库岗经一级分行审批后，开立BoEing用户号并处理库房类交易"},"a":"ABD"},{"id":164,"q":"根据《中国农业银行清算业务管理办法》相关规定，以下哪些岗位设置方式不符合不相容岗位制约要求？","o":{"A":"账务处理岗位与对账岗位由同一人担任","B":"印章管理岗位与数字证书使用岗位由不同人员担任","C":"密押管理岗位与账务处理岗位由同一人担任","D":"对账岗位与数字证书管理岗位由不同人员担任"},"a":"AC"},{"id":165,"q":"根据《中国农业银行营业网点内勤行长管理办法》的相关规定，以下哪些情形不符合内勤行长上岗要求？","o":{"A":"未通过总行组织的内勤行长岗位资格考试","B":"从事运营条线工作满1年","C":"具有较强的学习、组织、沟通和管理能力","D":"近三年无重大违法违纪违规记录"},"a":"AB"},{"id":166,"q":"某支行在日常业务检查中发现，一名客服经理存在使用本人账户为他人提供便利并从中获取利益的行为。该行为虽未形成案件或重大风险事件，但已违反相关制度规定。以下哪些行为属于《中国农业银行严格禁止员工行为的若干规定》中明确禁止的？","o":{"A":"员工使用本人账户为他人提供便利并从中获取利益","B":"员工将本人账户提供给他人使用","C":"员工为客户代保管银行卡","D":"员工为客户代为填写业务申请表"},"a":"ABC"},{"id":167,"q":"某营业机构在日常印章管理中，存在未按规定领用、保管、交接、停用、上缴、使用临柜业务印章的问题，但未涉及伪造、变造、盗用、丢失、私自加盖业务印章或违规将业务印章带出柜台使用等严重违规行为。根据《中国农业银行临柜业务实物印章管理实施细则》（农银规章〔2018〕155号），以下哪些行为属于违规操作？","o":{"A":"未纳入印控仪管理的印章由单人领取并登记《业务印章、钥匙等物品及密码保管使用登记簿》","B":"未纳入印控仪管理的印章在停用后未在登记簿上登记停用日期","C":"未纳入印控仪管理的印章在非营业时间未随柜员现金箱入金库或保险箱（柜）保管","D":"未纳入印控仪管理的印章在停用后由保管人单人加封入保险箱保管"},"a":"ABCD"},{"id":168,"q":"根据《中国农业银行临柜业务实物印章管理实施细则》的相关规定，以下哪些行为违反了实物印章与重要空白凭证的保管要求？","o":{"A":"由同一人同时保管实物印章和重要空白凭证","B":"实物印章保管人临时将印章交由他人代为保管","C":"实物印章与重要空白凭证分库存放","D":"实物印章保管人未按规定办理印章交接手续"},"a":"ABD"},{"id":169,"q":"在使用印控仪进行印章管理操作时，以下哪些行为是制度明确要求必须执行的？","o":{"A":"印控仪开启期间，用印审批岗和操作岗应全程在监控录像清晰可见范围内双人监督操作","B":"印控仪开启后，允许在开启期间进行与用印无关的其他操作","C":"关闭印控仪前，应先执行“66402 关闭电子锁”交易，再关闭印控仪安全门","D":"印控仪关门后，用印审批岗须执行“印章校准”交易，确保印控仪内印章正常"},"a":"ACD"},{"id":170,"q":"根据《关于加强印控仪开启期间业务管理的风险提示》要求，以下哪些行为是被明确禁止的？","o":{"A":"在用印量较大时，为提高效率，开启印控仪取出印章手工加盖","B":"印控仪开启期间，用印审批岗和操作岗全程双人监督操作","C":"印控仪开启后，未在监控录像清晰可见范围内进行操作","D":"印控仪关闭前，先执行“66402 关闭电子锁”交易"},"a":"AC"},{"id":171,"q":"柜面经理在正式签退前，系统进行传票号连续性校验和末笔交易校验。若校验未通过，以下哪些操作是符合制度规定的？","o":{"A":"柜面经理可直接签退，无需任何授权","B":"运营主管确认传票及附件完整后，可“3+0”授权柜面经理签退","C":"柜面经理应立即联系科技部门处理系统问题，无需进行其他操作","D":"若确认为系统原因导致校验未通过，运营主管可授权签退"},"a":"BD"},{"id":172,"q":"客服经理在办理业务过程中，录入信息与原始凭证不符，该行为违反了相关制度规定。以下哪些行为属于制度中明确禁止的违规行为？","o":{"A":"未根据原始凭证录入确认往账信息","B":"未核对客户身份信息","C":"未按规定进行业务授权","D":"未将银行汇票未用退回资金转入申请人账户"},"a":"AD"},{"id":173,"q":"在办理个人柜面业务过程中，若客户未在柜外清上签名或签名不符，以下哪些做法是符合《中国农业银行个人基本业务柜面作业规则》规定的？","o":{"A":"由客户家属代为签名","B":"若客户无法签名，可使用带指纹功能的柜外清由客户按指纹确认","C":"若客户无法签名且网点未配备指纹柜外清，应打印纸质凭证并请客户当面按手印确认","D":"由客服经理代客户签名以加快业务办理速度"},"a":"BC"},{"id":174,"q":"在办理单位结算账户开户、信息变更、撤销等业务时，若客户未在柜外清电子设备上签字或签字不符，将违反相关制度规定。根据《中国农业银行对公活期存款及单位结算账户业务柜面作业规则》，以下哪些操作是必须执行的？","o":{"A":"交易成功后，必须请客户在柜外清电子设备上签字","B":"客服经理审核签字清晰无误后，可不生成电子凭证","C":"客服经理审核签字清晰无误后，必须生成电子凭证","D":"客户未签字或签字不符的，可先完成交易，后续补签"},"a":"AC"},{"id":175,"q":"根据《中国农业银行核心业务系统（BoEing）营业机构运行管理办法》相关规定，内勤行长在日终审核时，若发现纸质凭证的张数与“用户日终纸质凭证报告表”记录不一致，应如何处理？","o":{"A":"立即进行二次清点，确认是否为操作失误","B":"直接在“机构日终纸质凭证报告表”上签字，无需处理","C":"立即查明原因，并向上级行报告重大风险情况","D":"仅在系统中进行备注，不需纸质报告表签字"},"a":"AC"},{"id":176,"q":"某营业机构在日常运营档案管理中，存在未按规定对永久保管档案进行规范封装的问题。根据《中国农业银行运营档案管理办法》的相关规定，以下哪些操作是正确的？","o":{"A":"永久保管档案应按日封册，无论凭证数量多少","B":"档案封册前应在档案系统中完成信息登记","C":"封装人员应在视频监控下操作，并检查封签上的日期、营业机构号、柜员号、册数","D":"未移交入库的永久保管档案应放入保险柜或档案柜并上锁保管"},"a":"BCD"},{"id":177,"q":"根据《中国农业银行运营档案管理办法》规定，客服经理在整理纸质运营档案时，以下哪些行为是合规的？","o":{"A":"客服经理在日终签退后整理本人凭证","B":"客服经理将凭证按BoEing、一体化平台、其他系统顺序整理","C":"客服经理将整理好的凭证交由内勤行长审核","D":"客服经理在整理凭证时，按柜员编号由大到小排列"},"a":"BC"},{"id":178,"q":"某营业机构在日常检查中发现，其重要空白凭证登记簿的设立、变更、停用、使用和管理存在不规范问题。根据《中国农业银行重要空白凭证管理办法》的相关规定，以下哪些行为属于检查监督中应重点关注的内容？","o":{"A":"重要空白凭证实物与系统登记簿余额是否一致","B":"重要空白凭证的调拨、使用、保管、退出等手续是否完整合规","C":"重要空白凭证是否按业务需要频繁更换保管人员","D":"是否严格执行相关规章制度的执行情况"},"a":"ABD"},{"id":179,"q":"某网点在冠字号码查询业务中，存在登记簿管理不规范的问题。根据《中国农业银行冠字号码查询及检索业务管理规定》，以下哪些操作是必须通过BoEing系统进行登记的？","o":{"A":"冠字号码查询申请信息的录入","B":"客户取款金额的核对","C":"冠字号码查询/再查询结果的登记","D":"查询结果通知书的打印"},"a":"AC"},{"id":180,"q":"某支行在日常检查中发现，自助设备的《中国农业银行自助（智能）设备维护及巡检登记簿》存在登记不完整、签字缺失等问题。根据制度要求，以下哪些行为是必须执行的？","o":{"A":"每次巡检后必须由设备管理员签字确认","B":"采用手机巡检的，可不记录设备状态信息","C":"维护维修完成后，必须在登记簿上记录故障报修时间、原因、修复时间等信息","D":"登记簿可由他人代签，只要内容真实即可"},"a":"AC"},{"id":181,"q":"根据《中国农业银行现金出纳机具管理办法》的相关规定，营业网点、金库、现金作业中心在现金出纳机具管理中应履行哪些职责？","o":{"A":"负责现金出纳机具的配置、维护、更新申请","B":"负责现金出纳机具的到货验收、安装运行验收、规范使用及保管","C":"负责通过系统或登记簿逐台登记启用、维护、报废等全生命周期信息","D":"负责现金出纳机具的采购和供应商选择"},"a":"ABC"},{"id":182,"q":"根据《中国农业银行协助司法机关查询冻结扣划工作管理办法》的相关规定，营业机构在协助司法机关查询、冻结或扣划财产时，以下哪些行为是必须执行的？","o":{"A":"严格保密相关案情，限定最小知悉范围","B":"由同一人完成查询、冻结或扣划的全部操作","C":"逐笔登记协助查询、冻结或扣划业务，并留存办案人员联系方式","D":"将协助过程中收集的法律文书、证件等资料专夹保存"},"a":"ACD"},{"id":183,"q":"在办理纸质商业汇票委托收款业务时，以下哪些操作是必须执行的？","o":{"A":"客服经理需先登记票据信息，再发起委托收款交易","B":"托收凭证必须记载“委托收款”字样、金额、付款人名称、收款人名称等事项","C":"托收凭证第二联可由客户自行保管，无需专夹入现金箱或保险柜","D":"托收凭证第三联需加盖结算专用章后寄送付款行"},"a":"ABD"},{"id":184,"q":"某网点在处理一起存金通账户司法冻结业务时，经核查发现其未按规定登记《协助查询、冻结、扣划登记簿》。根据相关制度要求，以下哪些操作是必须执行的？","o":{"A":"在冻结或解冻交易完成后，必须登记《协助查询、冻结、扣划登记簿》","B":"登记簿的登记内容应包括冻结/解冻通知书、相关资料复印件等","C":"登记簿的登记工作可由任意柜员完成，无需主管审核","D":"登记簿的登记应在交易操作前完成，以确保资料完整性"},"a":"AB"},{"id":185,"q":"网点营业场所发现非本行人员在场内进行产品宣传推介活动，作为客服经理，应如何处理？","o":{"A":"立即制止其行为并劝离","B":"若对方态度强硬，可不予理会","C":"情节严重的应向上级行及时报告","D":"可允许其在网点内短暂停留进行宣传"},"a":"AC"},{"id":186,"q":"以下哪些行为属于《关于严格遵守运营条线员工行为“十个严禁”规定（试行）的通知》中明确禁止的“三代”行为？","o":{"A":"代客户保管银行卡","B":"代客户输入交易密码","C":"代客户核对业务凭证信息","D":"代客户签名确认业务处理结果"},"a":"ABD"},{"id":187,"q":"根据《中国农业银行网点营业场所现场管理办法（试行）》相关规定，以下哪些行为是网点现场员工在智能服务区辅助客户办理业务时禁止的？","o":{"A":"代客户输入密码","B":"代客户签名","C":"主动回避客户输入密码的过程","D":"代客户保管有效身份证件"},"a":"ABD"},{"id":188,"q":"根据《中国农业银行运营业务系统用户号管理规定》，以下哪些行为是被明确禁止的？","o":{"A":"临时离开工位时未锁屏或退出系统","B":"将本人用户号交由他人操作业务系统","C":"使用他人用户号操作相关业务系统","D":"为提高效率，与同事共享用户号进行业务处理"},"a":"BCD"},{"id":189,"q":"根据《中国农业银行营业网点保安服务管理办法》的相关规定，以下哪些行为属于网点保安的禁止行为？","o":{"A":"为客户代办业务","B":"指导客户办理业务","C":"操作自助机具","D":"协助客户整理业务单据"},"a":"ABC"},{"id":190,"q":"客服经理在临时离柜或离岗时，未按规定妥善保管临柜业务实物印章，存在印章管理不规范的风险。根据《中国农业银行临柜业务实物印章管理实施细则》的相关规定，以下哪些做法是正确的？","o":{"A":"临时离岗时，将实物印章放入本人现金箱并加锁保管","B":"临时离岗时，将实物印章交由其他同事代为保管","C":"非营业时间，实物印章必须随现金箱入金库或保险箱保管","D":"未纳入印控仪管理的实物印章，可随意放置在办公桌上"},"a":"AC"},{"id":191,"q":"根据《中国农业银行网点服务管理办法（试行）》相关规定，以下哪些信息应在营业场所适当位置进行公示？","o":{"A":"本网点业务联系（消费者权益保护）电话号码","B":"服务收费价格","C":"网点人员及营销人员资质","D":"实时利率"},"a":"ABD"},{"id":192,"q":"根据《中国农业银行自助(智能)设备加配钞管理系统操作规程》的相关规定，以下哪些行为属于违规操作？","o":{"A":"日终将任务钥匙、电子钥匙及PDA等放入员工个人办公桌抽屉保管","B":"任务钥匙在未完成任务的情况下，由钞箱管理岗在日终交回业务综合岗保管","C":"未启用的电子钥匙由业务综合岗入保险柜妥善保管（集中加配钞）","D":"任务钥匙遗失后，未及时报告并强制终止任务"},"a":"AD"},{"id":193,"q":"根据《中国农业银行移动授权管理细则》相关规定，以下哪些行为属于违规操作？","o":{"A":"内勤行长将移动授权设备带离营业场所","B":"内勤行长在营业期间将移动授权设备交由他人使用","C":"内勤行长在营业结束后将移动授权设备存放在营业场所监控范围内的指定区域","D":"内勤行长在转授权后未在《内勤行长工作日志》中登记设备交接情况"},"a":"ABD"},{"id":194,"q":"根据《关于进一步增强风险隐患防控意识 切实加强客服经理现金箱现金等实物安全管理的通知》要求，客服经理在现金箱钥匙保管方面应做到哪些规范操作？","o":{"A":"营业期间临时离柜时可将钥匙放在未上锁的抽屉内","B":"严禁将现金箱钥匙交由他人保管或使用","C":"可以在午休时段将钥匙交由其他客服经理代为保管","D":"应妥善保管本人钥匙，不得随意放置"},"a":"BD"},{"id":195,"q":"某支行在客户信息查询业务中被发现存在查询手续不完整、不齐全的问题，以下哪些行为是合规的？","o":{"A":"柜面经理在客户未带走打印件的情况下，将打印件交由其他员工保管","B":"柜面经理在客户视线范围内或监控范围内当场销毁未带走的客户信息打印件","C":"因客户营销需要，员工在未履行审批手续的情况下批量查询客户信息","D":"因监督检查需要，员工在履行审批手续后查询客户信息"},"a":"BD"},{"id":196,"q":"根据《中国农业银行客户信息保护管理办法》和《中国农业银行个人客户信息保护实施细则》的相关规定，以下哪些行为属于违规操作？","o":{"A":"客户信息打印件未被客户带走后，由客服经理在监控范围内当场销毁","B":"客服经理将客户信息打印件随意放置在办公桌上","C":"客服经理在客户未提出删除请求的情况下，主动删除了系统中已过保存期限的客户信息","D":"客服经理在客户信息查询业务中，未按岗位权限操作，超业务需求查询客户信息"},"a":"BD"},{"id":197,"q":"根据《中国农业银行客户信息保护管理办法》的相关规定，以下哪些行为属于违规泄露客户信息的行为？","o":{"A":"为协助客户办理业务，向合作第三方机构提供客户信息并取得客户书面授权","B":"未经客户许可，将客户信息用于业务宣传材料中","C":"在工作职责范围内，向本部门其他员工提供客户信息以完成业务处理","D":"未经客户同意，向行外人员提供客户账户交易明细"},"a":"BD"},{"id":198,"q":"在智能服务区辅助客户办理业务时，网点现场员工应履行哪些职责？","o":{"A":"严格执行开卡、开户实名制要求","B":"客户输入密码时应主动回避","C":"代客户操作业务流程以提高效率","D":"代客保管客户身份证件等重要物品"},"a":"AB"},{"id":199,"q":"某支行在日常运营中被发现未按照规定开展自助设备的巡检工作。根据制度相关规定，以下关于自助设备巡检要求的表述，哪些是正确的？","o":{"A":"在行式自助设备的日常巡检由设备管理员负责，营业期间至少在每日营业前巡检一次","B":"离行式自助设备的日常巡检由设备日常管理机构负责，至少每10天巡检一次","C":"所有自助设备均需每日巡检一次，无论是否有人值守","D":"偏远地区离行自助设备可委托第三方进行巡检，但至少每月巡检一次"},"a":"ABD"},{"id":200,"q":"根据制度相关规定，以下哪些行为属于营业期间应重点检查的内容？","o":{"A":"检查柜面经理是否严格执行“一日两碰箱”规定","B":"检查客户是否在智能设备上正确输入密码","C":"检查网点现场员工是否将私人物品集中保管","D":"检查大堂经理是否在营业前完成第一次巡检"},"a":"AC"},{"id":201,"q":"根据制度规定，以下关于用户号暂停与注销的说法，哪些是正确的？","o":{"A":"用户号使用人员因请休假等原因暂时离岗超过3个工作日的，应及时注销其用户号","B":"暂停超过半年再恢复使用的用户号，应重新审核使用人员的任职条件和任职资格","C":"暂停超过一年的用户号，应及时注销","D":"用户号使用人员因离职等原因不再使用的，应在10个工作日内完成注销"},"a":"BCD"},{"id":202,"q":"某支行在日常业务操作中，发现某台自助机具终端使用了非本机具终端对应的机器用户访问BoEing系统。根据相关制度规定，以下说法正确的是：","o":{"A":"该操作属于制度允许的例外情况，无需整改","B":"机器用户仅用于各类机具终端访问BoEing进行业务处理，不同机具终端间不得混用","C":"外围系统可以使用机器用户访问BoEing系统","D":"机具终端只能使用机器用户，不得交叉使用"},"a":"BD"},{"id":203,"q":"在单位账户开立、变更或销户过程中，若涉及预留印鉴卡的预留、变更或交回，以下哪些行为不符合制度规定？","o":{"A":"客服经理在客户未提供单位公章的情况下，直接使用财务专用章完成印鉴卡预留","B":"客服经理在客户变更预留印鉴时，未核对新旧印鉴卡上的签章一致性","C":"客服经理在客户销户时，未将客户交回的印鉴卡与系统中留存的印鉴卡进行比对验证","D":"客服经理在客户变更预留印鉴时，要求客户重新填写《单位银行结算账户预留印鉴变更申请书》"},"a":"ABC"},{"id":204,"q":"在单位账户预留印鉴变更业务中，以下哪些材料是客户必须提供的？","o":{"A":"单位法定代表人或单位负责人出具的授权委托书","B":"被授权人有效身份证件原件","C":"单位营业执照复印件","D":"原预留印鉴卡"},"a":"ABD"},{"id":205,"q":"存款人撤销银行结算账户时，以下哪些行为不符合制度规定？","o":{"A":"未与开户银行核对账户余额","B":"未交回重要空白票据及结算凭证","C":"未在收回的预留印鉴卡片上注明注销日期","D":"未交回开户登记证"},"a":"ABD"},{"id":206,"q":"在外汇账户开立过程中，若客户未提供开立外汇账户申请书，也未提供外管局要求的《单位基本情况表》，则以下说法正确的是：","o":{"A":"属于开户资料不齐全，违反开户管理规定","B":"只要客户口头说明情况，即可视为资料齐全","C":"开户行应拒绝为客户开立外汇账户","D":"可以先为客户开立账户，后续补交相关资料"},"a":"AC"},{"id":207,"q":"某支行在办理对公外汇账户开立业务后，未在当日完成外汇账户开户登记，导致开户信息迟报。根据《中国农业银行对公外汇账户业务柜面作业规则》的相关规定，以下哪些操作要求是正确的？","o":{"A":"外汇账户开户登记应在账户开立的下一个工作日完成","B":"外汇账户开户登记应在账户开立当日完成","C":"开户登记后，应在第二日检查ITS系统中开户信息是否报送成功","D":"通过智速渠道开户的，系统会联动完成开户登记，无需人工干预"},"a":"BC"},{"id":208,"q":"某支行在为客户开立本外币合一账户时，涉及人民币和美元币种。根据制度要求，以下哪些操作是正确的？","o":{"A":"人民币子账户信息无需向人民银行报送","B":"人民币子账户信息应向人民银行报送","C":"美元子账户信息应向外汇管理局报送","D":"美元子账户信息无需向外汇管理局报送"},"a":"BC"},{"id":209,"q":"根据《中国农业银行预留印鉴及电子验印业务管理办法》相关规定，以下哪些行为是被禁止的？","o":{"A":"将预留印鉴卡借阅给其他部门人员进行复印","B":"有权机关依法查阅预留印鉴卡时，由保管人员全程监督","C":"内部人员因业务需要查阅预留印鉴卡时，未办理审批手续","D":"借阅人员在保管人员监督下现场查阅预留印鉴卡"},"a":"AC"},{"id":210,"q":"根据《中国农业银行银行同业存放账户管理办法(试行)》，以下哪些情形属于违反账户管理规定的操作？","o":{"A":"客户申请开立专用存款账户后，营业机构未在5个工作日内向人民银行备案","B":"客户申请变更账户信息后，营业机构在3个工作日内向人民银行报告","C":"客户申请撤销账户后，营业机构在3个工作日内向人民银行报告","D":"客户申请开立基本存款账户后，营业机构未报送开户资料至人民银行核准"},"a":"AD"},{"id":211,"q":"根据《中国农业银行对公活期存款及单位结算账户业务柜面作业规则》的相关规定，以下哪些单位在开立、变更、撤销银行账户时仍需经人民银行核准？","o":{"A":"企业法人","B":"机关单位","C":"预算管理事业单位","D":"个体工商户"},"a":"BC"},{"id":212,"q":"根据《中国农业银行银行同业存放账户管理办法(试行)》，对于一年未发生收付活动且未欠我行债务的同业存放结算账户，营业机构应如何处理？","o":{"A":"应通知客户自发出通知之日起30日内办理销户手续","B":"逾期未办理销户的账户应自动转为长期不动户","C":"可以直接销户，无需通知客户","D":"可以因业务需要不撤销久悬账户，但应停止账户支付"},"a":"ABD"},{"id":213,"q":"根据《中国农业银行反洗钱业务客户尽职调查管理办法》相关规定，以下哪些情形下，本行不得与客户建立客户或业务关系，或提供规定金额以上的一次性金融服务？","o":{"A":"客户营业执照已被吊销","B":"客户为个体工商户，但未提供经营场所证明","C":"客户营业执照已被注销","D":"客户缺乏从事相关业务的政府许可"},"a":"ACD"},{"id":214,"q":"某营业机构在办理单位客户付款业务时，因系统故障导致电子验印系统无法正常使用，客服经理在未完成预留印鉴建库的情况下，直接依据客户提供的纸质资料进行验印操作。以下哪些操作是符合《中国农业银行预留印鉴及电子验印业务管理办法》规定的？","o":{"A":"客服经理应立即停止办理业务，待系统恢复后再进行验印","B":"客服经理可依据客户提供的纸质资料进行手工折角验印","C":"客服经理应换人复核手工折角验印结果","D":"客服经理可直接办理业务，无需验印"},"a":"BC"},{"id":215,"q":"客户申请将单位账户的支付方式由支付密码变更为预留印鉴，同时变更账户动账短信通知接收人。以下哪些操作要求是必须满足的？","o":{"A":"客户应向开户行提交书面申请，并提供相关证明文件","B":"客户应提供法定代表人或单位负责人有效身份证件，如委托他人办理，还需提供授权委托书及代理人有效身份证件","C":"营业机构在办理前应核对客户身份，但无需执行授权管理规定","D":"客户应填写《支付密码器使用申请书》，并加盖单位公章"},"a":"ABD"},{"id":216,"q":"客户申请变更单位账户动账短信通知业务时，客服经理应如何操作？","o":{"A":"仅核对客户身份信息，无需核对账户凭证","B":"提示客户阅读相关服务协议并获取客户授权","C":"无需核对客户身份，直接办理变更业务","D":"核验客户身份并提交有效身份证明材料和账户凭证"},"a":"BD"},{"id":217,"q":"某客户在办理企业金融服务平台证书申请业务时，未按规定提供完整客户信息，但未截留客户K宝等支控工具或密码信封。根据《中国农业银行对公客户身份识别与尽职调查管理办法》的相关规定，以下哪些信息属于客户基本信息，必须由客户经理或柜面经理审核并记录？","o":{"A":"客户的注册或经营场所","B":"客户的行业分类","C":"客户的开户银行名称","D":"客户的法定代表人信息"},"a":"ABD"},{"id":218,"q":"在办理企业金融服务平台证书申请或证书补办业务时，客服经理应如何正确处理客户提供的相关证件？","o":{"A":"将客户提供的证件原件交还客户","B":"将客户提供的证件原件留存本行","C":"将客户提供的证件复印件交还客户","D":"将客户提供的证件复印件留存本行"},"a":"AD"},{"id":219,"q":"客户持现金支票办理现金支取业务，客服经理在业务受理过程中未按规定核验票据真伪及票据要素完整性、合规性。根据《中国农业银行对公活期存款及单位结算账户业务柜面作业规则》（农银规章〔2025〕48 号）的相关规定，以下哪些行为属于违规操作？","o":{"A":"未核对支票是否在规定的提示付款期内","B":"未检查支票的大小写金额是否一致","C":"未核对出票人签章是否与预留银行印鉴一致","D":"未要求客户填写《对公客户加强型尽职调查表》"},"a":"ABC"},{"id":220,"q":"在银行本票兑付业务中，客服经理未按规定核验票据真伪或对票据要素完整性、合规性进行审核，违规受理远期票据、过期票据、无效票据等，可能导致业务风险。根据《中国农业银行票据业务柜面作业规则》（农银规章〔2024〕151号），以下哪些行为属于违规操作？","o":{"A":"未核验银行本票是否在付款期限内","B":"未核验银行本票是否为统一印制的凭证","C":"未核验持票人是否在本票背面“持票人向银行提示付款签章”处签章","D":"未核验持票人是否为单位客户"},"a":"ABC"},{"id":221,"q":"某支行在处理客户票据结算业务时，存在未按规定及时办理支付，导致客户资金到账延迟的问题。根据《支付结算办法》相关规定，以下哪些行为是银行在支付结算中禁止的？","o":{"A":"无理拒绝支付应由银行支付的票据款项","B":"按照客户要求延迟支付以规避手续费","C":"及时办理票据支付，确保资金到账","D":"以任何理由压票、任意退票、截留挪用客户和他行资金"},"a":"ABD"},{"id":222,"q":"根据《中国农业银行银行汇票业务管理办法》相关规定，银行汇票兑付后，客服经理应如何处理相关卡片联？以下说法正确的是：","o":{"A":"兑付后应立即销毁卡片联，防止信息泄露","B":"兑付后应及时抽取、核对卡片联","C":"客服经理应每日通过系统查阅是否存在已兑付待抽撤卡片的记录","D":"内勤行长应每月核对银行汇票账务，确保卡片联与未兑付记录一致"},"a":"BCD"},{"id":223,"q":"在办理单位客户支付结算业务时，以下哪些操作是必须执行的？","o":{"A":"无需核验客户签章，直接办理业务","B":"通过电子验印系统进行自动验印","C":"对自动验印未通过的签章，应由原操作人员进行人工辅助验印","D":"对自动验印未通过的签章，应由他人进行人工辅助验印并换人复验"},"a":"BD"},{"id":224,"q":"在办理现金管理业务账户支付限额服务时，客服经理未对客户提交的《现金管理业务账户支付限额服务申请表》进行预留印鉴核验，该行为违反了哪些业务审核要求？","o":{"A":"审核客户所提供证件资料的真实性、完整性、合规性、有效性","B":"对客户提交的身份证件进行审核，并按系统提示进行联网核查","C":"审核《现金管理业务账户支付限额服务申请表》要素填写是否完整、是否有涂改","D":"审核《现金管理业务账户支付限额服务申请表》签字、签章等是否齐全，预留印鉴核验是否无误"},"a":"ACD"},{"id":225,"q":"根据制度要求，以下哪些行为属于违反电子验印业务管理规定？","o":{"A":"办理业务前先进行验印操作","B":"办理业务后补做验印操作","C":"未进行验印即完成业务记账","D":"换人复验时由原操作人员代为完成"},"a":"BCD"},{"id":226,"q":"某客服经理在办理单位客户汇款业务时，未按当地监管要求对大额资金划转进行电话查证。根据制度规定，以下哪些情形下应进行电话查证？","o":{"A":"单位客户单笔汇款金额人民币100万元（含）以上","B":"客户经理代为传递票据","C":"单位客户单笔汇款金额人民币50万元（含）以上","D":"账户未开通动账通知"},"a":"ABD"},{"id":227,"q":"在办理托管资金转出或退回业务时，以下哪些操作是必须审核的内容？","o":{"A":"审核《托管资金转出指令》或《托管资金退回指令》的要素是否齐全、有无涂改","B":"审核客户部门负责人、客户经理是否签字","C":"审核转入账户是否为基本账户","D":"审核指令上加盖的印鉴是否与《托管指令授权书》中约定的预留印鉴一致"},"a":"ABD"},{"id":228,"q":"某客户账户因未对账被系统设置为“只收不付”控制，现客户急需解除止付。客服经理在处理该业务时，以下哪些操作是符合《中国农业银行集中对账业务柜面作业规则》规定的？","o":{"A":"客户提供加盖单位公章的《未对账账户解止付申请书》","B":"客户由授权代理人办理，仅提供授权书和代理人身份证件","C":"客户无法提供法定代表人身份证件原件，提供加盖公章的复印件及《对账业务客户身份识别调查申请审批表》，并经二级分行对公客户部门和运营管理部门审批","D":"客户由法定代表人本人办理，提供其有效身份证件原件及复印件"},"a":"ACD"},{"id":229,"q":"某客服经理在为客户开立个人账户时，未对客户提供的辅助身份证明材料进行审核，导致客户资料不完整。根据《中国农业银行个人基本业务柜面作业规则》相关规定，以下说法正确的是：","o":{"A":"个人银行账户必须以实名开立，账户名称必须与身份证明文件一致","B":"银行应加强对个人银行账户开立的审查，不得为客户开立假名和匿名账户","C":"客户身份识别仅需通过联网核查和人脸识别完成，无需人工审核","D":"客户提供的辅助身份证明材料可作为核实客户身份的重要依据"},"a":"ABD"},{"id":230,"q":"某网点在办理单位客户批量开户业务时，未按要求审核相关资料，导致违规批量开户。经核查，客户身份证明材料齐全，客户身份识别工作也已开展。根据《中国农业银行个人批量开户业务柜面作业规则》（农银规章〔2022〕39号），以下哪些是该网点在批量开户业务中必须审核的内容？","o":{"A":"单位客户统一社会信用代码证等证明单位真实性材料的复印件是否加盖公章","B":"被代理人身份证件复印件是否与开户信息资料一致，是否在有效期内","C":"单位客户是否已提供客户经理双人上门核实的记录","D":"被代理人是否已完成批量合规筛查"},"a":"ABD"},{"id":231,"q":"在办理批量开立个人养老金账户（电子）业务时，以下哪些材料是必须提供的？","o":{"A":"单位客户统一社会信用代码证等证明单位真实性的材料复印件","B":"《个人养老金账户（电子）批量开户申请表》","C":"客户个人身份信息加密文件","D":"被代理人身份证原件"},"a":"ABC"},{"id":232,"q":"某客服经理在办理个人账户重归户业务时，未按规定操作，导致账户未能成功重归。根据《中国农业银行个人客户信息业务柜面作业规则》相关规定，以下哪些情形可能导致重归户失败？","o":{"A":"客户未提供有效身份证件","B":"客户名下账户状态为“密码锁定”","C":"客户名下账户签约了基金产品，但未解约","D":"客户名下账户为“冒名账户”"},"a":"ABCD"},{"id":233,"q":"某客服经理在无业务办理需求的情况下，违规对客户身份信息进行了联网核查。根据相关制度规定，以下哪些行为是被明确禁止的？","o":{"A":"在无业务办理需求的情况下进行联网核查","B":"仅在总行批准的业务范围内使用联网核查","C":"随意扩大联网核查的使用范围","D":"未经审批擅自留存联网核查结果"},"a":"ACD"},{"id":234,"q":"在办理柜面业务过程中，若客服经理通过联网核查发现客户提供的身份证件为虚假证件，应如何处理？","o":{"A":"立即为客户继续办理业务","B":"拒绝为客户办理业务","C":"向公安机关报案","D":"无需处理，继续留存客户信息"},"a":"BC"},{"id":235,"q":"在办理需联网核查的业务时，客服经理应如何正确操作以确保客户身份信息核查的准确性？","o":{"A":"对于代理人办理业务，只需核查代理人身份信息","B":"对于代理人办理业务，应同时对代理人和被代理人进行核查","C":"被代理人身份信息核查必须通过人行核查系统完成","D":"客户证件类型的选择应根据客户提供的身份证件类型进行选择"},"a":"BCD"},{"id":236,"q":"在办理需进行联网核查的个人业务时，客服经理未按规定进行人脸识别。根据制度要求，以下哪些说法是正确的？","o":{"A":"客户签署人脸识别授权协议后，客服经理为客户本人或代理人办理业务时，必须进行人脸识别","B":"人脸识别未通过时，客服经理可直接跳过该步骤继续办理业务","C":"在具备指纹识别条件的网点，若人脸识别未通过，可在取得客户授权后进行指纹识别","D":"人脸识别过程中，应优先使用普通拍摄客户影像进行识别"},"a":"AC"},{"id":237,"q":"某客户到网点申请开通掌上银行和网上银行服务，客服经理在办理过程中未按规定操作，导致未成功开通电子渠道业务。根据《中国农业银行个人网络金融业务柜面作业规则》（农银规章〔2024〕149号），以下哪些是客服经理在办理此类业务时必须执行的操作？","o":{"A":"客户可委托他人代办，无需本人到场","B":"客户需提供本人有效身份证件原件","C":"客户需提供注册账户凭证原件","D":"客户需阅读《网络金融个人客户服务协议》"},"a":"BCD"},{"id":238,"q":"某客服经理在为客户办理动账通知类短信业务时，未按规定取消该业务的短信通知功能。但经核查，该操作不存在未按客户真实意愿取消的问题。根据《中国农业银行短信业务管理办法》的相关规定，以下哪些说法是正确的？","o":{"A":"客户申请注销动账通知类短信业务时，必须由本人亲自办理，不得委托他人代办","B":"客户申请注销动账通知类短信业务时，可以由监护人代办，但需提供监护关系证明","C":"客户申请注销动账通知类短信业务时，可以由代理人代办，但需提供授权委托书并经核实","D":"客户申请注销动账通知类短信业务时，只需提供有效身份证件即可办理"},"a":"ABC"},{"id":239,"q":"某客服经理在为客户办理账户通兑方式修改业务时，未核实客户真实意愿，直接按他人指示操作。根据《中国农业银行个人基本业务柜面作业规则》（农银规章〔2023〕183号），以下哪些行为是该客服经理违规操作的表现？","o":{"A":"未核对系统返显户名与客户证件信息是否一致","B":"未请客户输入新密码","C":"未请客户在柜外清上进行信息交互确认","D":"未要求客户提供存折或存单"},"a":"ACD"},{"id":240,"q":"根据《中国农业银行电子凭证管理柜面作业规则》（农银规章〔2022〕16号）的相关规定，以下哪些情形属于未按要求处理电子凭证附件的行为？","o":{"A":"对联网核查凭证未进行影像扫描并作为S类型附件保存","B":"对新开户的存折未进行影像扫描并作为S类型附件保存","C":"对客户手工填单未进行影像扫描并作为P类型附件保存","D":"对存取款后的存折未进行影像扫描并作为S类型附件保存"},"a":"ABCD"},{"id":241,"q":"客户办理一笔大额现金存款业务，客服经理在未确认客户真实意愿的情况下，将该笔业务拆分为多笔小额交易办理，以规避业务审核和授权。以下哪些行为违反了相关制度规定？","o":{"A":"未在有效监控和客户视线范围内办理现金业务","B":"未询问客户总金额并核对大数","C":"未通过组合交易一笔完成业务，而是拆分为多笔过渡交易办理","D":"未在凭证上备注拆分原因并由内勤行长审核"},"a":"CD"},{"id":242,"q":"营业机构在办理通用账户开户业务时，若未提供《AI通用账户开户申请表》或未经有权人审批，将违反相关制度规定。根据《中国农业银行BoEing系统通用账户管理办法》，以下哪些操作是必须执行的？","o":{"A":"由运营主管审核业务的真实性和合规性并签字确认","B":"由柜员直接操作开户交易，无需审批","C":"由一级分行业务部门和运营管理部审核后，报送相关分管行长审批","D":"由客户经理填写《AI通用账户开户申请表》并提交"},"a":"AC"},{"id":243,"q":"根据《中国农业银行BoEing系统通用账户管理办法》，对于过渡期满或长期未使用的通用账户，以下哪些做法是符合制度规定的？","o":{"A":"由业务部门负责在系统中直接进行销户操作","B":"由运营管理部门按季监测动账情况并通报业务部门","C":"业务部门应及时组织清理，对可停止使用的账户进行销户处理","D":"通用账户即使一年未动账，也无需进行清理或销户"},"a":"BC"},{"id":244,"q":"某营业机构在日常业务中发现存在挪用通用账户资金的问题。根据《中国农业银行BoEing系统通用账户管理办法》的相关规定，以下哪些行为是违规的？","o":{"A":"柜员在无真实业务背景的情况下，依据运营主管审批意见进行记账","B":"柜员在未取得运营主管审批的情况下，依据真实业务凭证进行记账","C":"柜员在业务凭证不完整的情况下，经运营主管审批后进行记账","D":"柜员在业务背景合规、凭证齐全的情况下，经运营主管审批后进行记账"},"a":"ABC"},{"id":245,"q":"根据《中国农业银行BoEing系统通用账户管理办法》相关规定，以下哪些行为属于违规操作？","o":{"A":"在同一会计科目下，为相同核算内容的业务同时开立专用账户和通用账户","B":"为提高核算效率，未经审批将通用账户用于核算多个不同业务类型的账务","C":"严格按照业务管理制度和会计核算办法处理账务，确保账户用途与核算模板一致","D":"在专用账户已设置核算的业务范围内，又开立了核算内容相同的通用账户"},"a":"ABD"},{"id":246,"q":"根据《中国农业银行对账管理办法》相关规定，以下关于系统内往来清算账户对账的说法，哪些是正确的？","o":{"A":"一级分行辖内系统内往来清算账户对账仅需在月末进行一次余额核对","B":"一级分行辖内各币种系统内往来清算账户应在每个工作日进行余额和明细核对","C":"对账管理系统中应及时、准确维护上下级本外币系统内往来清算账户的对应关系","D":"对账不符或不对账账户有明细发生时，核查人员应在次日完成核查并反馈结果"},"a":"BC"},{"id":247,"q":"根据《关于加强柜面涉税冲正退费相关业务管理的通知》要求，某支行在处理一笔退费业务时，发现原收费业务已开具增值税专用发票但未追回。针对该情况，以下哪些操作是正确的？","o":{"A":"可先进行退费操作，再补追发票","B":"应先追回发票并完成作废或红字处理，再进行退费操作","C":"无需关联退费业务与原收费业务","D":"应通过BoEing系统“65401-涉税冲正退费关联”交易完成关联操作"},"a":"BD"},{"id":248,"q":"客服经理在处理支付系统异常交易时，发现一笔往账确认后状态为“待手工核销”，存在金额错误。根据制度规定，以下哪些操作是正确的？","o":{"A":"由原录入客服经理选择“41211录入冲正”交易进行往账取消处理","B":"由录入或确认客服经理选择“41215往账取消”交易进行往账取消处理","C":"应立即向接收行发出“××业务金额有误，请你行退回”的查询","D":"应立即向接收行发出“××业务金额有误，现更正为××，请你行代为更正”的查询"},"a":"BC"},{"id":249,"q":"某营业机构在办理银行承兑汇票贴现业务时，未按规定进行查询，导致票据风险未能及时识别。根据《中国农业银行票据反假管理办法》相关规定，以下哪些行为是该机构在票据查询过程中应严格遵守的？","o":{"A":"对于新客户首笔贴现或单笔金额1000万元（含）以上的贴现业务，必须进行实地查询","B":"可以单独使用传真查询作为票据查询的唯一方式","C":"票据查询应遵循“有疑必查、有查必复、查必即时、复必详尽”的原则","D":"票据查询必须由运营主管审批后方可发出"},"a":"ACD"},{"id":250,"q":"根据《中国农业银行人民币跨境支付系统业务管理办法》相关规定，对于来账报单中存在金额、币种、业务种类错误的情况，以下哪些处理方式是不符合制度要求的？","o":{"A":"通过查询查复方式与客户沟通后进行更正","B":"直接在系统中修改错误信息并继续处理","C":"做退汇处理并通知客户重新发起交易","D":"暂停交易并提交上级机构审批后再处理"},"a":"ABD"},{"id":251,"q":"某支行在代发工资业务中，发现代发工资款项被挪作他用。根据《中国农业银行代发工资业务管理规定》，以下哪些行为是违规的？","o":{"A":"代发工资款项从委托单位在他行开立的基本存款账户汇入本行内部核算账户","B":"代发工资款项到账后第12个工作日仍未完成代发","C":"代发失败后，经办机构在第6个工作日将款项退回委托单位账户","D":"本行员工代委托单位操作批量数据加密工具"},"a":"BCD"},{"id":252,"q":"在办理代发工资业务时，以下哪些行为属于违规操作？","o":{"A":"未与经办网点所属支行（或以上机构）签订代发工资协议","B":"使用一般存款账户作为代发工资签约账户","C":"未按规定处理代发款项的退款流程","D":"未按要求审核代发工资业务相关协议"},"a":"ABCD"},{"id":253,"q":"某支行客服经理在协助司法机关办理查询、冻结业务过程中，因未及时处理，导致应被冻结的客户账户资金被转移。该行为违反了《中国农业银行协助司法机关查询冻结扣划工作管理办法》的相关规定。以下哪些行为属于该制度中明确禁止的违规行为？","o":{"A":"向被查询、冻结和扣划单位、个人或者第三方通风报信","B":"擅自转移或解冻已冻结存款","C":"接到司法机关协助查询要求后，未及时办理","D":"正常向客户说明账户被冻结原因"},"a":"ABC"},{"id":254,"q":"在办理个人质押贷款业务时，客服经理在处理系统内定期存单质押止付过程中，存在未按规定鉴别存单真伪或未按制度要求进行资料审查的情况。根据《中国农业银行个人贷款业务柜面作业规则》，以下哪些操作是必须执行的？","o":{"A":"核对《质押冻结止付通知书》所列清单与质押物原件是否一致","B":"对于系统内定期存单，需重点审核其支取方式是否为凭密码支取","C":"对于系统内定期存单，可不进行防伪标识的核验","D":"若质押物支取方式为凭预留印鉴支取，可直接接受，无需修改"},"a":"AB"},{"id":255,"q":"在办理个人存单质押贷款业务过程中，若由他人代办（包括客户经理等银行内部人员），以下哪些操作是不符合《中国农业银行个人质押贷款操作规程》规定的？","o":{"A":"由客户本人到场办理并提交质押凭证","B":"由他人代办，但运营人员核实了质押物权属及状态","C":"由他人代办，且未核实质押物权属及状态","D":"由他人代办，但调查人员已确认质押物符合贷款条件"},"a":"BCD"},{"id":256,"q":"在办理个人存单质押贷款业务过程中，以下哪些行为是违反《中国农业银行个人贷款业务柜面作业规则》规定的？","o":{"A":"由客户本人持有效身份证件办理质押手续","B":"由客户经理代客户办理质押手续","C":"由客户授权的代理人但未持授权书办理质押手续","D":"由客户配偶持结婚证和客户身份证复印件办理质押手续"},"a":"BCD"},{"id":257,"q":"根据《中华人民共和国民法典》相关规定，若银行作为质权人因保管不善导致质押财产毁损、灭失，应承担相应责任。以下关于银行作为质权人保管质押财产的说法，哪些是正确的？","o":{"A":"银行作为质权人，无需对质押财产的保管负责","B":"银行作为质权人，应当妥善保管质押财产","C":"若银行保管不善导致质押财产毁损、灭失，应当承担赔偿责任","D":"出质人无权对银行保管不善的行为提出异议"},"a":"BC"},{"id":258,"q":"某客服经理在办理一笔银行卡存款业务时，因操作失误导致金额多存，客户尚未离开网点。根据《中国农业银行个人基本业务柜面作业规则》的相关规定，以下哪些操作是正确的？","o":{"A":"客服经理应立即向内勤行长报告，并经其审批后进行抹账处理","B":"若客户已在业务凭证上签字确认，客服经理应收回客户回单，并要求客户在原凭证上写明“同意取消”字样并签名确认","C":"客服经理可直接进行抹账处理，无需客户签字或内勤行长审批","D":"若客户未在业务凭证上签字确认，客服经理可直接经内勤行长审批后进行抹账"},"a":"ABD"},{"id":259,"q":"某支行客服经理在处理一笔对公账户错账时，因未按规定流程进行冲正操作，导致客户投诉并引发纠纷。根据《中国农业银行对公活期存款及单位结算账户业务柜面作业规则》的相关规定，以下哪些行为是该客服经理在处理错账时应严格遵守的？","o":{"A":"错账处理必须由内勤行长现场审核、审批和全程监督","B":"冲正交易可由客服经理自行决定是否进行，无需审批","C":"冲正交易金额为选输项，可输入或不输入，","D":"冲正交易必须通过“21203冲正”交易进行，不得以其他方式处理"},"a":"AD"},{"id":260,"q":"某网点在处理银行询证函业务时，因未及时完成网点验印、收费和子函证信息补录任务，导致回函超期。根据制度要求，以下哪些说法是正确的？","o":{"A":"网点应在任务下发当日起5个工作日内完成验印、收费和子函证信息补录","B":"若无法完成收费任务，应通知发函机构，由被审计单位尽快完成缴费","C":"多份函证存在多笔收费任务时，可合并一笔收费并填写统一收费信息","D":"子函证信息补录提交后，如发现错误，可以随意修改或撤销"},"a":"AB"},{"id":261,"q":"在代理支库业务中，若发现BoEing库款账户与TBS系统库款账户余额不一致，以下哪些做法符合制度要求？","o":{"A":"无需处理，系统会自动同步","B":"应及时查明原因并进行账务调整","C":"应在当日营业终了前完成账务核对","D":"可在次日再进行账务核对，不影响资金清算"},"a":"BC"},{"id":262,"q":"某客服经理在办理代理财政国库集中支付业务时，未能及时、准确办理相关业务，虽未造成不良后果，但存在操作不规范问题。根据《国库会计管理规定》（银发〔2005〕304号），以下哪些行为属于违规操作？","o":{"A":"未在财政机关或代理银行送达的当日将款项划出，且超过下一个工作日","B":"未对财政机关签发的库款支付凭证进行审核","C":"未对代理银行申请划款凭证进行审核","D":"未要求财政部门提供年度财政预算支出计划"},"a":"ABC"},{"id":263,"q":"根据《中国农业银行数字国库信息处理系统管理办法》相关规定，以下哪些行为可能导致代理财政国库集中支付业务未能及时、准确办理，造成不良后果？","o":{"A":"未按要求对数字国库系统进行日常业务检查","B":"未及时处理系统异常或预警信息","C":"未按操作流程完成国库资金清算操作","D":"未对客户身份进行联网核查"},"a":"ABC"},{"id":264,"q":"某代理支库在办理预算资金拨付业务时，存在拨款金额超过预算、拨款用途违反财经制度规定、拨款凭证未加盖拨款专用印鉴等问题。根据《商业银行、信用社代理国库业务管理办法》相关规定，以下哪些行为属于代理支库应拒绝受理的范围？","o":{"A":"拨款金额超过预算","B":"拨款用途违反财经制度规定","C":"拨款凭证未加盖拨款专用印鉴","D":"拨款凭证填写内容前后联次一致"},"a":"ABC"},{"id":265,"q":"某客服经理在处理一笔大额现金交易时，未按规定进行大额或可疑交易报送。根据相关制度要求，以下哪些措施是正确的处理方式？","o":{"A":"无需处理，由客户自行申报","B":"及时通过反洗钱平台进行手工补报","C":"根据业务处理需要及时对客户证件进行联网核查","D":"对于“伪现金”问题，应通过UKYC系统进行异常交易线索报告"},"a":"BCD"},{"id":266,"q":"柜员现金箱余额超过限额时，应如何处理？","o":{"A":"无需处理，继续营业","B":"设有金库的营业机构，超限额现金应及时上缴主出纳或入金库保管","C":"未设金库的营业机构，超限额现金应及时上缴主出纳","D":"可将超限额现金暂时存放在客户资料柜中"},"a":"BC"},{"id":267,"q":"营业期间（早晚押运交接除外），柜面经理需进行现金调拨或现金箱移动时，以下哪些行为是不符合《中国农业银行柜员现金箱业务柜面作业规则》规定的？","o":{"A":"柜面经理单人拎调拨箱离开高柜服务区","B":"柜面经理将现金箱放置在有效视频监控范围内","C":"柜面经理单人拎高柜柜员现金箱出营业室联动门","D":"柜面经理在有效视频监控下与他人共同办理现金箱交接"},"a":"AC"},{"id":268,"q":"柜员现金箱账实不相符，经核查发现未按规定执行“碰箱”检查。根据制度要求，以下哪些操作是柜面经理在“碰箱”检查中必须完成的？","o":{"A":"每日午间通过BoEing系统清点交易进行现金箱余额核对","B":"日终签退前在内勤行长监督下核对现金实物与系统余额","C":"每日午间由客户经理进行现金大数卡把审核","D":"日终签退前核对贵金属库存明细与系统记录是否一致"},"a":"ABD"},{"id":269,"q":"某营业机构设置4个营业窗口同时办理现金业务，核查发现该机构未指定专职主出纳，而是由一名柜面经理兼职主出纳并处理库房类现金交易。根据制度规定，以下哪些说法是正确的？","o":{"A":"该机构应指定1至2名柜面经理专职履行主出纳职责","B":"兼职主出纳在履职期间可以处理库房类现金交易","C":"兼职主出纳在履职期间不得处理库房类现金交易","D":"该机构主出纳角色设置不规范，存在操作风险"},"a":"ACD"},{"id":270,"q":"根据《中国农业银行柜员现金箱业务柜面作业规则》相关规定，客服经理在与押运人员进行柜员现金箱交接时，应执行哪些操作？","o":{"A":"与押运人员当面清点现金箱数量","B":"核对押运人员身份信息","C":"检查箱体及锁（封）的完好性","D":"仅在发现异常时才进行登记确认"},"a":"ABC"},{"id":271,"q":"根据《中国农业银行重要空白凭证管理办法》相关规定，营业机构申领重要空白凭证时，以下哪些行为是不符合制度要求的？","o":{"A":"申领数量为两周日常用量的1.5倍，并已向一级分行运营管理部报备","B":"申领数量为两周日常用量的3倍，且未向任何部门报备","C":"因阶段性营销活动需要，申领数量超过两周日常用量，并已向金库所在行层级运营管理部报备","D":"申领数量为两周日常用量的1.2倍，且未向任何部门报备"},"a":"BD"},{"id":272,"q":"某网点在日常检查中发现，客服经理在进行重要空白凭证交接时，未按规定完成交接流程，导致凭证保管、交接存在不规范问题。根据《中国农业银行重要空白凭证柜面作业规则》相关规定，以下哪些行为在凭证交接过程中是必须执行的？","o":{"A":"当面交接，双方必须当面清点凭证数量并确认无误","B":"交接凭证时必须由内勤行长或其授权人进行监交","C":"整箱交接时，调出柜员应打印用户凭证箱数据作为业务凭证","D":"不见面交接时，调出柜员可直接将凭证箱交给调入柜员，无需封箱"},"a":"ABC"},{"id":273,"q":"根据《中国农业银行重要空白凭证柜面作业规则》的相关规定，柜员在进行重要空白凭证清点时，以下哪些操作是必须执行的？","o":{"A":"每日营业终了必须进行一次凭证清点","B":"清点时只需清点本行重要空白凭证，无需清点代理凭证","C":"清点时必须生成电子凭证并打印业务凭证","D":"清点时必须有两张凭证清点的传票，分别对应本行和代理重要空白凭证"},"a":"ACD"},{"id":274,"q":"对系统不能自动销号的重要空白凭证，客服经理应如何处理？","o":{"A":"直接作废，无需登记","B":"通过手工销号交易进行登记","C":"在摘要栏注明手工销号原因","D":"仅在系统中登记，无需手工记录"},"a":"BC"},{"id":275,"q":"以下哪些行为违反了《中国农业银行重要空白凭证管理办法》关于重要空白凭证使用的规定？","o":{"A":"在未使用的重要空白凭证上加盖本行印章","B":"在未使用的重要空白凭证上加盖经办人名章","C":"对填写错误的重要空白凭证，经内勤行长审核后剪角并加盖“作废”戳记","D":"未经审批，将重要空白凭证用于教学用途"},"a":"ABD"},{"id":276,"q":"根据《中国农业银行重要空白凭证管理办法》相关规定，客服经理在作废重要空白凭证时，应如何操作？","o":{"A":"作废凭证应剪去正面右下角","B":"作废凭证应加盖“作废”戳记","C":"作废凭证可直接丢弃至废纸篓","D":"作废凭证应作为该笔作废业务传票附件"},"a":"ABD"},{"id":277,"q":"根据《中国农业银行柜员现金箱业务柜面作业规则》的相关规定，以下哪些物品应当纳入柜员现金箱保管？","o":{"A":"本外币现金","B":"未作废的、待客户领取的吞卡","C":"贵金属","D":"个人私人物品"},"a":"ABC"},{"id":278,"q":"营业机构在调拨重要空白凭证时，以下哪些行为是制度明确禁止的？","o":{"A":"未见调拨指令即进行实物调拨","B":"申领凭证时先登记后核验实物","C":"上缴凭证时先登记后上缴实物","D":"调拨凭证后补记登记信息"},"a":"ABD"},{"id":279,"q":"根据《中国农业银行重要空白凭证管理办法》相关规定，以下关于在途重要空白凭证的处理要求，说法正确的是：","o":{"A":"所有在途重要空白凭证必须在当日完成核销","B":"预约调拨、日终上缴的重要空白凭证可延至下一工作日核销","C":"年末不得有在途重要空白凭证","D":"在途重要空白凭证可长期挂账，无需核销"},"a":"BC"},{"id":280,"q":"年终决算日，某支行在途现金未及时核销，导致“运送中现金”科目存在余额。根据《中国农业银行金库运营业务管理办法》相关规定，以下说法正确的是：","o":{"A":"在途现金应在实物收妥后及时核销","B":"预约出库、日终上缴的运送中现金可延至次日核销","C":"年末“运送中现金”科目可以存在余额","D":"系统内现金调拨因特殊情况退回的，应于收到退回实物的当日核销"},"a":"ABD"},{"id":281,"q":"某网点在日常检查中发现，某台不具备自动清机功能的自助设备，最近一次人工清机操作已超过10天。根据制度规定，以下说法正确的是：","o":{"A":"该设备应立即进行人工清机","B":"该设备可继续运行，无需处理","C":"该设备应按照制度要求，人工清机频次不得超过10天","D":"该设备若使用定时清机功能，则每月至少需人工清机1次"},"a":"ACD"},{"id":282,"q":"在处理自助（智能）设备卡钞及吞没卡时，以下哪些操作是符合《中国农业银行自助（智能）设备加配钞业务管理规定》要求的？","o":{"A":"上箱体卡钞由钞箱管理岗或巡检人员双人装入专用信封，并锁入上箱体，待清机时带回清点","B":"下箱体卡钞可直接由巡检人员单人处理，无需使用紧急开闭锁流程","C":"离行式设备的吞没卡应由钞箱管理岗或巡检人员现场密封","D":"废钞箱现金可由钞箱管理岗装入专用信封带回处理，无需加封"},"a":"AC"},{"id":283,"q":"客服经理在办理现金业务时，以下哪些操作行为是不符合制度规定的？","o":{"A":"在客户视线范围内办理现金收付业务","B":"同时为两位客户办理现金存取业务，未做到一户一清","C":"在未开启监控的环境下为客户办理现金取款","D":"每笔现金业务均做到当面点准、一笔一清"},"a":"BC"},{"id":284,"q":"根据《银行业金融机构反假货币工作指引》相关规定，银行业金融机构在对外支付货币时，应采取哪些措施以防止误收误付假币？","o":{"A":"对外支付的货币应进行全额清分","B":"可以直接对外支付未经清分的现金","C":"应建立完善的假币识别机制","D":"无需对现金收付业务进行定期检查"},"a":"AC"},{"id":285,"q":"根据《中国农业银行柜员现金箱业务柜面作业规则》的相关规定，以下关于出纳长短款处理的说法，哪些是正确的？","o":{"A":"出纳长短款差错必须在当日通过BoEing系统进行挂账处理","B":"无法查明原因且挂账满一年的出纳长短款，可直接转入“营业外收入”或“营业外支出”科目，无需审批","C":"柜面经理因利息找零等形成的小额现金长短款（角、分），可暂不挂账，但需在月末统一处理","D":"出纳长短款挂账后，必须通过“待处理出纳长款”或“待处理出纳短款”专户进行处理"},"a":"ACD"},{"id":286,"q":"根据《中国农业银行超级柜台运营管理办法》相关规定，以下关于超级柜台重要空白凭证监督检查的说法，哪些是正确的？","o":{"A":"重要空白凭证每旬至少进行1次清机，由单人在监控状态下操作","B":"重要空白凭证每旬至少进行1次清机，由双人在监控状态下操作","C":"内勤行长对设备内保管的重要空白凭证每旬至少进行1次账实检查","D":"营业网点负责人对设备内保管的重要空白凭证每旬至少进行1次账实检查"},"a":"BC"},{"id":287,"q":"根据《关于加强金库实物智能化管理的通知》要求，查库时对空钞箱的检查应满足哪些规定？","o":{"A":"无需开箱检查","B":"对不少于10%的空钞箱进行抽查","C":"对长期不动、摆放隐秘的空钞箱必须开箱检查","D":"可以通过RFID电子标签、称重等技术手段实现对空钞箱的全量盘查"},"a":"BCD"},{"id":288,"q":"反假货币培训新机制所指的的现金从业人员是（）","o":{"A":"运营管理人员","B":"现金收付人员","C":"清分人员","D":"鉴定人员"},"a":"ABCD"},{"id":289,"q":"（）单位可以收缴或没收假币","o":{"A":"人民银行","B":"商业银行","C":"信用社","D":"证券公司","E":"收费站"},"a":"ABC"},{"id":290,"q":"《假币收缴凭证》的“有效证件类型”包括（）","o":{"A":"居民身份证","B":"户口簿","C":"港澳通行证、台胞证","D":"港澳居民居住证、台湾居民居住证","E":"外国公民护照、外国人永久居留身份证"},"a":"ABCDE"},{"id":291,"q":"《中国人民银行货币鉴别及假币收缴、鉴定管理办法》所称的货币包括（）","o":{"A":"人民币","B":"美元","C":"日元","D":"欧元"},"a":"ABCD"},{"id":292,"q":"《中华人民共和国人民币管理条例》规定，不得流通的人民币是（）","o":{"A":"不能兑换的残缺、污损人民币","B":"停止流通人民币","C":"普通纪念币","D":"贵金属纪念币"},"a":"AB"},{"id":293,"q":"《中华人民共和国人民币管理条例》中，关于假币收缴的规定包括","o":{"A":"办理人民币存取款业务的金融机构应当无偿提供鉴别服务","B":"发现假币应当收缴","C":"不得将假币对外支付","D":"收缴的假币不得再交予持有人"},"a":"ABCD"},{"id":294,"q":"10月9日，某货币真伪鉴定机构工作人员小刘接到李女士电话要鉴定30日被某银行收缴的一张100元假币，小刘将假币券别、张数、机构等作了详细的记录10月13日(10月11日、12日为双休，来后通知收缴单位送达待鉴定货币，并于当日按规定程序进行了案例中的操作是否违反假币鉴定程序，为什么（）","o":{"A":"违反《中国人民银行假币收缴、鉴定管理办法》规定的假币鉴定程序","B":"应受理李女士电话鉴定请求","C":"10月13日通知收缴单位送达需鉴定货币，超过了规定时限"},"a":"AC"},{"id":295,"q":"2026年4月10日某银行接到李先生投诉：3月7日在你行办理现金取款业务时，收到了假币，且假币已被另一银行收缴，要求办理冠字号码查询李先生提供了上次办理现金取款业务的日期、金额与假币的冠字号码后，该银行工作人员为李先生办理了冠字号码查询业务，以判断假币是否由该银行柜面付出这个案例中，违反了（）规定","o":{"A":"查询人的查询申请已超过时效，该银行不应受理查询","B":"查询应携带有效证件","C":"查询应提供办理现金取款业务的证明资料","D":"查询应携带假币实物或《假币收缴凭证》"},"a":"ABCD"},{"id":296,"q":"2026年4月15日，客户刘先生持1张100元假币到某商业银行营业网点反映：5天前在该营业网点取款5000元，其中有1张假币，现在要求银行退赔柜面人员小李在张先生提供身份证和假币实物后，受理了张先生的申请，同时将假币按照规定办理了假币收缴手续，并在纸币实物上加盖印章请问柜员小李本应如何操作（）","o":{"A":"因张先生提供的资料不全，小李应拒绝受理该申请","B":"小李应当面告知张先生补齐相关材料","C":"当张先生补齐材料后，应比照《中国人民银行假币收缴、鉴定管理办法》中对于假硬币、假外币的处理办法予以封存，暂不在纸币实物上加盖印章","D":"在查询工作处理完结后，依据《中国人民银行假币收缴、鉴定管理办法》关于假人民币纸币的程序进行收缴"},"a":"ABCD"},{"id":297,"q":"2026年4月3日，某银行（已接入人民银行反假货币信息系统）的临柜人员在为客户办理业务清点客户存款时发现了3张100元面额可疑币，冠字号码分别为G2A2386175、G2F8983045、G2F8984439，经过其他工作人员复核确认是假币后，王晓芳当场收缴了这3张100元假币以下关于该金融机构处理假币的做法表述正确的是（）","o":{"A":"临柜人员王晓芳登陆反假货币信息系统，按照冠字号码分类填写《假币收缴凭证》","B":"其中两张假币G2F8983045、G2F8984439的冠字号码前6位相同视为同一冠字号码合并面额、张数填写《假币收缴凭证》","C":"3张假币的冠字号码各不相同，不能合并张数面额填制《假币收缴凭证》","D":"根据相关规定，不允许收缴人员在该批假币上面加盖”假币戳记”"},"a":"AB"},{"id":298,"q":"2026年4月6日,某省会城市银行业金融机构网点柜员在办理客户甲存入的现金10000元时,用A类点钞机进行清点,并同步记录了冠字号码过后,客户乙来网点取款10000元,柜员将刚收入的客户甲的钱当客户乙的面清点后,付给了客户乙第二天,客户乙拿着一张假币到网点,生气地说,这是在昨天网点付给他的钱里发现的1张假币网点柜员马上当客户乙的面通过该行冠字号码系统输入了该张假币的冠字号码,结果显示未有记录客户乙只能拿着假币悻悻而去请指出这个案例中违反的规定包括（）","o":{"A":"该网点付出现金未经清分","B":"客户申请查询冠字号码未提交相关资料及书面申请,网点亦未提供查询结果的书面通知","C":"网点查询冠字号码未使用模糊查询","D":"查询的假币未予以收缴"},"a":"ABD"},{"id":299,"q":"办理假币收缴业务时，应在假币收缴凭证上填写（）要素","o":{"A":"被收缴人姓名","B":"被收缴人的身份证或其他有效证件号码","C":"假币券别、版别、冠字号码、来源和制作方法","D":"收缴的数量及面额"},"a":"ABCD"},{"id":300,"q":"办理人民币存取款业务的银行业金融机构（），应当立即报告公安机关","o":{"A":"一次性发现假币5张（枚）以上","B":"有新版的伪造人民币","C":"有其他制造贩卖伪造人民币线索的","D":"有其他制造贩卖变造人民币线索的"},"a":"ABCD"},{"id":301,"q":"不能流通的人民币是（）","o":{"A":"人民币样币","B":"停止流通的人民币","C":"不能兑换的残缺、污损人民币","D":"不能兑换的特殊残缺、污损人民币"},"a":"ABCD"},{"id":302,"q":"残损人民币兑换标准分为","o":{"A":"全额兑换","B":"半额兑换","C":"不予兑换","D":"比例兑换"},"a":"ABC"},{"id":303,"q":"对于假人民币纸币，盖假币章的要求为（）","o":{"A":"应该在被收缴人视线可及范围内加盖“假币”印章","B":"使用蓝色印油","C":"加盖印章的位置在假币的正面中间和背面中间位置","D":"加盖印章的位置在假币的正面水印窗和背面中间位置"},"a":"ABD"},{"id":304,"q":"犯罪嫌疑人刘某为了牟利，伪造了假人民币1000余万元，并将其偷运至外地出售牟利刘某的行为说法错误的（）","o":{"A":"伪造货币罪","B":"运输假币罪","C":"出售假币罪","D":"上述三罪，实行数罪并罚"},"a":"BCD"},{"id":305,"q":"根据《中国人民银行残缺、污损人民币兑换办法》相关规定，有下列（）情形之一的残缺、污损人民币不予兑换","o":{"A":"重要防伪特征缺失，无法辨别为真币的","B":"无法辨别面额的","C":"剩余面积比例不满二分之一的","D":"票面被严重侵蚀的"},"a":"ABC"},{"id":306,"q":"根据《中华人民共和国现金管理暂行条例》第五条规定，开户单位可以在下列哪些范围内使用现金：（）","o":{"A":"职工工资、津贴","B":"个人劳务报酬","C":"根据国家规定颁发给个人的科学技术、文化艺术、体育等各种奖金","D":"各种劳保、福利费用以及国家规定的对个人的其他支出","E":"向个人收购农副产品和其他物资的价款"},"a":"ABCDE"},{"id":307,"q":"根据有关规定，假币被收缴后，被收缴人应当享有的权利是（）","o":{"A":"对收缴行为有异议的，在收到《假币收缴凭证》之日起60日内可申请行政复议或提起行政诉讼","B":"对收缴或鉴定行为有异议的，在收到《假币收缴凭证》或《货币真伪鉴定书》之日起60日内可申请行政复议","C":"对被收缴的货币真伪有异议的，自收到《假币收缴凭证》之日起3个工作日内向当地鉴定单位申请鉴定","D":"对鉴定结果有异议的，可向人民银行逐级申请再鉴定"},"a":"ABCD"},{"id":308,"q":"关于伪造、变造人民币的相关规定中，（）情况，构成犯罪的，依法追究刑事责任","o":{"A":"伪造、变造人民币","B":"出售伪造、变造的人民币","C":"明知是伪造、变造的人民币而运输","D":"以上都不对"},"a":"ABC"},{"id":309,"q":"柜面办理冠字号码查询，需受理的情形有","o":{"A":"客户误收假币查询","B":"金融机构内部核查","C":"监管部门检查","D":"司法机关调查"},"a":"ABCD"},{"id":310,"q":"柜面现金收付业务中，以下属于基本操作要求的是","o":{"A":"一笔一清","B":"当面点清","C":"日清日结","D":"先收款后记账"},"a":"ABCD"},{"id":311,"q":"柜员现金箱存放物品范围包含（）","o":{"A":"本外币现金","B":"贵金属","C":"重要空白凭证","D":"印章"},"a":"ABCD"},{"id":312,"q":"贾某为某公司会计，一日到其开户银行交存现金25万元，银行工作人员在为其办理业务过程中，发现有其中有1张假币，告知贾某要进行收缴，由于贾某与该银行员工较熟悉，贾某提出要银行员工将该假币退回，银行员工经过考虑将假币退予贾某，贾某表示感谢对于银行员工的这种行为，中国人民银行的处理方式为（）","o":{"A":"给予警告","B":"给予以1000元以上5万元以下罚款","C":"责成银行业金融机构对相关主管人员和其他直接责任人给予相应纪律处分","D":"依法将该案移交司法部门进行处理"},"a":"ABC"},{"id":313,"q":"假币封装袋需加盖的戳记有（）","o":{"A":"假币","B":"收缴日期","C":"收缴人","D":"复核人"},"a":"ABCD"},{"id":314,"q":"假币已被另一银行收缴,要求办理冠字号码查询李先生提供了上次办理现金取款业务的日期金额与假币的冠字号码后,该银行工作人员为李先生办理了冠字号码查询业务,以判断假币是否由该银行柜面付出这个案例中,违反了（）规","o":{"A":"查询人的查询申请已超过时效,该银行不应受理查询","B":"查询人应携带有效证件","C":"查询人应提供办理现金取款业务的证明资料","D":"查询人应携带假币实物或《假币收缴凭证》"},"a":"ABCD"},{"id":315,"q":"金融机构发现假币后，不得（）","o":{"A":"将假币退还持有人","B":"自行销毁假币","C":"对外泄露假币信息","D":"上缴央行"},"a":"ABC"},{"id":316,"q":"金融机构柜面发现假币后，完整的收缴流程包括（）","o":{"A":"由 2 名以上业务人员当面予以收缴，被收缴人不能接触假币","B":"当面在假人民币纸币或假币收缴专用袋封口处盖假币章","C":"出具按照人民银行统一规范制作的《假币收缴凭证》","D":"告知被收缴人如对被收缴的\n货币真伪判断有异议，可以向鉴定单位申请鉴定","E":"在监控下实施，监控记录保存期限不少于3个月"},"a":"ABCDE"},{"id":317,"q":"金融机构在收缴假币过程中发现新的造假手段制作假币的，应当立即向（）报告","o":{"A":"当地人民银行分支机构","B":"人民银行总行","C":"当地公安机关","D":"中国印钞造币总公司"},"a":"AC"},{"id":318,"q":"我国法律规定:禁止（）和使用伪造、变造的人民币","o":{"A":"出售","B":"购买","C":"运输","D":"持有"},"a":"ABCD"},{"id":319,"q":"下列属于变造货币行为的有（）","o":{"A":"挖补真币面额","B":"拼接多张真币","C":"涂改真币编号","D":"仿照真币印刷"},"a":"ABC"},{"id":320,"q":"现金柜员离岗时，需做到","o":{"A":"现金入柜上锁","B":"印章收起","C":"凭证整理","D":"电脑锁屏"},"a":"ABCD"},{"id":321,"q":"现金柜员上岗必须具备的条件包括","o":{"A":"取得反假货币资格证书","B":"熟练掌握现金收付操作","C":"遵守现金管理规定","D":"具备良好职业道德"},"a":"ABCD"},{"id":322,"q":"现金上缴业务管理要求包括","o":{"A":"双人清点","B":"分类捆扎","C":"账实相符","D":"及时上缴"},"a":"ABCD"},{"id":323,"q":"现金业务大额现金管理要求包括","o":{"A":"登记报备","B":"身份核验","C":"来源/用途审核","D":"可疑交易监测"},"a":"ABCD"},{"id":324,"q":"现金业务交接，需现场","o":{"A":"清点现金","B":"核对账实","C":"双方签字","D":"监交人确认"},"a":"ABCD"},{"id":325,"q":"现金业务中，“日清日结”的含义包括","o":{"A":"当日业务当日办结","B":"当日现金当日清点","C":"当日账实当日核对","D":"当日差错当日处理"},"a":"ABCD"},{"id":326,"q":"现金业务中，“一笔一清”是指","o":{"A":"一笔业务办结再办下一笔","B":"现金清点清楚","C":"凭证整理完整","D":"避免混淆差错"},"a":"ABCD"},{"id":327,"q":"现金业务中，长款处理流程包括","o":{"A":"查找原因","B":"登记备案","C":"按规定上缴","D":"私自留存"},"a":"ABC"},{"id":328,"q":"杨先生到某银行办理美元存款业务，储幕柜员小王在为纯办理业务时发现11张10元面值的美元假币，小王与一名同事在该假币的正面水印窗及背面中间位置加盖了假币印章，向杨先生出具了《假而没收收据》以下有关上述案例中，描述正确的是（）","o":{"A":"小王应向当地人民银行和公安机关进行联系","B":"小王发现假外币假币不应当面加盖\"假币\"字样的戳记，应放入统一的专用袋加封","C":"小王应向客户开具《假币收缴凭证》","D":"小张没有向客户属行告知程序"},"a":"ABCD"},{"id":329,"q":"以下属于伪造币（）","o":{"A":"拓印假币","B":"复印假币","C":"拼凑假币","D":"描绘假币"},"a":"ABD"},{"id":330,"q":"银行或者其他金融机构的工作人员购买假币或者利用职务上的便利，以假币换取货币，总面额在5万元以上或者币量在5000张（枚）以上或者有其他严重情节的，（）","o":{"A":"处2年以上5年以下有期徒刑","B":"处10年以上有期徒刑或者无期徒刑","C":"并处2万元以上30万元以下罚金或者没收财产","D":"并处2万元以上20万元以下罚金或者没收财产"},"a":"BD"},{"id":331,"q":"银行现金柜员小王在办理一客户10万元人民币存款时，发现其中5张100元是假币，他当即将假币收缴，告知持币人如对被收缴的货币真伪有异议，可以在3个工作日内向中国人民银行当地分支机构或中国人民银行授权的当地鉴定机构申请鉴定，填制《假币收缴凭证》，将《假币收缴凭证》交顾客签字，将假币实物和《假币收缴凭证》单独保管，办理完这笔现金存款后，又开始办理下一笔业务上述案例中，小王的操作违反规定的有（）","o":{"A":"银行应开具《假人民币没收收据》而非《假币收缴凭证》","B":"应当立即报告当地人民银行和公安机关","C":"持币人如对被收缴的货币真伪有异议，可以在10个工作日内向中国人民银行当地分支机构或中国人民银行授权的当地鉴定机构申请鉴定","D":"违法了双人收缴的规定"},"a":"BD"},{"id":332,"q":"银行业金触机构在收缴假币过程中遇到（）情形，应当立即报告当地公安机关，提供有关钱索","o":{"A":"一次性发现假人民币5张（枚）以上和当地中国人民银行分支机构和公安机关发文另有规定的两者较小者","B":"利用新的造假手段制造假币的","C":"获得制造、贩卖，运输，持有或者使用假币线索的","D":"被收缴人不配合金融机构收缴行为的"},"a":"ABCD"},{"id":333,"q":"银行业金融机构付出的（）人民币必须记录冠字号码","o":{"A":"100元券","B":"50元券","C":"20元券","D":"10元券"},"a":"AB"},{"id":334,"q":"在假币实物上加盖“假币”印章，正确的位置是（）","o":{"A":"正面水印窗","B":"正面中间","C":"背面水印窗","D":"背面中间"},"a":"AD"},{"id":335,"q":"整点后的钱捆要达到“五好钱捆”标准“五好”标准包括（）","o":{"A":"点准","B":"挑净","C":"墩齐","D":"捆紧","E":"名章齐全清楚"},"a":"ABCDE"},{"id":336,"q":"中国人民银行分支机构应当自接到残缺、污损人民币鉴定申请之日起（）个工作日内做出鉴定并出具鉴定书情况复杂的，经本单位负责人批准，可以延长，但是延长期限最多不超过（）个工作日","o":{"A":"10","B":"20","C":"20","D":"30"},"a":"BC"},{"id":337,"q":"走私假币罪，是指违反海关规定，逃避海关监管，非法（）伪造的货币进出国（边）境的行为","o":{"A":"运输","B":"携带","C":"邮寄","D":"贩卖"},"a":"ABC"},{"id":338,"q":"如果客户银行卡被吞入自助设备，客户采取哪些措施？","o":{"A":"通过自助设备现场办理取卡","B":"通过柜面办理取卡","C":"通过客服进行申诉"},"a":"AB"}],"judge":[{"id":1,"q":"不规则还款方式的贷款做部分提前还款，必须从C3修改还款计划（含一条当日还款计划）并发送BoEing，BoEing做正常/超期还款交易。","a":"正确"},{"id":2,"q":"贷款提前还款还错户后做冲账处理，只需对提前还款账单上的已收本金进行冲账即可。","a":"错误"},{"id":3,"q":"账单上的利息补账应该按照欠息-应收-已收的顺序进行。","a":"正确"},{"id":4,"q":"账单上的利息冲账应该按照已收-应收-欠息的顺序进行。","a":"正确"},{"id":5,"q":"贷款合约撤销后，不可以对利息差错进行调整。","a":"错误"},{"id":6,"q":"协助有权机关账户金额冻结对公活期账户时，如冻结金额大于账户余额时，协助冻结通知书回执上的应冻结金额填写“当前冻结金额”；已冻结金额填写“申请冻结金额”填写。","a":"错误"},{"id":7,"q":"协助有权机关账户金额冻结对公活期账户时，如冻结金额小于账户余额时，协助冻结通知书回执上的应冻结金额填写“申请冻结金额”；已冻结金额填写“当前冻结金额”填写。","a":"正确"},{"id":8,"q":"协助有权机关账户金额冻结对公非活期账户时，协助冻结通知书回执上的应冻结金额填写“申请冻结金额”；已冻结金额填写“当前冻结金额”填写。","a":"正确"},{"id":9,"q":"协助有权机关账户金额冻结保证金账户（活期）时，如冻结金额大于账户余额时，协助冻结通知书回执上的应冻结金额填写“当前冻结金额”；已冻结金额填写“申请冻结金额”填写。","a":"错误"},{"id":10,"q":"协助有权机关账户金额冻结保证金账户时，如冻结金额小于账户余额时，协助冻结通知书回执上的应冻结金额填写“申请冻结金额”；已冻结金额填写“当前冻结金额”填写。","a":"正确"},{"id":11,"q":"柜面取现交易只要大于等于20万就需要进行反诈报备","a":"错误"},{"id":12,"q":"柜面转账交易只要大于等于50万就必须要向公安进行反诈报备","a":"错误"},{"id":13,"q":"营业网点办理现金业务，对反诈模型命中弹屏提示、且20万元及以上的大额取现业务，需上传“可疑线索报送记录”作为远程授权审核要素之一。","a":"正确"},{"id":14,"q":"营业网点办理开户、转账、取现、提额或解控等面客业务时，需向客户提示反诈风险。","a":"正确"},{"id":15,"q":"营业网点办理业务过程中，发现符合涉诈特征的可疑情况，无需向当地公安或反诈中心报送线索。","a":"错误"},{"id":16,"q":"银行对涉诈异常情形采取限制、暂停服务等处置措施的，不应当告知处置原因、救济渠道及需要提交的资料等事项。","a":"错误"},{"id":17,"q":"银行应当对从业人员和用户开展反电信网络诈骗宣传，在有关业务活动中对防范电信网络诈骗作出提示，对本领域新出现的电信网络诈骗手段及时向用户作出提醒。","a":"正确"},{"id":18,"q":"办理商业汇票银行承兑业务，对确认洗钱风险较高或不符合本行制裁风险管理规定的客户，应采取暂停为客户办理票据业务等措施。","a":"正确"},{"id":19,"q":"商业汇票贴现业务，对确认洗钱风险较高或不符合本行制裁风险管理规定的客户，应采取暂停为客户办理票据业务等措施。","a":"正确"},{"id":20,"q":"收到类型为现金汇款的跨行来账业务，若付款方的地址项等信息为空，则无论入账账号户名是否一致，均需落地处理。","a":"正确"},{"id":21,"q":"单位客户到柜面办理转账汇款业务，客服经理应查看客户洗钱和恐怖融资风险等级，若CCS等级为“高风险类”，则拒绝受理该笔业务。","a":"错误"},{"id":22,"q":"柜面发起的跨行普通贷记现金业务，若命中反洗钱筛查，经客服经理核实为误命中，则可以直接关闭系统弹窗提示命中信息，无需后续处理。","a":"错误"},{"id":23,"q":"柜面发起的大额转账交易，通过我行反洗钱系统自动采集数据进行报送。对于系统未能自动采集到的大额交易，需通过手工录入反洗钱系统进行上报。","a":"正确"},{"id":24,"q":"自贸区营业机构通过网内往来办理的跨境人民币业务，应对收付款人信息进行反洗钱黑名单排查。","a":"正确"},{"id":25,"q":"对公外汇账户开户注重资金性质的审核，所以不用审核客户身份证明文件。","a":"错误"},{"id":26,"q":"法定代表人授权他人开立对公外汇账户的，被授权人仅需携带法人及被授权人身份证件即可开户。","a":"错误"},{"id":27,"q":"境外机构申请开立对公外汇账户的，应出具外汇管理局出具的《特殊机构代码赋码通知》。","a":"正确"},{"id":28,"q":"开立对公外汇账户前，需完成客户尽职调查并填制《对公客户尽职调查表》，无需进行加强型尽调。","a":"错误"},{"id":29,"q":"禁止建立业务关系的客户不能为其办理对公外汇账户开户业务，但可以为其办理变更及销户业务。","a":"错误"},{"id":30,"q":"开立对公外汇账户时，柜面无需审核客户部门是否提供《对公客户加强型尽职调查表》，填写信息是否完整、结论是否明确。","a":"错误"},{"id":31,"q":"各级运营部门接到内控合规监督部门通知，有关交易记录涉及正在被反洗钱调查的可疑交易活动，且反洗钱调查工作在规定的最低保存期限届满时仍未结束的，应将交易记录保存至反洗钱调查工作结束。","a":"正确"},{"id":32,"q":"总行资金清算端采用跨境收、付汇双方向筛查模式集中筛查跨境清算业务。","a":"正确"},{"id":33,"q":"对公业务查复内容，经办行需报告至分行国际金融部和个人金融部，国际金融部和个人金融部审核查复内容的真实性、准确性和完整性，并对查复内容进行反洗钱及制裁合规性初审后，向分行内控合规监督部报送，由其进行合规性复审。","a":"错误"},{"id":34,"q":"“伪现金”是指商业银行利用现金业务方式和渠道为客户办理资金划转和转账服务，实际资金在不同客户账户间流动的“现金”交易。","a":"正确"},{"id":35,"q":"对于现金汇款等系统未能自动采集的大额交易，业务经办机构应开展大额交易、可疑交易人工识别，通过手工录入反洗钱信息系统进行上报。","a":"正确"},{"id":36,"q":"可以使用“过渡户现金存入/支取”交易操作，以现金存入网点过渡账户的方式汇划客户资金。","a":"错误"},{"id":37,"q":"可以使用“过渡户现金存入/支取”交易操作，为现金箱虚假增减现金。","a":"错误"},{"id":38,"q":"“伪现金”交易的特点是，单笔金额大、交易间隔时间短等特证，大额资金以现金存取交易替代转账交易方式完成账户间转移，割裂资金链条，影响反洗钱可疑交易分析，存在洗钱风险。","a":"正确"},{"id":39,"q":"客户主动提出“伪现金”交易要求的，应加强对交易双方客户身份、交易背景、交易目的及交易用途等的调查和了解，对于非必要的大额现金存取，业务经办人应提示和引导客户使用转账方式完成，拒绝为客户办理异常“伪现金”交易，有效防控洗钱风险。","a":"正确"},{"id":40,"q":"对于人工识别为可疑的“伪现金”交易，也要通过手工录入反洗钱信息系统进行上报。","a":"正确"},{"id":41,"q":"运营监管经理对于检查发现的异常“伪现金”交易，营业机构应按规定进行反洗钱可疑报送而未报的，监管经理要如实在DRC系统中登记问题并督导落实整改；对于报告不规范、不完整的，要及时对柜面人员给予辅导，强化柜面反洗钱合规履职。","a":"正确"},{"id":42,"q":"对于不在本行开立账户或未与本行建立业务关系的客户办理一次性现金汇款业务，首次办理该业务且单笔交易金额在1万元（含）以上时，经办人员需审核客户有效身份证件，进行身份核查，留存有效身份证件复印件或者影印件。","a":"正确"},{"id":43,"q":"现金汇款金额人民币1万元（含）以上的，还应按照《中国农业银行反洗钱业务个人客户尽职调查操作规程》规定，登记《中国农业银行个人客户准入（重新识别）尽职调查信息表》，登记客户身份基本信息，并根据识别结果办理业务。","a":"正确"},{"id":44,"q":"账户行账户销户时，允许账户余额为零但存在未结算利息。","a":"错误"},{"id":45,"q":"账户行对账要以对账单、账务数据为依据，开展对账工作并做好详细记录，确保对账过程和结果准确有效。","a":"正确"},{"id":46,"q":"如清算余额对账不符，应查找相关报文和交易信息进行人工核实确认，及时通知业务人员查找原因，跟踪差错差异情况的处理，并向上级报告。","a":"正确"},{"id":47,"q":"超级柜台人脸识别分值大于自动通过阈值，自动审核通过，小于等于自动通过阈值，自动拒绝。","a":"错误"},{"id":48,"q":"后台作业中心人员获取超级柜台身份审核任务不可手动拍摄客户现场照片。","a":"错误"},{"id":49,"q":"目前市场上存在一些贩卖银行卡的行为，或者存在一些被欺骗去银行办卡的行为。引导时初审为本人的情况下，注意询问客户办卡开户是否本人所用，是否为客户真实意愿。避免出现贩卖、诈骗等行为，损害客户利益及我行声誉。","a":"正确"},{"id":50,"q":"超级柜台转账业务向客户提示实时到账、普通到账、次日到账三种转账方式。","a":"正确"},{"id":51,"q":"自助银行业务遵循国家反洗钱法律法规及各项监管制度规定，通过统一的业务流程设计和系统控制实现合规办理业务，满足客户身份识别、交易记录保管等反洗钱监管要求。","a":"正确"},{"id":52,"q":"自助银行业务由客户自助办理，不需要我行工作人员干预，通过系统自动履行大额和可疑交易报告等反洗钱义务。","a":"正确"},{"id":53,"q":"无卡取款业务需在业务流程中保证客户身份识别无误的前提下办理取款业务。","a":"正确"},{"id":54,"q":"在自助设备办理转账业务，须验证银行卡磁条或芯片信息、账户密码等信息与预留信息一致，后办理转账业务。","a":"错误"},{"id":55,"q":"柜面办理单位结算账户开户、变更、销户业务，需首先由客户部门完成尽职调查，并填制《对公客户尽职调查表》或《对公客户加强型尽职调查表》。","a":"正确"},{"id":56,"q":"按照《非居民金融账户涉税信息尽职调查管理办法》要求，机构开立账户时，金融机构应当获取由该机构授权人签署的声明文件，识别账户持有人是否为非居民企业和消极非金融机构。声明文件应当作为开户资料的一部分，声明文件相关信息可并入开户申请书中。","a":"正确"},{"id":57,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，个人客户在我行新开账户时，营业机构应当开展涉税信息尽职调查工作，并获取由账户持有人签署的《个人税收居民身份声明文件》。通过电子渠道、超级柜台等渠道接收个人账户开户申请时，也应当要求账户持有人提供纸质声明文件。","a":"错误"},{"id":58,"q":"根据《中国农业银行非居民金融账户涉税信息尽职调查操作规程》，营业机构应当根据客户开户资料对个人客户填写的声明文件的合理性进行审核，主要确认声明文件填写信息是否与其他信息存在明显矛盾。认为声明文件存在不合理信息时，应当要求账户持有人提供有效声明文件或者进行解释。不提供有效声明文件或者合理解释的，不得为其开立账户。","a":"正确"},{"id":59,"q":"开展客户准入尽职调查，应当识别并核实客户身份，登记客户身份基本信息，并留存客户有效身份证件或者其他身份证明文件的复印件或者影印件。","a":"正确"},{"id":60,"q":"开展客户准入尽职调查，应当识别并核实客户身份，登记客户身份基本信息，并留存客户有效身份证件或者其他身份证明文件的原件。","a":"错误"},{"id":61,"q":"网点通过智能全速通对公账户平台办理业务时，客户经理通过PAD或PC终端完成客户准入尽职调查与对公开户业务审查工作，是开户流程的必经环节。","a":"正确"},{"id":62,"q":"网点通过智能全速通对公账户平台办理对公账户变更业务，对于洗钱风险等级“极高风险”客户，系统控制禁止受理。","a":"正确"},{"id":63,"q":"网点通过智能全速通对公账户平台办理对公账户变更账户信息时，若该信息前有“*”标识，允许不通过尽职调查即可处理。","a":"错误"},{"id":64,"q":"网点通过智能全速通对公账户平台办理业务时，柜面人员可直接修改尽职调查中所有不一致的信息，无需退回客户经理","a":"错误"},{"id":65,"q":"根据《中国农业银行反洗钱业务客户尽职调查管理办法》规定，出现以下情形，禁止为参与虚拟货币交易的场外交易商、中介、掮客或者活跃投机分子，办理单位结算账户开户、变更、销户及产品签约业务。","a":"正确"},{"id":66,"q":"对于营业执照等身份证明文件被注销或吊销的对公企业，须由客户经理开展加强尽职调查后，方可通过智能全速通对公账户平台办理对公账户业务。","a":"错误"},{"id":67,"q":"对于开户理由不合理、开户办理的业务与客户身份不相符、客户提供的信息与材料存在明显矛盾、客户身份资料信息存疑或客户疑似从事违法犯罪活动，采取强化尽职调查措施后仍无法消除怀疑的，应拒绝开户。","a":"正确"},{"id":68,"q":"柜面办理单位结算账户开户、变更、销户业务，需首先由运营部门完成尽职调查。","a":"错误"},{"id":69,"q":"机构开立账户时，金融机构应当获取由该机构授权人签署的声明文件，识别账户持有人是否为非居民企业和消极非金融机构。","a":"正确"},{"id":70,"q":"单位结算账户销户时，涉及大额取现销户或大额转账销户的，应按要求完整填报交易方式、交易对手等信息，并手工报送大额反洗钱数据。","a":"错误"},{"id":71,"q":"规定对于特定自然人的，应进一步了解其资金来源和用途、任职国家（地区）、职业背景及任职情况等，评估潜在的洗钱、制裁及腐败风险。","a":"正确"},{"id":72,"q":"柜面应建立以人工识别为主，鉴别仪、联网核查、人脸识别或指纹识别等技术手段为辅的身份识别方法。","a":"正确"},{"id":73,"q":"对于二代身份证，客户姓名中包含系统无法识别的生僻字时，如果无法正常机读，应要求客户提供辅助证明材料。","a":"错误"},{"id":74,"q":"对于代理人办理需联网核查的业务，应同时对代理人和被代理人（包括未成年人）进行核查，其中代理人须进行人行核查,被代理人无特殊要求。","a":"错误"},{"id":75,"q":"联网核查支持的客户身份证件种类包括二代身份证、临时身份证、户口簿、护照等。","a":"错误"},{"id":76,"q":"本行系统留存客户姓名有误的，应先为客户办理业务，在尽快为客户修改姓名。","a":"错误"},{"id":77,"q":"客户身份证件或者其他身份证明文件的有效期过期超过90天（自然日）仍未及时更新且没有提出合理理由的，本行在履行必要的告知程序后，应中止为客户办理业务。","a":"正确"},{"id":78,"q":"客户变更姓名、国籍、身份证件或身份证明文件的种类、号码的应开展客户身份重新识别。","a":"正确"},{"id":79,"q":"营业机构如发现可疑情形，怀疑存在洗钱或洗钱上游犯罪的，无论客户是否成功办理业务或发生交易，均需通过反洗钱智能监控平台（AMLP）反馈可疑线索。","a":"正确"},{"id":80,"q":"营业机构如发现可疑情形，怀疑存在洗钱或洗钱上游犯罪的，仅在客户成功办理业务或发生交易时，才需通过反洗钱智能监控平台（AMLP）反馈可疑线索。","a":"错误"},{"id":81,"q":"联网核查留存的二代身份证电子影像可以代替纸质复印件。","a":"正确"},{"id":82,"q":"通过6040A交易调整BoEing用户角色后，在恢复之前，可手动修改用户角色","a":"错误"},{"id":83,"q":"在同一会计年度内，同一人工用户号只能由一个人使用。","a":"正确"},{"id":84,"q":"存款补息业务须经有权人审批。","a":"正确"},{"id":85,"q":"受理贷款利息冲正业务时，对账单上的任一利息种类进行冲账时，若利息已收取，应遵循先冲已收息，再冲应收息，最后冲欠息的顺序。","a":"正确"},{"id":86,"q":"当为客户开具数电红字发票时，如原增值税发票未抵扣，应先通过“65104-申请查询红字确认单”交易申请红字确认单，再通过“65105-红字发票开具”开具红票；如原增值税发票已抵扣，可选择通过“65104-申请查询红字确认单”交易申请红字确认单，由客户确认后，再通过“65105-红字发票开具”开具红票。","a":"正确"},{"id":87,"q":"如一笔10元收费已开具一张10元全额发票，现需退费3元，可对原增值税发票开具一张3元红票后再退费。","a":"错误"},{"id":88,"q":"在进行冲正或退费时，应先检查原交易的开票情况，如已开票应先开具红票后再退费。","a":"正确"},{"id":89,"q":"通过收费平台收费时，不同的业务种类代码对应不同的财会产品号/损益尾号，不清楚业务种类代码的，可以选择相似代码确认。","a":"错误"},{"id":90,"q":"机构全业务拆并时，内部专用账户只结转余额，不划转账户。","a":"正确"},{"id":91,"q":"机构拆并，同一拆并日，一个拆出行不能拆至两个及以上并入行，一个并入行不能接收两个及以上机构的账务并入。","a":"正确"},{"id":92,"q":"核心业务系统各业务需求账务核算必须经扎口审核同意后方可研发投产（）。","a":"正确"},{"id":93,"q":"远程集中授权在业务审核上严格遵循业务部门的相关规章制度。","a":"正确"},{"id":94,"q":"对外营业机构是否应用远程授权由一级分行确定。","a":"错误"},{"id":95,"q":"对于被拒绝的授权业务，客服经理无需查看拒绝理由，应及时再次提交已存在差错的授权申请。","a":"错误"},{"id":96,"q":"远程授权业务中，核对客户身份真实性，按照相关业务制度对客户身份证件、现金实物、银行介质、结算凭证等真伪进行严格审核由内勤行长负责。","a":"错误"},{"id":97,"q":"总行统一制定远程集中授权交易需审核的影像资料基础内容；一级分行在此基础上牵头相关业务部门共同细化，并制定授权审核要点。","a":"正确"},{"id":98,"q":"总行规定必须采用远程集中授权的交易，各分行不得更改。总行未规定的交易及分行自主研发交易由一级分行确定授权方式。","a":"正确"},{"id":99,"q":"营业机构内勤行长主要职责如下：（一）在业务审批时，对业务的真实性、合规性和资料的完整性负责。（二）监督指导客服经理远程集中授权业务操作。","a":"正确"},{"id":100,"q":"凭证提示库是系统提供的辅助功能，其主要作用是提示临柜人员业务所需的主要电子影像资料。","a":"正确"},{"id":101,"q":"远程授权系统授权终端不得安装与业务系统无关的软件，可以与非生产网络连接。","a":"错误"},{"id":102,"q":"一体化业务运行平台柜面端支持客户经理登录处理业务。","a":"错误"},{"id":103,"q":"一体化业务运行平台柜面端支持内勤行长登录。","a":"正确"},{"id":104,"q":"通过一体化业务运行平台柜面端受理的业务，一般由后台中心集中处理。","a":"正确"},{"id":105,"q":"一体化业务运行平台英文名称通常简称为IPO。","a":"正确"},{"id":106,"q":"一体化业务运行平台柜面端用户一般与BoEing柜员相通。","a":"正确"},{"id":107,"q":"人脸信息属于敏感个人信息，相较于普通身份信息，监管管控要求更严格。","a":"正确"},{"id":108,"q":"客户拒绝签署人脸识别授权书，柜员可以直接拒绝办理所有正常银行业务。","a":"错误"},{"id":109,"q":"活体检测是防范照片、视频、AI换脸冒充本人办理业务的重要手段。","a":"正确"},{"id":110,"q":"业务办理完毕后，银行可随意调取、复用客户历史人脸影像用于其他无关业务。","a":"错误"},{"id":111,"q":"客户化妆、发型大幅改变，是导致人脸识别比对不通过的常见原因之一。","a":"正确"},{"id":112,"q":"客服经理为提升办理效率，可代替客户签署人脸信息处理授权书。","a":"错误"},{"id":113,"q":"光线过强、逆光拍摄，不会影响人脸识别系统的比对结果。","a":"错误"},{"id":114,"q":"人脸信息处理授权书一经签署永久有效，客户无法申请撤销或中止授权。","a":"错误"},{"id":115,"q":"IPO往账业务界面中“是否跨行”标识，当收款行为非本省农行机构时均应选择为“跨行”","a":"错误"},{"id":116,"q":"个人存款账户实行实名制，营业机构应以客户的真实办理意愿为前提，使用其实名办理，不得开立匿名账户或假名账户。","a":"正确"},{"id":117,"q":"批量代理开立的个人存款账户的状态为只收不付，须客户本人持有效身份证件办理激活后方可使用，不得代理。","a":"正确"},{"id":118,"q":"整存零取定期储蓄存款起存金额为10000元。","a":"错误"},{"id":119,"q":"个人结算账户开户之日起6个月内无交易记录的，将暂停其柜面业务。","a":"错误"},{"id":120,"q":"书面挂失后，补领新存款凭证和挂失销户的，可由代理人凭有效身份证件到相应营业机构办理。","a":"错误"},{"id":121,"q":"零存整取存款中途漏存且未在次月补存，视为违约，违约后存入的部分，支取时按支取日营业机构的活期存款利率计付利息。","a":"正确"},{"id":122,"q":"对于存单、存折介质的个人存款账户，开立账户后，也可根据客户需求，对支控方式进行修改。","a":"正确"},{"id":123,"q":"定期储蓄的转存业务每次转存本金是上期存款的本金与税后利息之和，转存利率为转存日营业机构的本外币整存整取定期存款对应利率。","a":"正确"},{"id":124,"q":"个人存款账户的开户需提供有效身份证件，不满16周岁的可使用居民身份证或户口簿。","a":"正确"},{"id":125,"q":"CCS等级为高风险的客户，可办理保管箱业务。","a":"错误"},{"id":126,"q":"Ⅱ类户借记卡的消费和缴费、向非绑定账户转出资金、取出现金日累计限额合计为2万元。","a":"错误"},{"id":127,"q":"持卡人持Ⅰ类户借记卡通过境内自助设备取现，单卡单日累计取现限额为人民币1万元。","a":"错误"},{"id":128,"q":"Ⅱ类户借记卡的贷款发放、购买投资理财产品不受限额控制。","a":"正确"},{"id":129,"q":"办理借记卡销卡业务时，对批量开卡已领取卡片但未激活且余额为零的，一个月后可由单位提出申请，对相关账户进行销卡（销户）。","a":"错误"},{"id":130,"q":"营业网点办理损坏换卡业务须收回原卡。新卡须由持卡人本人领取。","a":"正确"},{"id":131,"q":"网点收到同卡号换卡的成品卡后，满六个月无人认领的，须对卡片作剪角坏磁与破坏芯片处理，并定期销毁。","a":"错误"},{"id":132,"q":"借记卡口头挂失可通过营业网点、电子银行（含网上银行、掌上银行、电话银行）、远程银行中心等指定渠道办理。","a":"正确"},{"id":133,"q":"20457借记卡升降级交易支持社会保障卡和附属卡的升降级操作。","a":"错误"},{"id":134,"q":"活期存折补登折时，存折消磁无需先换折，可直接补登折。","a":"错误"},{"id":135,"q":"冲账时应坚持先存款冲销再存款补正或先取款补正再取款冲销的原则。","a":"正确"},{"id":136,"q":"冻结终止日期到期后，系统自动解冻。有权机关在冻结终止日期之前未办理续冻，视为自动放弃续冻权利。","a":"正确"},{"id":137,"q":"错账冲正须经内勤行长现场审核、审批和全程监督业务办理，经远程主管授权，无需登记《运营主管工作日志》。","a":"错误"},{"id":138,"q":"借记卡伪冒账户销户，如果账户有余额，销户成功后，系统自动将余额转入开户行的“个人伪冒账户销户专项资金”专用账户，该专户允许手工记账。","a":"错误"},{"id":139,"q":"Ⅱ类账户可以办理存款、购买投资理财产品等金融产品、限额消费和缴费、限额向非绑定账户转出资金业务。","a":"正确"},{"id":140,"q":"Ⅲ类户账户余额不得超过1000元。","a":"错误"},{"id":141,"q":"借记卡卡片止付后，所有扣款业务均不支持。","a":"错误"},{"id":142,"q":"对于在本行账户余额合计不超过5万元人民币（或等值外币，不含未结利息）已故存款人的存款提取，不再须经公证。","a":"正确"},{"id":143,"q":"联网核查和人脸识别是客户身份识别最重要的辅助手段，可代替客户身份识别。","a":"错误"},{"id":144,"q":"联名存款不可更改支控/通兑方式。","a":"正确"},{"id":145,"q":"联网核查模块留存的二代身份证电子影像，可以代替相关业务要求留存的二代身份证纸质复印件。","a":"正确"},{"id":146,"q":"对于代理人办理需联网核查的业务，应同时对代理人和被代理人（不包括未成年人）进行核查，其中被代理人须进行人行核查。","a":"错误"},{"id":147,"q":"借记卡和活期结算存折开户时必须以人民币开户。","a":"正确"},{"id":148,"q":"转账撤销可用于撤销自助设备上受理的本行和跨行延迟转账。","a":"正确"},{"id":149,"q":"凡操作正确并记账成功，且系统打印内容与客户填写内容一致的的业务，可以应客户的要求做抹账处理。","a":"错误"},{"id":150,"q":"教育储蓄子账户销户时，还应审查非义务教育证明，无法提供的按普通零存整取计息。","a":"正确"},{"id":151,"q":"“20304存单销户”销转数币钱包业务不允许抹账，如发现交易异常，需当日在本网点高柜通过4840M动账异常处理交易，不得以现金方式将销户资金交付客户。","a":"错误"},{"id":152,"q":"“20304存单销户”只能销转与存单同一客户名下借记卡、活期一本通、数币钱包。","a":"正确"},{"id":153,"q":"“20307整整存单现金销户转开户”新开户只能为同一客户。","a":"错误"},{"id":154,"q":"存折所有账户已销账户时，将存折内页撕下后在扉页中间空白处加盖“内页已取，客户签收：”字样，并于磁条处剪角，交给客户签字确认。","a":"正确"},{"id":155,"q":"20306定期一本通子账户现金或转账销户，本息合计小于大额标准的，到期日销户时可以不提供客户有效身份证件（销转数币钱包除外）。","a":"正确"},{"id":156,"q":"联名定期一本通目前能开办人民币和外币整存整取子账户。","a":"错误"},{"id":157,"q":"通过“20321借记卡子账户批量销户”办理业务时，若借记卡为书面挂失状态不能办理。","a":"错误"},{"id":158,"q":"“20322定期一本通子账户批量销户”转账销户资金处理方式仅支持转本人借记卡，可以支持手输卡号。","a":"正确"},{"id":159,"q":"借记卡书面挂失补发、书面挂失销户、解挂可在非原挂失网点办理。","a":"正确"},{"id":160,"q":"当客户本人亲自办理挂失业务时，允许即挂即补和即挂即销。","a":"正确"},{"id":161,"q":"当办理挂失后续处理业务时，不用提供原挂失业务回单，应要求客户本人亲自办理并出示有效身份证件，认真核实客户身份信息。","a":"正确"},{"id":162,"q":"银行卡口头挂失后长期有效、不自动解挂。","a":"正确"},{"id":163,"q":"全封、半封的银行卡可以办理口头挂失。","a":"错误"},{"id":164,"q":"存单、存折可重复办理口头挂失。","a":"正确"},{"id":165,"q":"批量开卡、代理开卡、睡眠卡等借记卡，在未启用、未激活前可直接挂失销卡。","a":"正确"},{"id":166,"q":"“20234银行卡书面挂失销户”交易遇到卡挂折的情形，不可直接对卡和折一并进行挂失销户。","a":"错误"},{"id":167,"q":"全封、半封的银行卡办理书面挂失，止付标志只能选“不止付”。","a":"正确"},{"id":168,"q":"柜面当接到有权机关协助查询、冻结、扣划通知书后，应严格保密并及时办理，不得拖延推诿，严禁向存款人或者第三方通风报信、帮助隐匿或者转移存款。","a":"正确"},{"id":169,"q":"协助查询存款手续办理完毕后，除非有权机关明确允许，否则严禁通知存款人。","a":"正确"},{"id":170,"q":"法院办理有权机关查冻扣业务时，可由一名及以上执行人员，持有效的本人工作证件，到本行营业机构或专门受理部门现场办理，但通过网络查控专线发送查冻扣需求的除外。","a":"正确"},{"id":171,"q":"协助查询、冻结、解冻、扣划通知书等法律文件必须依法送达，即只能由有权机关执行人员送达（法律法规和监管部门有特殊规定，或者通过全行司法查询与控制系统，与公安机关和人民法院建立“总对总”和“点对点”网络查控机制的除外）。","a":"正确"},{"id":172,"q":"协助有权机关查询个人存款资料，会计档案原件查询结果可以提供给执法人员抄录、复制、照相，但不得带走原件。","a":"正确"},{"id":173,"q":"根据执法机关要求，可以将扣划款项直接划至申请执行人账户，但若指定划转到申请执行人以外的其他单位或个人账户，本行有权拒绝办理。","a":"正确"},{"id":174,"q":"依据《协助扣划存款通知书》填制特种转账凭证，在附言处注明“协助XX机关扣划存款，如有误请查询，勿退”字样，防止扣划款项被对方行退汇后自动入账的情况发生。","a":"正确"},{"id":175,"q":"使用新面客系统办理定期开户时，如使用现金箱进行资金中转，需确保现金箱余额充足。","a":"正确"},{"id":176,"q":"新面客系统定期开户APP最多支持同时销户3个账户、开立3个账户。","a":"正确"},{"id":177,"q":"使用新面客系统办理定期开户时，如需要进行资金中转，系统优先使用过渡户处理。","a":"错误"},{"id":178,"q":"使用新面客系统办理定期开户时，如客户销户2张存单，开立1张存单，并取出全部利息，系统将使用现金箱进行资金处理。","a":"正确"},{"id":179,"q":"新面客系统定期开户APP支持同时开立3张大额存单。","a":"错误"},{"id":180,"q":"新面客系统定期开户APP不支持使用他人借记卡进行资金中转。","a":"正确"},{"id":181,"q":"根据《消费者权益保护法》，消费者因经营者利用虚假广告或者其他虚假宣传方式提供商品或者服务，其合法权益受到损害的，可以向经营者要求赔偿。广告经营者、发布者发布虚假广告的，消费者可以请求行政主管部门予以惩处。广告经营者、发布者不能提供经营者的真实名称、地址和有效联系方式的，应当承担赔偿责任。","a":"正确"},{"id":182,"q":"《个人信息保护法》规定了个人信息处理者的一般性告知义务，即处理个人信息应事先以显著方式、清晰易懂的语言充分告知处理目的、方式、信息种类、保存期限、联系方式、权利行使和救济程序等事项。","a":"正确"},{"id":183,"q":"客户不同意处理个人信息或撤回同意时，可以拒绝提供所有产品或服务。","a":"错误"},{"id":184,"q":"对经识别存在异常开户情形的，银行业金融机构、非银行支付机构有权加强核查或者拒绝开户。","a":"正确"},{"id":185,"q":"银行、支付机构应当将金融消费者权益保护纳入公司治理、企业文化建设和经营发展战略，制定本机构金融消费者权益保护工作的总体规划和具体工作措施。","a":"正确"},{"id":186,"q":"根据《中国人民银行金融消费者权益保护实施办法》，银行、支付机构向金融消费者说明重要内容和披露风险时，应当依照法律法规和监管规定留存相关资料，自业务关系终止之日起留存时间不得少于2年。","a":"错误"},{"id":187,"q":"银行保险机构应当完善消费者权益保护内部考核机制，建立消费者权益保护内部考核制度，对相关部门和分支机构的工作进行评估和考核。","a":"正确"},{"id":188,"q":"银行保险机构董事会承担消费者权益保护工作的最终责任，对消费者权益保护工作进行总体规划和指导。","a":"正确"},{"id":189,"q":"银行保险机构应当督促和规范与其合作的互联网平台企业有效保护消费者个人信息，只要消费者在一个平台上进行了授权，即可以在不同平台间传递消费者个人信息。","a":"错误"},{"id":190,"q":"银行、支付机构在办理业务时，应当完整、准确、全面地向金融消费者披露可能影响其决策的信息。","a":"正确"},{"id":191,"q":"银行、支付机构收集消费者金融信息用于营销、用户体验改进或者市场调查的，应当以适当方式供金融消费者自主选择是否同意银行、支付机构将其金融信息用于上述目的。","a":"正确"},{"id":192,"q":"银行保险机构应当建立合作机构名单管理机制，对涉及消费者权益的合作事项，设定合作机构准入和退出标准，并加强对合作机构的持续管理。","a":"正确"},{"id":193,"q":"银行保险机构负责对本单位及其分支机构消费投诉处理工作的管理、指导和考核，协调、督促其分支机构妥善处理各类消费投诉。","a":"正确"},{"id":194,"q":"银行保险机构应结合产品和服务相关投诉、诉讼、舆情、满意度调查等情况，对消费者权益保护审查要点进行更新和完善。","a":"正确"},{"id":195,"q":"根据《中国农业银行个人客户信息保护实施细则》，处理个人客户信息时，应采取对个人权益影响最大的方式。","a":"错误"},{"id":196,"q":"根据《中国农业银行个人客户信息保护实施细则》，除法律、行政法规另有规定外，个人客户信息的保存期限应当为实现处理目的所必要的最短时间。","a":"正确"},{"id":197,"q":"根据《中国农业银行消费者权益保护审查管理办法》，与个人客户产生权利义务关系的章程、合同、协议、公告、话术及业务凭证的制定和修订，应当进行消保审查。","a":"正确"},{"id":198,"q":"根据《中国农业银行网点销售专区、录音录像及产品信息查询平台管理办法》，消费者通过自助终端等电子设备自主购买自有理财产品及代销产品时，本行网点工作人员可以同时进行产品营销推介。","a":"错误"},{"id":199,"q":"银行应当在官方网站、移动客户端、营业场所或者办公场所醒目位置公布本单位的投诉电话、通讯地址等投诉渠道信息和消费投诉处理流程。","a":"正确"},{"id":200,"q":"对减轻或者免除银行责任的规定，银行、支付机构可以仅以通知、声明、告示等格式条款的方式作出。","a":"错误"},{"id":201,"q":"金融知识教育宣传应当坚持公益性，可以用营销、推介行为替代金融知识普及与消费者教育。","a":"错误"},{"id":202,"q":"银行、支付机构应当制定年度金融知识普及与金融消费者教育工作计划，并结合自身特点开展日常性金融知识普及与金融消费者教育活动。","a":"正确"},{"id":203,"q":"特殊客群包括老弱病残孕、身处境外等群体，但不包括遇到意外事件的客户。","a":"错误"},{"id":204,"q":"所有特殊客群业务均需快响团队支持，网点不得自行处理。","a":"错误"},{"id":205,"q":"客户已故后，其授权委托书仍可继续使用。","a":"错误"},{"id":206,"q":"员工主观目的是帮助特殊客群且符合规定，即使存在轻微过错也可免责。","a":"正确"},{"id":207,"q":"当特殊客户在网点突发重病时，大堂经理需立即拨打120与110（模拟拨号），并报告内勤行长。","a":"正确"},{"id":208,"q":"公共电子屏被篡改时，网点人员应直接联系科技部门处理，无需报告内勤行长。","a":"错误"},{"id":209,"q":"超级柜台前端服务员可以代客户保管、代客户操作、代客户输入信息。","a":"错误"},{"id":210,"q":"超级柜台无卡业务是指客户通过刷脸或刷掌银二维码核实身份，不需插入银行卡即可办理业务。","a":"正确"},{"id":211,"q":"超级柜台前端服务员及时响应特殊群体和老龄人服务需求，并推介合适的服务方式。","a":"正确"},{"id":212,"q":"超级柜台不支持外国人永久居留身份证办理业务。","a":"错误"},{"id":213,"q":"电子印章管控平台支持全行电子行政印章与电子业务印章的制作、变更、授权、废止等全生命周期管理","a":"正确"},{"id":214,"q":"营业网点对外营业期间，内勤行长或代班主管可以顶岗或代班办理业务。","a":"错误"},{"id":215,"q":"对账岗位与记账岗位为不相容岗位，应严格分离，不得由同一人兼任。","a":"正确"},{"id":216,"q":"某营业网点客服经理在原岗位连续任职4年，随后调离至同一网点的其他岗位，但未离开客服经理序列，且轮岗时间不足6个月。该行为是否符合《关于调整营业网点有关岗位交流轮岗政策的通知》（农银办发〔2024〕654号）的规定？","a":"错误"},{"id":217,"q":"客服经理上岗前必须通过岗位资格考试，因工作需要由组织安排暂未持证人员上岗的，也应在上岗后最近一次考试中通过。","a":"正确"},{"id":218,"q":"客户经理在明知客户身份资料不完整的情况下，仍为客户开立账户，该行为是否违反《运营条线员工行为“十个严禁”规定》？","a":"正确"},{"id":219,"q":"对于排查发现存在异常行为的客服经理，仍安排其处理账、证、印、库等业务，是否符合《中国农业银行营业网点客服经理管理办法》的相关规定？","a":"错误"},{"id":220,"q":"客服经理在临时离岗时，未纳入印控仪管理的临柜业务实物印章应装入本人使用的现金箱加锁妥善保管。","a":"正确"},{"id":221,"q":"客服经理在使用印控仪时，若将其放置在监控录像无法清晰覆盖的区域，是否符合《中国农业银行临柜业务实物印章管理实施细则》的相关规定？","a":"错误"},{"id":222,"q":"客服经理在开启印控仪进行印章使用时，若因业务量较大，为提高效率可暂时取出印章手工加盖。","a":"错误"},{"id":223,"q":"客服经理在使用印控仪进行用印操作时，若操作全程未在监控录像清晰可见范围内进行，该行为是否符合《中国农业银行临柜业务实物印章管理实施细则》的相关规定？","a":"错误"},{"id":224,"q":"客服经理在日终签退前，应确保本人业务凭证的真实性与完整性，并按系统顺序整理后交由内勤行长审核。","a":"正确"},{"id":225,"q":"客户提交的填单凭证中，金额存在手工涂改，客服经理在审核时应予以受理。","a":"错误"},{"id":226,"q":"为不在本行开立账户的客户开立信用卡时，如果客户未在申请表及相关附件上签名，该行为是否符合《中国农业银行反洗钱业务个人客户尽职调查操作规程》的要求？","a":"错误"},{"id":227,"q":"内勤行长在日终处理时，发现“用户日终纸质凭证报告表”与纸质凭证张数不一致，应立即查明原因，重大风险情况应立即向上级行报告。","a":"正确"},{"id":228,"q":"客户在超级柜台办理业务时，若交易成功后申请书漏签名，客服经理应补打纸质申请书并注明原因，交由内勤行长签字后妥善保管。","a":"正确"},{"id":229,"q":"客服经理在完成运营档案封装后，应在封装次日最迟不超过五个工作日内将档案移交至档案场所集中保管。","a":"正确"},{"id":230,"q":"某营业网点在处理ATM吞没卡业务时，未通过BoEing系统“柜面重要事项登记簿”进行登记，而是继续使用纸质登记簿，该做法符合制度规定。","a":"错误"},{"id":231,"q":"客服经理在管理超级柜台钥匙时，若钥匙保管人员发生变更，应在网点运营管理平台中登记《印章、钥匙保管登记簿》。","a":"正确"},{"id":232,"q":"金库实物出入库时，若无法通过金库业务系统校验身份和确认交接信息，交接完成后，双方应在《箱包交接登记簿》或交接确认书上签字确认。","a":"正确"},{"id":233,"q":"金库安全岗位以外的人员在未经批准的情况下，可以进入金库保管区协助搬运大宗现金。","a":"错误"},{"id":234,"q":"客户在自助设备上取卡时，若设备未自动登记《柜面重要事项登记簿》，设备管理员在清机时取出吞没卡后，应直接交给客户，无需通过柜面交易登记。","a":"错误"},{"id":235,"q":"客服经理在办理单位结算账户启用业务时，若客户未在场，应填写开户时预留的经办人信息。","a":"正确"},{"id":236,"q":"客服经理在处理托管合约冻结业务时，未在《协助查询、冻结、扣划登记簿》中手工登记相关信息，该行为符合《中国农业银行交易与专项资金托管业务柜面作业规则》（农银规章〔2023〕179号）的相关规定。","a":"错误"},{"id":237,"q":"客服经理在处理个人大额存单有权机关查询业务时，协助查询通知书原件、业务凭证、回执复印件、执法人员工作证件复印件等资料应按顺序整理后专夹永久保管。","a":"正确"},{"id":238,"q":"在办理存金通2号份额冻结业务时，经办人员未登记《协助查询、冻结、扣划登记簿》，该行为符合制度规定。","a":"错误"},{"id":239,"q":"设备维护商在进行设备维护维修时，网点员工只需审核其身份证即可，无需审核工作证件或介绍信。","a":"错误"},{"id":240,"q":"客服经理在智能服务区辅助客户办理业务时，可以代客户操作业务流程，但不得代客户输入密码或签名。","a":"错误"},{"id":241,"q":"客户在超级柜台办理业务时，客服经理可以代客户输入密码或短信验证码。","a":"错误"},{"id":242,"q":"客服经理可以将自己的用户号、密码交由他人使用，以提高业务办理效率。","a":"错误"},{"id":243,"q":"营业网点对外营业时，若无内勤行长在岗，也未安排代班主管履职，该行为符合《中国农业银行营业网点内勤行长管理办法》的相关规定。","a":"错误"},{"id":244,"q":"客服经理因临时离开工作台，且放置于工作台的现金及其他物品不在其可视范围内时，应将其放入柜员现金箱或工作台抽屉中保管。","a":"正确"},{"id":245,"q":"网点在营业场所显著位置公示《金融许可证》、《营业执照》等资质证照是符合服务管理要求的。","a":"正确"},{"id":246,"q":"客服经理将自助设备的上箱体钥匙随意放置在办公桌上，未按规定入保险柜或柜员现金箱保管，该行为是否符合制度要求？","a":"错误"},{"id":247,"q":"印控仪的常用钥匙在日常使用中应由印控仪操作岗保管，并放入其本人使用的保险柜/箱中，岗位变动或休假时须办理交接手续。","a":"正确"},{"id":248,"q":"客户租用保管箱时，网点操作类岗位人员未对租用人身份资料进行联网核查，也未留存相关身份资料复印件。该行为是否符合制度要求？","a":"错误"},{"id":249,"q":"在办理已故存款人存款查询业务时，若查询申请人无法提供公证处出具的《存款查询函》，则该业务不能办理。","a":"错误"},{"id":250,"q":"客服经理在无客户授权或内部审批手续的情况下，擅自查询客户信息，属于违规行为。","a":"正确"},{"id":251,"q":"客服经理因客户投诉处理需要，可以未经审批直接复印客户信息资料。","a":"错误"},{"id":252,"q":"客服经理在营业期间可以将具备拍照及存储功能的移动设备带入临柜区域，只要不用于工作相关操作即可。","a":"错误"},{"id":253,"q":"客户在智能服务区办理业务时输入密码，网点现场员工应主动回避，不得在场观察或提示客户输入密码。","a":"正确"},{"id":254,"q":"网点营业期间，智能及自助设备的现场安全巡查可以由网点保安、大堂经理或兼职安全员等人员负责，其中网点保安应每小时巡查1次。","a":"正确"},{"id":255,"q":"客服经理在日常工作中发现自助（智能）设备与网点设备管理系统登记信息不一致，这种情况属于设备管理不规范，违反了制度规定。","a":"正确"},{"id":256,"q":"系统下线后，业务部门应在5个工作日内同步删除非人工用户。","a":"正确"},{"id":257,"q":"客服经理在办理单位账户开立业务时，若客户提供的开户资料中缺少部分非关键性证明文件，但已提供授权委托书和营业执照原件，可先为客户开立账户，后续再补交缺失资料。","a":"错误"},{"id":258,"q":"客服经理在办理单位账户开立业务时，若客户无法提供营业执照原件，可凭加盖公章的复印件办理业务。","a":"错误"},{"id":259,"q":"客户申请办理企业网银操作员用户权限维护业务时，客服经理发现客户未提供《企业金融服务平台申请表》，但客户经理已提供经审批的核实报告，客服经理据此办理业务是否合规？","a":"错误"},{"id":260,"q":"企业类单位结算账户在Boeing21100活期账户开户交易或智速平台完成开户后，应于当日启用。","a":"正确"},{"id":261,"q":"客户撤销单位结算账户时，若未交回未使用的重要空白凭证，且未出具加盖公章或预留印鉴的声明书，该操作是否符合制度规定？","a":"错误"},{"id":262,"q":"客户在我行申请开立同业存放结算账户时，若非一级法人开户，应出具一级法人（或者一级分行）同意开户的授权书原件。","a":"正确"},{"id":263,"q":"客服经理在办理对公外汇账户开立业务时，若未正确录入账户的钞汇标识，属于违反《中国农业银行对公外汇账户业务柜面作业规则》的相关规定。","a":"正确"},{"id":264,"q":"客服经理在办理外币保证金账户开户业务后，未于当天完成开户信息登记，导致开户信息及收支余信息迟报，该行为符合《境内外汇账户管理规定》及《金融机构外汇业务数据采集规范（1.4版）》的相关要求。","a":"错误"},{"id":265,"q":"客户因印章遗失需变更预留印鉴时，若无法交回原预留印鉴卡，应单独出具变更预留印鉴申请书并说明原因。","a":"正确"},{"id":266,"q":"客服经理在为企业客户变更基本存款账户信息后，未在2个工作日内通过账户管理系统向人民银行当地分支机构备案，该行为符合《中国农业银行企业银行结算账户管理办法》的规定。","a":"错误"},{"id":267,"q":"企业开立基本存款账户后，应当立即最迟于当日将开户信息通过人民银行账户管理系统向人民银行当地分支机构备案。","a":"正确"},{"id":268,"q":"客服经理在未收到客户经理填写的《人民币单位结算账户销户审查表》的情况下，直接操作“21431 待清理不动户维护”交易，属于违规操作。","a":"正确"},{"id":269,"q":"客服经理在处理已注销的工商企业账户时，若需恢复其正常使用状态，应重新履行人民银行核准程序。","a":"正确"},{"id":270,"q":"客服经理在办理单位结算账户业务时，发现客户营业执照已被注销，仍为客户办理账户恢复正常并使用，该行为符合《中国农业银行智速账户平台对公账户业务柜面作业规则》的相关规定。","a":"错误"},{"id":271,"q":"客服经理在办理业务过程中，若电子验印系统未自动通过，应由另一名员工进行人工辅助验印并换人复验。","a":"正确"},{"id":272,"q":"客户变更单位账户动账短信通知服务的，可以向任意网点申请办理，无需向账户开户行申请。","a":"错误"},{"id":273,"q":"客户办理企业金融服务平台证书补办业务时，若非法定代表人或负责人亲自办理，只需提供授权经办人有效身份证件的复印件，无需提供原件。","a":"错误"},{"id":274,"q":"在办理企业金融服务平台证书申请或证书补办业务时，客服经理截留客户K宝或密码信封的行为属于违规行为。","a":"正确"},{"id":275,"q":"客服经理在办理票据业务时，若未按规定核验票据真伪或未对票据要素的完整性、合规性进行审核，即违规受理远期票据、过期票据或无效票据，该行为违反了《中华人民共和国票据法》的相关规定。","a":"正确"},{"id":276,"q":"客服经理在办理转账付款业务时，若客户提交的支票已过提示付款期限，仍予以受理，该行为符合《中国农业银行对公活期存款及单位结算账户业务柜面作业规则》（农银规章〔2025〕48号）的相关规定。","a":"错误"},{"id":277,"q":"客服经理在办理纸质商业汇票委托收款业务时，若未按规定核验票据真伪或未审核票据要素的完整性与合规性，属于违规操作。","a":"正确"},{"id":278,"q":"客服经理在处理电子商业汇票业务时，若本行作为承兑人，应及时足额支付票款，不得故意压票或拖延支付。","a":"正确"},{"id":279,"q":"客服经理在处理银行本票或银行汇票兑付后，应每日通过“41031银行本汇票多笔查询”交易，查阅是否存在已兑付待抽撤卡片的票据信息，并根据信息抽取原专夹保管的票据卡片。","a":"正确"},{"id":280,"q":"客服经理在办理单位结算账户支付类票据业务时，可以不核对预留印鉴，直接办理业务。","a":"错误"},{"id":281,"q":"客服经理在通过支票从对公账户划转代发工资款项时，若支控方式选择印鉴或电子印鉴，应联动进行印鉴验印操作。","a":"正确"},{"id":282,"q":"客服经理在为客户办理非对公非活期、新型存款、法人客户透支相关业务时，若客户提交的凭证或资料上加盖了预留印鉴，可以不进行印鉴真伪核验。","a":"错误"},{"id":283,"q":"客服经理在业务办理过程中，若与客户发生非正常资金往来，截留、挪用客户资金，属于严重违反员工行为规范的行为。","a":"正确"},{"id":284,"q":"注册验资资金以现金方式存入，出资人需提取现金的，营业机构应要求客户出具缴存现金时的现金缴款单原件或相关证明材料及其有效身份证件。","a":"正确"},{"id":285,"q":"客服经理在办理对账签约业务时，若客户无法提供法定代表人有效身份证件原件，仅提供加盖单位公章的复印件，且未提供《对账业务客户身份识别调查申请审批表》，则该操作符合制度规定。","a":"错误"},{"id":286,"q":"客服经理在对账过程中，若发现客户无法亲自完成对账，可以代客户完成对账操作。","a":"错误"},{"id":287,"q":"客户在办理个人账户开立业务时，若未提供有效身份证明文件，客服经理可先为客户开立账户，后续再补交相关材料。","a":"错误"},{"id":288,"q":"客服经理在办理批量开立个人养老金账户（电子）业务时，若未对单位客户统一社会信用代码证等证明单位真实性材料的复印件是否加盖公章进行审核，即视为违规操作。","a":"正确"},{"id":289,"q":"客户因证件号码校验位变化申请修改个人客户信息，客服经理仅要求其提供新身份证件，未要求提供旧身份证件，该操作符合制度规定。","a":"正确"},{"id":290,"q":"客户在办理借记卡书面挂失销户业务时，若由他人代理，该业务可以办理。","a":"错误"},{"id":291,"q":"客服经理在无业务需求的情况下，违规进行企业信息联网核查，属于违反《中国农业银行企业信息联网核查系统业务操作规程》的行为。","a":"正确"},{"id":292,"q":"客服经理在办理业务过程中，发现客户提供的身份证件存在明显伪造痕迹，仍为客户继续办理业务，该行为合《中国农业银行严格禁止员工行为的若干规定》的要求。","a":"错误"},{"id":293,"q":"对于非机读二代身份证办理的业务，如果未按要求留存客户身份证或身份证明材料的复印件或电子影像信息，属于违反账户实名制和身份信息核查的相关规定。","a":"正确"},{"id":294,"q":"客户办理业务时，柜面人员在进行联网核查时，应根据客户提供的身份证件，选择正确的证件类型。","a":"正确"},{"id":295,"q":"对于代理人办理需联网核查的业务，仅对代理人进行联网核查，未对被代理人进行核查，符合《中国农业银行联网核查客户身份信息业务管理规定》的要求。","a":"错误"},{"id":296,"q":"客服经理在为客户办理电子银行服务签约业务时，未按规定填写《个人客户非柜面交易渠道审核报告》，该行为属于违规操作。","a":"正确"},{"id":297,"q":"客户要求取消动账短信通知时，客服经理在未核实客户真实意愿的情况下直接操作取消，符合《中国农业银行短信业务管理办法》的规定。","a":"错误"},{"id":298,"q":"客服经理在办理支控方式为“凭证件”的业务时，若客户未到场，可由他人代理办理。","a":"错误"},{"id":299,"q":"客服经理在办理特定养老储蓄产品业务时，若介质选择为“整整存单”，只需打印存单并交客户，无需核对打印内容是否正确。","a":"错误"},{"id":300,"q":"客服经理在办理现金业务过程中，若存在空存、空调现金的行为，属于严重违反运营条线员工行为“十个严禁”的规定。","a":"正确"},{"id":301,"q":"柜员在无真实业务场景的情况下，使用通用账户进行账务处理，即使未发生资金挪用行为，也属于违规操作。","a":"正确"},{"id":302,"q":"客服经理在处理“000144 其它应付款暂收结算款项”账户的动账业务时，若无明确的业务制度或会计核算依据，可直接根据客户要求进行记账操作。","a":"错误"},{"id":303,"q":"客服经理在处理“000144 其它应付款暂收结算款项”账户的动账业务时，若账户用途与核算模板不符，应经二级分行或以上业务和运营部门负责人审批同意后方可处理。","a":"正确"},{"id":304,"q":"客服经理在处理“000144 其它应付款暂收结算款项”账户时，若发现该账户日终存在余额，应立即进行挂账处理，无需审批。","a":"错误"},{"id":305,"q":"客服经理在办理退费业务时，若原收费交易已开具增值税专用发票，未收回原发票或未完成红字发票处理，直接执行退费交易，属于违规操作。","a":"正确"},{"id":306,"q":"客服经理在办理退费业务后，若原收费业务已开具增值税发票，但发票尚未追回，应在追回发票并完成作废或红票处理后再进行退费关联操作。","a":"正确"},{"id":307,"q":"客服经理在处理往来账业务时，发现一笔业务存在疑问，但未按规定及时发出查询，该行为是否符合《中国农业银行网内往来业务管理办法》的相关规定？","a":"错误"},{"id":308,"q":"代理付款行在办理全国银行汇票的挂失或解除挂失时，应通过查询查复的方式通知出票行。","a":"正确"},{"id":309,"q":"客服经理在处理外币及跨境人民币清算业务时，若发现业务信息存在疑问，未按规定进行查询，属于违反制度要求的行为。","a":"正确"},{"id":310,"q":"对于来账报单中金额、币种、业务类型或业务种类存在错误的，接收行是否可以通过查询查复的方式代为更正？","a":"错误"},{"id":311,"q":"柜面代发工资业务中，经办机构可以通过公共互联网接收代发工资清单电子数据，无需在代发工资协议中约定由委托单位承担信息泄露等相关风险。","a":"错误"},{"id":312,"q":"客服经理在代发工资业务中，若将客户资金用于非约定用途，属于严重违规行为。","a":"正确"},{"id":313,"q":"客服经理在协助司法机关查询、冻结、扣划业务过程中，若存在故意推诿、拖延行为，导致应被冻结财产被转移的，属于违规行为。","a":"正确"},{"id":314,"q":"客服经理在接到有权机关协助冻结存款通知书后，可以先与客户沟通，确认客户是否同意冻结，再进行冻结操作。","a":"错误"},{"id":315,"q":"客服经理在办理个人定期存单质押贷款业务时，若未按规定办理存单止付手续，导致质押存单被支取或造成资金损失，属于严重违规行为。","a":"正确"},{"id":316,"q":"个人存单质押贷款业务中，质押物权利凭证的质押手续可以由他人代理办理。","a":"错误"},{"id":317,"q":"根据《中国农业银行柜员现金箱业务柜面作业规则》（农银规章〔2021〕135号）规定，质押票据应实行“一票一封”并由指定人员保管，若未做到“一票一封”且未入金库集中保管，即使未造成质押物丢失或银行损失，也属于违规操作。","a":"正确"},{"id":318,"q":"客服经理在日常工作中保管的质押纸质商业汇票，应由内勤行长（或其授权人）至少每旬进行一次检查，确保票据袋封装完好，并与登记信息、系统余额、登记簿核对一致。","a":"正确"},{"id":319,"q":"办理对公业务现金存款，为逃避冲抹账而进行以错纠错的操作，属于违反对公活期存款及单位结算账户业务柜面操作规定的行为。","a":"正确"},{"id":320,"q":"客户在业务凭证上签字确认后，若要求取消业务，客服经理应拒绝抹账处理，并向客户解释应主动联系收款人办理退款手续。","a":"正确"},{"id":321,"q":"客服经理在办理大额取现业务时，若系统弹屏提示为可疑交易，应结合客户身份、职业、资金来源等信息进行综合研判，发现可疑情况应及时向属地反诈中心报备并做好登记。","a":"正确"},{"id":322,"q":"国库经收处收纳的预算收入，应在收纳当日办理报解入库手续，如当日确实不能报解的，必须在下一个工作日报解。","a":"正确"},{"id":323,"q":"客服经理在代理财政国库集中支付业务中，若未能及时、准确办理相关业务，即使未造成不良后果，也属于违反《中国农业银行数字国库信息处理系统管理办法》的相关规定。","a":"正确"},{"id":324,"q":"客服经理在收到财政的缴库指令后，未及时将非税缴款资金入库，但未造成不良后果，该行为是否违反了《商业银行、信用社代理国库业务管理办法》的相关规定？","a":"正确"},{"id":325,"q":"代理支库在办理预算资金拨付业务时，若因特殊情况无法在接到拨付指令当日办理，必须向国库主任（副主任）报告，并在“柜面监督登记簿”的“其他事项”栏中注明，由国库主任（副主任）签字确认。","a":"正确"},{"id":326,"q":"客服经理因操作失误导致隔日账务差错，应采用红字冲正、蓝字补记的方法进行调整。","a":"正确"},{"id":327,"q":"柜面经理因岗位调整不再办理现金业务的，应及时报管辖行运营管理部门删除其柜员现金箱。","a":"正确"},{"id":328,"q":"柜员现金箱限额的设置应根据岗位职责、高低柜配置合理确定，内勤行长可根据业务需要及季节性现金收付情况临时性调整柜员现金箱限额。","a":"正确"},{"id":329,"q":"客服经理在日终营业结束后，若发现调拨箱或现金箱未上缴金库，应立即查找实物并完成入库。","a":"正确"},{"id":330,"q":"客服经理在现金箱中存放未作废的、待客户领取的吞卡，若未经管辖行主管运营的行长审批同意，属于违规操作。","a":"正确"},{"id":331,"q":"日终碰箱时，内勤行长未现场监督客服经理碰箱，未卡大把，属于违反《中国农业银行柜员现金箱业务柜面作业规则》的行为。","a":"正确"},{"id":332,"q":"金库人员未将配送人员信息（含照片）报备守库人员，也未通过打卡、生物识别等门禁系统记录出入库情况，该行为是否符合《中国农业银行金库运营业务管理办法》的规定？","a":"错误"},{"id":333,"q":"网点在领用重要空白凭证后，可由任意柜员直接调入系统用户或机器用户使用。","a":"错误"},{"id":334,"q":"客服经理在午休期间将本人经管的重要空白凭证交由他人使用，该行为是否符合《中国农业银行柜员现金箱业务柜面作业规则》的相关规定？","a":"错误"},{"id":335,"q":"客服经理在日终前应对所保管的重要空白凭证进行账实检查，以确保凭证实物与系统登记簿余额一致。","a":"正确"},{"id":336,"q":"未使用的重要空白凭证在未加盖本行印章或经办人名章的情况下，可以随意开立或出售。","a":"错误"},{"id":337,"q":"营业机构在发售重要空白凭证时，可以跳号使用，无需按照凭证上印制的批次号和顺序号进行发售。","a":"错误"},{"id":338,"q":"柜员在处理作废的重要空白凭证时，只需在系统中完成“61714 凭证内部处理-柜员凭证箱凭证内部作废”交易，无需对纸质凭证进行剪角或加盖“作废”戳记。","a":"错误"},{"id":339,"q":"客服经理在日常工作中发现部分贵金属产品因长期滞销、回购或残破未及时上交库房，该行为是否符合《中国农业银行金库运营业务管理办法》的相关规定？","a":"错误"},{"id":340,"q":"调入机构收到调拨现金后，若发现与调拨清单不符，应在当日完成账务处理，并以实际清点金额为准。","a":"正确"},{"id":341,"q":"自助（智能）设备在加配钞过程中，可以采用补充方式添加现金，以提高加钞效率。","a":"错误"},{"id":342,"q":"在自助（智能）设备清机过程中，若未对回钞金额、账面金额及流水发生额进行三方核对，该操作是否符合《中国农业银行自助（智能）设备加配钞业务管理规定》的要求？","a":"错误"},{"id":343,"q":"客户服务经理在自助设备维护维修前，未检查设备吞卡槽和出钞通道，未取出吞没卡和卡钞，即允许进行维护维修，该行为是否符合《中国农业银行自助(智能)设备运营操作规程》的规定？","a":"错误"},{"id":344,"q":"办理现金业务时，客服经理可以同时处理多笔现金业务，无需做到一笔一清。","a":"错误"},{"id":345,"q":"客服经理在收缴假币时，若发现假币为假人民币纸币，应当面加盖“假币”字样戳记，并通过BoEing系统录入相关信息。","a":"正确"},{"id":346,"q":"客服经理所在网点的内勤行长已按要求每旬对柜员现金箱进行了全面检查，但在检查过程中未对超级柜台等自助设备现金箱进行检查，该行为是否符合《中国农业银行柜员现金箱业务柜面作业规则》的相关规定？","a":"错误"},{"id":347,"q":"某营业机构内勤行长在对自助（智能）设备加配钞业务进行跟班检查时，仅抽查了1个自助银行点，未达到制度要求的抽查数量。该行为违反了《中国农业银行自助（智能）设备加配钞业务管理规定》的相关规定","a":"正确"},{"id":348,"q":"《人民币图样使用管理办法》禁止在祭祀用品、生活用品、票券上使用放大的、缩小的和同样大小的人民币图样。","a":"正确"},{"id":349,"q":"《银行业金融机构反假货币工作指引》所称货币是指中国人民银行依法发行的人民币，包括纸币和硬币。","a":"正确"},{"id":350,"q":"对半额兑换的残缺污损人民币纸币，银行业机构应当面在票面上加盖“半额”戳记。","a":"正确"},{"id":351,"q":"反假货币工作信息上报要求及时、准确、完整。","a":"正确"},{"id":352,"q":"盖有“假币”字样戳记的人民币纸币，经鉴定为假币的，由鉴定单位予以没收，并向收缴单位和持有人开具《货币真伪鉴定书》和《假币没收收据》。","a":"正确"},{"id":353,"q":"柜面发现可疑货币，应立即报告内勤行长。","a":"正确"},{"id":354,"q":"柜面拒收现金，应向持有人说明原因及处理方式。","a":"正确"},{"id":355,"q":"加盖“假币”印章应使用蓝色油墨。","a":"正确"},{"id":356,"q":"假币”印章在假人民币正面位置为水印窗位置。","a":"正确"},{"id":357,"q":"假币封装袋需标注币种、面额、冠字号码等信息。","a":"正确"},{"id":358,"q":"假币收缴必须在持有人视线范围内进行","a":"正确"},{"id":359,"q":"假币收缴凭证需由收缴人、复核人及持有人签字。","a":"正确"},{"id":360,"q":"假币收缴时，被收缴人可接触假币以确认。","a":"错误"},{"id":361,"q":"假币收缴应当在监控下实施，监控记录保存期限不得少于3个月。","a":"正确"},{"id":362,"q":"假外币纸币及各种假硬币，应当面以统一格式的专用袋加封，封口处加盖“假币”字样戳记，并在专用袋上标明币种、券别、面额、张（枚）数、冠字号码、收缴人、复核人名章等细项。","a":"正确"},{"id":363,"q":"鉴定单位接到货币真伪的鉴定申请后，应当即时回复能否受理鉴定申请，不得无故拒绝。","a":"正确"},{"id":364,"q":"金融机构办理存取款、货币兑换等业务时，应当准确鉴别货币真伪，防止误收及误付。","a":"正确"},{"id":365,"q":"金融机构对收付过程中机具报警的钞票，应当进行人工最终鉴别。","a":"正确"},{"id":366,"q":"金融机构柜面一次性发现的假币数量如果没有达到5张（枚）可以不向当地人民银行分支机构和公安机关报告。","a":"错误"},{"id":367,"q":"金融机构收缴假币后，应向持有人出具《假币收缴凭证》","a":"正确"},{"id":368,"q":"金融机构收缴假币应向持有人出具中国人民银行统一规范制作的《假币收缴凭证》。","a":"正确"},{"id":369,"q":"金融机构受理人民币冠字号码查询申请时，对于存储的冠字号码不能与取款人取款业务信息关联的，应在《查询结果通知书》中注明查询过程。","a":"正确"},{"id":370,"q":"金融机构应当按照中国人民银行的有关规定，将兑换的残缺、污损人民币交存中国人民银行分支机构。","a":"正确"},{"id":371,"q":"金融机构应当对收缴的假币实物进行单独管理，并建立假币收缴代保管登记制度，账实分管，确保账实相符。","a":"正确"},{"id":372,"q":"金融机构应当对收缴的假币实物进行单独管理，不得与现金等物品混放。","a":"正确"},{"id":373,"q":"金融机构应确保在用现金机具的鉴别能力符合国家标准或行业标准。","a":"正确"},{"id":374,"q":"金融机构有义务无偿为公众提供人民币鉴别服务。","a":"正确"},{"id":375,"q":"金融机构在办理残缺、污损人民币兑换业务时，兑付额不足一分的，不予兑换。","a":"正确"},{"id":376,"q":"金融机构在办理存取款、货币兑换等业务时发现假币的，应当予以没收。","a":"错误"},{"id":377,"q":"金融机构在办理业务时发现假币，对假外币纸币及各种假硬币，应当面以统一格式的专用袋加封，封口处加盖“假币”字样戳记，并在专用袋上标明币种、券别、面额、张（枚）数、冠字号码、收缴人、复核人名章等细项。","a":"正确"},{"id":378,"q":"经维护仍不达标或不能满足反假货币工作需要的现金处理机具，不得投入使用。","a":"正确"},{"id":379,"q":"某银行收到一张10美元假币，应当在假币背面加盖“假币”字样戳记。","a":"错误"},{"id":380,"q":"收缴单位应当自收到鉴定单位通知之日起五个工作日内将需要鉴定的货币送达鉴定单位。","a":"错误"},{"id":381,"q":"收缴的假币，可以再交还给被收缴人。","a":"错误"},{"id":382,"q":"收缴的外币纸币，应当面在外币纸币的右上角加盖“假币”字样的戳记。","a":"错误"},{"id":383,"q":"收缴的外币纸币和各种硬币，经鉴定为假币的，由鉴定单位将假币退回收缴单位依法收缴，并向收缴单位出具《假币没收收据》。","a":"错误"},{"id":384,"q":"收缴假币必须在监控范围内进行，可离开客户视线。","a":"错误"},{"id":385,"q":"特殊残缺、污损人民币不能原样连接的炭化、变形部分，仍计入剩余面积。","a":"错误"},{"id":386,"q":"在被收缴人要求验看的情况下，银行业金融机构可以将收缴的假币交予被收缴人验看。","a":"错误"},{"id":387,"q":"误付假币的营业机构需向客户等值赔付。","a":"正确"}]};

let allQuestions = [];
let currentFilter = 'all';

function init() {
  allQuestions = [
    ...TIKU.single.map(q => ({...q, type: 'single', typeLabel: '单选'})),
    ...TIKU.multi.map(q => ({...q, type: 'multi', typeLabel: '多选'})),
    ...TIKU.judge.map(q => ({...q, type: 'judge', typeLabel: '判断', o: {A:'正确',B:'错误'}}))
  ];

  document.getElementById('statSingle').textContent = TIKU.single.length;
  document.getElementById('statMulti').textContent = TIKU.multi.length;
  document.getElementById('statJudge').textContent = TIKU.judge.length;
  document.getElementById('statTotal').textContent = allQuestions.length;
  document.getElementById('loading').style.display = 'none';
}

function search(query) {
  if (!query.trim()) return [];
  query = query.trim().toLowerCase().replace(/[？?]/g, '');

  const idPattern = /^(单选|多选|判断|单|多|判)[选]?\s*(\d+)$/;
  const match = query.match(idPattern);
  if (match) {
    const typeMap = {'单选':'single','单':'single','多选':'multi','多':'multi','判断':'judge','判':'judge'};
    return allQuestions.filter(q => q.type === typeMap[match[1]] && q.id === parseInt(match[2]));
  }

  if (/^\d+$/.test(query)) {
    return allQuestions.filter(q => q.id === parseInt(query));
  }

  const keywords = query.split(/\s+/).filter(k => k.length > 0);
  const results = [];
  allQuestions.forEach(q => {
    const text = q.q.toLowerCase();
    let score = 0;
    if (text.includes(query)) score += 100;
    let hit = 0;
    keywords.forEach(k => { if (text.includes(k)) hit++; });
    if (hit === keywords.length) score += 60;
    else if (hit > 0) score += hit * 15;
    if (text.startsWith(query)) score += 30;
    if (score > 0) results.push({...q, _score: score});
  });
  return results.sort((a,b) => b._score - a._score);
}

function highlightText(text, keyword) {
  if (!keyword) return text;
  const words = keyword.trim().split(/\s+/).filter(k => k.length > 0);
  if (!words.length) return text;

  const escaped = words.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const reg = new RegExp('(' + escaped.join('|') + ')', 'gi');
  return text.replace(reg, '<span class="search-highlight">$1</span>');
}

function render(results) {
  const container = document.getElementById('results');

  // 搜索无结果时不再显示全部题
  if (!results || results.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>未找到相关题目</p><p>建议减少关键词或换个关键词搜索</p></div>`;
    return;
  }

  if (currentFilter !== 'all') {
    results = results.filter(q => q.type === currentFilter);
  }

  container.innerHTML = results.map(q => {
    const ans = q.a;
    const ansLetters = ans.split('');
    const opts = q.o || {};
    const optionsHtml = Object.entries(opts).map(([k, v]) => {
      const isCorrect = ansLetters.includes(k) || 
        (q.type === 'judge' && ((ans === '正确' && k === 'A') || (ans === '错误' && k === 'B')));
      return `<div class="option ${isCorrect ? 'correct' : ''}">${k}. ${v}</div>`;
    }).join('');

    return `<div class="result-card">
      <div class="result-header">
        <span class="type-tag ${q.type}">${q.typeLabel}</span>
        <span class="q-id">第 ${q.id} 题</span>
      </div>
      <div class="question">${highlightText(q.q, searchInput ? searchInput.value : "")}</div>
      <div class="options">${optionsHtml}</div>
      <div class="answer-box">
        <div class="answer-label">✅ 正确答案</div>
        <div class="answer-text">${ans}</div>
      </div>
    </div>`;
  }).join('');
}

// 事件绑定
const searchInput = document.getElementById('searchInput');
const voiceBtn = document.getElementById('voiceBtn');

searchInput.addEventListener('input', (e) => {
  const value = e.target.value.trim();
  render(value ? search(value) : allQuestions);
});
searchInput.addEventListener('keydown', (e) => { 
  if (e.key === 'Enter') render(searchInput.value.trim() ? search(searchInput.value) : allQuestions); 
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.type;
    render(search(searchInput.value));
  });
});

// 语音识别（兼容手机Chrome/Edge）
let recognition = null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    voiceBtn.classList.add('recording');
    document.getElementById('voiceHint').style.display = 'block';
  };

  recognition.onresult = (event) => {
    let text = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      text += event.results[i][0].transcript;
    }
    if (text) {
      searchInput.value = text;
      render(search(text));
    }
  };

  recognition.onerror = (event) => {
    console.log('语音错误:', event.error);
    voiceBtn.classList.remove('recording');
    document.getElementById('voiceHint').style.display = 'none';

    if (event.error === 'not-allowed') {
      alert('麦克风权限未开启，请在浏览器设置中允许麦克风权限');
    } else if (event.error === 'no-speech') {
      alert('没有检测到声音，请重新点击后说话');
    }
  };

  recognition.onend = () => {
    voiceBtn.classList.remove('recording');
    document.getElementById('voiceHint').style.display = 'none';
  };

  voiceBtn.addEventListener('click', () => {
    try {
      if (voiceBtn.classList.contains('recording')) {
        recognition.stop();
      } else {
        recognition.start();
      }
    } catch(e) {
      console.log(e);
      recognition.stop();
      setTimeout(()=>recognition.start(),300);
    }
  });
} else {
  voiceBtn.style.display = 'none';
  console.log('当前浏览器不支持语音识别');
}

// 初始化
init();
</script>
</body>
</html>
